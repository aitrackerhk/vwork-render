<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 620" width="1440" height="620">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="bldg1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="bldg2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bldg3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1440" height="620" fill="url(#bgGrad)"/>

  <!-- Decorative waves -->
  <path d="M0,520 Q180,460 360,490 T720,470 T1080,500 T1440,460 L1440,620 L0,620Z" fill="url(#wave1)"/>
  <path d="M0,560 Q200,510 400,540 T800,520 T1200,550 T1440,510 L1440,620 L0,620Z" fill="url(#wave2)"/>

  <!-- Large floating circles -->
  <circle cx="120" cy="100" r="80" fill="#fbbf24" opacity="0.15"/>
  <circle cx="1350" cy="140" r="100" fill="#34d399" opacity="0.12"/>
  <circle cx="700" cy="80" r="50" fill="#f472b6" opacity="0.18"/>
  <circle cx="1100" cy="500" r="65" fill="#fbbf24" opacity="0.1"/>
  <circle cx="200" cy="480" r="45" fill="#60a5fa" opacity="0.12"/>

  <!-- Small sparkle dots -->
  <circle cx="300" cy="150" r="4" fill="#fff" opacity="0.6"/>
  <circle cx="500" cy="100" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="900" cy="120" r="5" fill="#fff" opacity="0.55"/>
  <circle cx="1200" cy="180" r="3.5" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="300" r="3" fill="#fff" opacity="0.45"/>
  <circle cx="1300" cy="350" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="650" cy="500" r="3" fill="#fff" opacity="0.4"/>
  <circle cx="1050" cy="250" r="3.5" fill="#fff" opacity="0.5"/>
  <circle cx="400" cy="420" r="2.5" fill="#fff" opacity="0.45"/>

  <!-- Left city: Building cluster -->
  <g transform="translate(80, 180)">
    <!-- Building 1 (tall, blue) -->
    <rect x="0" y="40" width="70" height="220" rx="10" fill="url(#bldg1Grad)" opacity="0.85"/>
    <!-- Windows -->
    <rect x="12" y="60" width="18" height="14" rx="3" fill="#fff" opacity="0.5"/>
    <rect x="38" y="60" width="18" height="14" rx="3" fill="#fff" opacity="0.5"/>
    <rect x="12" y="85" width="18" height="14" rx="3" fill="#fff" opacity="0.4"/>
    <rect x="38" y="85" width="18" height="14" rx="3" fill="#fff" opacity="0.4"/>
    <rect x="12" y="110" width="18" height="14" rx="3" fill="#fff" opacity="0.35"/>
    <rect x="38" y="110" width="18" height="14" rx="3" fill="#fff" opacity="0.35"/>
    <rect x="12" y="135" width="18" height="14" rx="3" fill="#fff" opacity="0.3"/>
    <rect x="38" y="135" width="18" height="14" rx="3" fill="#fff" opacity="0.3"/>
    <rect x="12" y="160" width="18" height="14" rx="3" fill="#fff" opacity="0.25"/>
    <rect x="38" y="160" width="18" height="14" rx="3" fill="#fff" opacity="0.25"/>
    <!-- Door -->
    <rect x="22" y="220" width="26" height="40" rx="5" fill="#fff" opacity="0.6"/>
    <!-- Rooftop antenna -->
    <rect x="32" y="20" width="4" height="20" rx="2" fill="#fff" opacity="0.4"/>
    <circle cx="34" cy="18" r="4" fill="#fbbf24" opacity="0.6"/>

    <!-- Building 2 (medium, purple) -->
    <rect x="85" y="100" width="60" height="160" rx="10" fill="url(#bldg2Grad)" opacity="0.8"/>
    <rect x="95" y="115" width="16" height="12" rx="2.5" fill="#fff" opacity="0.45"/>
    <rect x="117" y="115" width="16" height="12" rx="2.5" fill="#fff" opacity="0.45"/>
    <rect x="95" y="138" width="16" height="12" rx="2.5" fill="#fff" opacity="0.4"/>
    <rect x="117" y="138" width="16" height="12" rx="2.5" fill="#fff" opacity="0.4"/>
    <rect x="95" y="161" width="16" height="12" rx="2.5" fill="#fff" opacity="0.35"/>
    <rect x="117" y="161" width="16" height="12" rx="2.5" fill="#fff" opacity="0.35"/>
    <rect x="95" y="184" width="16" height="12" rx="2.5" fill="#fff" opacity="0.3"/>
    <rect x="117" y="184" width="16" height="12" rx="2.5" fill="#fff" opacity="0.3"/>
    <rect x="103" y="220" width="22" height="40" rx="4" fill="#fff" opacity="0.55"/>

    <!-- Building 3 (short, golden) -->
    <rect x="160" y="160" width="55" height="100" rx="10" fill="url(#bldg3Grad)" opacity="0.8"/>
    <rect x="170" y="175" width="14" height="11" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="190" y="175" width="14" height="11" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="170" y="195" width="14" height="11" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="190" y="195" width="14" height="11" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="178" y="225" width="20" height="35" rx="4" fill="#fff" opacity="0.55"/>
    <!-- Flag on rooftop -->
    <rect x="185" y="140" width="3" height="22" rx="1.5" fill="#fff" opacity="0.5"/>
    <polygon points="188,140 205,147 188,154" fill="#f472b6" opacity="0.6"/>
  </g>

  <!-- Right city: Building cluster -->
  <g transform="translate(1100, 200)">
    <!-- Building A -->
    <rect x="0" y="50" width="65" height="200" rx="10" fill="url(#bldg2Grad)" opacity="0.75"/>
    <rect x="10" y="65" width="15" height="12" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="32" y="65" width="15" height="12" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="10" y="88" width="15" height="12" rx="2" fill="#fff" opacity="0.35"/>
    <rect x="32" y="88" width="15" height="12" rx="2" fill="#fff" opacity="0.35"/>
    <rect x="10" y="111" width="15" height="12" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="32" y="111" width="15" height="12" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="10" y="134" width="15" height="12" rx="2" fill="#fff" opacity="0.25"/>
    <rect x="32" y="134" width="15" height="12" rx="2" fill="#fff" opacity="0.25"/>
    <rect x="10" y="157" width="15" height="12" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="32" y="157" width="15" height="12" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="20" y="215" width="24" height="35" rx="4" fill="#fff" opacity="0.5"/>

    <!-- Building B (shorter) -->
    <rect x="80" y="120" width="55" height="130" rx="10" fill="url(#bldg1Grad)" opacity="0.7"/>
    <rect x="90" y="135" width="14" height="10" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="110" y="135" width="14" height="10" rx="2" fill="#fff" opacity="0.4"/>
    <rect x="90" y="155" width="14" height="10" rx="2" fill="#fff" opacity="0.35"/>
    <rect x="110" y="155" width="14" height="10" rx="2" fill="#fff" opacity="0.35"/>
    <rect x="90" y="175" width="14" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="110" y="175" width="14" height="10" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="98" y="215" width="20" height="35" rx="4" fill="#fff" opacity="0.5"/>

    <!-- Building C (small, golden) -->
    <rect x="150" y="170" width="50" height="80" rx="8" fill="url(#bldg3Grad)" opacity="0.7"/>
    <rect x="160" y="182" width="12" height="10" rx="2" fill="#fff" opacity="0.45"/>
    <rect x="178" y="182" width="12" height="10" rx="2" fill="#fff" opacity="0.45"/>
    <rect x="165" y="215" width="18" height="35" rx="3" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Center: Connection network -->
  <g transform="translate(520, 230)" opacity="0.3">
    <!-- Network nodes -->
    <circle cx="0" cy="60" r="18" fill="#fbbf24" opacity="0.6"/>
    <circle cx="120" cy="0" r="15" fill="#60a5fa" opacity="0.6"/>
    <circle cx="240" cy="70" r="18" fill="#f472b6" opacity="0.6"/>
    <circle cx="120" cy="130" r="15" fill="#34d399" opacity="0.6"/>
    <circle cx="60" cy="20" r="10" fill="#fff" opacity="0.3"/>
    <circle cx="180" cy="30" r="10" fill="#fff" opacity="0.3"/>
    <!-- Connection lines -->
    <line x1="15" y1="50" x2="105" y2="10" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <line x1="135" y1="10" x2="225" y2="60" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <line x1="120" y1="15" x2="120" y2="115" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="15" y1="70" x2="105" y2="125" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="225" y1="80" x2="135" y2="125" stroke="#fff" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- People silhouettes walking -->
  <g transform="translate(600, 380)" opacity="0.25">
    <!-- Person 1 -->
    <circle cx="20" cy="10" r="10" fill="#fff"/>
    <rect x="12" y="22" width="16" height="30" rx="6" fill="#fff"/>
    <!-- Person 2 -->
    <circle cx="55" cy="8" r="9" fill="#fff"/>
    <rect x="48" y="19" width="14" height="28" rx="5" fill="#fff"/>
    <!-- Person 3 -->
    <circle cx="85" cy="12" r="8" fill="#fff"/>
    <rect x="79" y="22" width="12" height="25" rx="5" fill="#fff"/>
  </g>

  <!-- Briefcase icon -->
  <g transform="translate(850, 350)" opacity="0.3">
    <rect x="5" y="12" width="40" height="28" rx="6" fill="#fff"/>
    <rect x="15" y="5" width="20" height="10" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
    <line x1="25" y1="22" x2="25" y2="30" stroke="#4f46e5" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Company logo placeholders -->
  <g transform="translate(450, 420)" opacity="0.2">
    <rect x="0" y="0" width="35" height="35" rx="10" fill="#fff"/>
    <rect x="50" y="0" width="35" height="35" rx="10" fill="#fff"/>
    <rect x="100" y="0" width="35" height="35" rx="10" fill="#fff"/>
  </g>

  <!-- Floating product card -->
  <g transform="translate(1200, 70)">
    <rect x="0" y="0" width="100" height="80" rx="14" fill="#fff" opacity="0.15"/>
    <rect x="10" y="10" width="80" height="35" rx="8" fill="#fff" opacity="0.1"/>
    <rect x="10" y="52" width="50" height="8" rx="4" fill="#fff" opacity="0.15"/>
    <rect x="10" y="64" width="30" height="6" rx="3" fill="#fff" opacity="0.1"/>
  </g>

  <!-- Floating card (left) -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="90" height="70" rx="12" fill="#fff" opacity="0.12"/>
    <rect x="10" y="10" width="70" height="30" rx="7" fill="#fff" opacity="0.08"/>
    <rect x="10" y="46" width="40" height="7" rx="3.5" fill="#fff" opacity="0.12"/>
    <rect x="10" y="57" width="25" height="5" rx="2.5" fill="#fff" opacity="0.08"/>
  </g>

  <!-- Connecting dots/lines -->
  <g opacity="0.1">
    <line x1="350" y1="300" x2="500" y2="250" stroke="#fff" stroke-width="1.5" stroke-dasharray="6,6"/>
    <line x1="900" y1="280" x2="1050" y2="320" stroke="#fff" stroke-width="1.5" stroke-dasharray="6,6"/>
    <line x1="600" y1="450" x2="780" y2="400" stroke="#fff" stroke-width="1.5" stroke-dasharray="6,6"/>
  </g>

  <!-- Ground/floor area -->
  <rect x="80" y="450" width="160" height="8" rx="4" fill="#fff" opacity="0.08"/>
  <rect x="1100" y="450" width="200" height="6" rx="3" fill="#fff" opacity="0.06"/>

  <!-- Small decorative shapes -->
  <rect x="500" y="180" width="16" height="16" rx="4" fill="#fbbf24" opacity="0.2" transform="rotate(15, 508, 188)"/>
  <rect x="820" y="140" width="12" height="12" rx="3" fill="#34d399" opacity="0.2" transform="rotate(30, 826, 146)"/>
  <polygon points="380,440 386,452 398,452 388,460 392,472 380,464 368,472 372,460 362,452 374,452" fill="#fbbf24" opacity="0.15"/>
  <polygon points="940,100 944,108 952,108 946,114 948,122 940,116 932,122 934,114 928,108 936,108" fill="#fff" opacity="0.25"/>
  <polygon points="1320,430 1323,436 1330,436 1325,440 1327,446 1320,442 1313,446 1315,440 1310,436 1317,436" fill="#fff" opacity="0.2"/>

  <!-- Triangle confetti -->
  <polygon points="360,130 370,115 380,130" fill="#f472b6" opacity="0.15" transform="rotate(20, 370, 122)"/>
  <polygon points="1050,180 1058,168 1066,180" fill="#fbbf24" opacity="0.12" transform="rotate(-10, 1058, 174)"/>
  <polygon points="180,420 188,408 196,420" fill="#60a5fa" opacity="0.15" transform="rotate(15, 188, 414)"/>
</svg>