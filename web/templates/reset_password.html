<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼</title>
    <link rel="icon" type="image/png" href="/static/vworkicon.png">
    <link rel="apple-touch-icon" href="/static/vworkicon.png">
    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/vendor/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <style>
        /* Reset password page background: same as login page */
        body.login-page {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(
                135deg,
                #ffffff 0%,
                #ffffff 40%,
                #f8fafc 65%,
                #eef2ff 82%,
                #ffffff 100%
            );
            background-size: 400% 400%;
            animation: loginGradientFlow 22s ease infinite;
            overflow-x: hidden;
        }
        @keyframes loginGradientFlow {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }
        /* Subtle moving glow blobs */
        body.login-page::before,
        body.login-page::after {
            content: '';
            position: fixed;
            inset: -40%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: loginGlowMove 30s linear infinite;
            opacity: 1;
        }
        body.login-page::after {
            animation-duration: 42s;
            opacity: 0.7;
            filter: blur(2px);
        }
        @keyframes loginGlowMove {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(80px, 60px) scale(1.08) rotate(180deg); }
            100% { transform: translate(0, 0) scale(1) rotate(360deg); }
        }

        /* Keep content above background layers */
        body.login-page > * {
            position: relative;
            z-index: 1;
        }

        /* Card glass feel for readability */
        body.login-page .card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .lang-switcher .btn.active {
            background-color: var(--nir-primary);
            border-color: var(--nir-primary);
            color: white;
        }
        .lang-switcher .btn.active:hover {
            background-color: #e7f3ff;
            font-weight: bold;
        }
        
        /* 卡片圓角 */
        .card {
            border-radius: 30px !important;
        }
        
        /* 移動端調整 */
        @media (max-width: 768px) {
            .card-body {
                padding-left: 1.25rem !important;
                padding-right: 1.25rem !important;
            }
        }
    </style>
</head>
<body class="login-page">
    <!-- 返回首頁和語言切換 -->
    <div class="d-flex justify-content-between align-items-center" style="position: absolute; top: 20px; left: 20px; right: 20px; z-index: 1000;">
        <a href="/" class="btn btn-outline-dark btn-sm">
            <i class="bi bi-arrow-left"></i> 返回首頁
        </a>
        <div class="dropdown">
            <a class="btn btn-sm btn-outline-primary dropdown-toggle" href="#" role="button" id="resetLangDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-translate me-1"></i>語言
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="resetLangDropdown">
                <li><a class="dropdown-item" href="#" data-lang="zh">繁體中文</a></li>
                <li><a class="dropdown-item" href="#" data-lang="zh-CN">简体中文</a></li>
                <li><a class="dropdown-item" href="#" data-lang="en">English</a></li>
            </ul>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center min-vh-100" style="padding-top: 10px; padding-bottom: 80px;">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow">
                    <div class="card-body p-4 p-lg-5">
                        <div class="text-center mb-4">
                            <div class="d-flex align-items-end justify-content-center mb-3" style="gap: 8px;">
                                <img src="/static/logo3.png" alt="vWork" style="height: auto; max-height: 32px; display: block;">
                            </div>
                            <h4 class="mb-1">重設密碼</h4>
                            <p class="text-muted mb-0">請輸入新密碼</p>
                        </div>

                        <div id="alertContainer"></div>

                        <form id="resetForm">
                            <input type="hidden" id="token" value="{{.Token}}" />

                            <div class="mb-3">
                                <label for="newPassword" class="form-label">新密碼</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="newPassword" placeholder="至少 6 位" required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                        <i class="bi bi-eye" id="eyeIcon"></i>
                                    </button>
                                </div>
                                <div class="form-text">密碼長度 6-20 位</div>
                            </div>

                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">確認新密碼</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" class="form-control" id="confirmPassword" placeholder="再次輸入" required>
                                </div>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary" style="border-radius: 100px;">
                                    <i class="bi bi-check2-circle"></i> 更新密碼
                                </button>
                            </div>

                            <div class="text-center">
                                <a href="/login" class="text-decoration-none">返回登入</a>
                            </div>
                        </form>
                    </div>
                </div>
                <!-- Footer -->
                <div class="text-center text-muted mt-3">
                    <p class="mb-0 small">© 2025 {{if .CompanyName}}{{.CompanyName}}{{else}}V-sys Limited{{end}}. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/static/vendor/jquery/jquery-3.7.1.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script>
        function showAlert(message, type) {
            const el = document.getElementById('alertContainer');
            el.innerHTML = `
                <div class="alert alert-${type}" role="alert">
                    ${message}
                </div>
            `;
        }

        // Toggle password
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        togglePasswordBtn.addEventListener('click', () => {
            const input = document.getElementById('newPassword');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            eyeIcon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
        });

        // Language switcher
        document.addEventListener('DOMContentLoaded', function() {
            const langItems = document.querySelectorAll('#resetLangDropdown + ul .dropdown-item');
            langItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    const lang = this.getAttribute('data-lang');
                    if (typeof I18n !== 'undefined' && I18n.switchLanguage) {
                        I18n.switchLanguage(lang);
                    }
                });
            });
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = document.getElementById('token').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!token) {
                showAlert('缺少 token，請重新從郵件連結打開此頁面。', 'danger');
                return;
            }
            if (newPassword.length < 6 || newPassword.length > 20) {
                showAlert('密碼長度需為 6-20 位。', 'danger');
                return;
            }
            if (newPassword !== confirmPassword) {
                showAlert('兩次輸入的密碼不一致。', 'danger');
                return;
            }

            try {
                const res = await fetch('/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword })
                });

                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    showAlert(data.error || '重設失敗，請重新申請重置連結。', 'danger');
                    return;
                }

                showAlert('密碼已更新，請返回登入。', 'success');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } catch (err) {
                showAlert('網路錯誤，請稍後再試。', 'danger');
            }
        });
    </script>
</body>
</html>
