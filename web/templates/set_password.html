<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n-title="setPassword.title">設定密碼 - vWork</title>
    <link rel="icon" type="image/png" href="/static/vworkicon.png">
    <link rel="apple-touch-icon" href="/static/vworkicon.png">
    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/vendor/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        /* Set password page background: same as login page */
        body.login-page {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(
                135deg,
                #ffffff 0%,
                #ffffff 40%,
                #f8fafc 65%,
                #eef2ff 82%,
                #ffffff 100%
            );
            background-size: 400% 400%;
            animation: loginGradientFlow 22s ease infinite;
            overflow-x: hidden;
        }
        @keyframes loginGradientFlow {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }
        /* Subtle moving glow blobs */
        body.login-page::before,
        body.login-page::after {
            content: '';
            position: fixed;
            inset: -40%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            animation: loginGlowMove 30s linear infinite;
            opacity: 1;
        }
        body.login-page::after {
            animation-duration: 42s;
            opacity: 0.7;
            filter: blur(2px);
        }
        @keyframes loginGlowMove {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(80px, 60px) scale(1.08) rotate(180deg); }
            100% { transform: translate(0, 0) scale(1) rotate(360deg); }
        }

        /* Keep content above background layers */
        body.login-page > * {
            position: relative;
            z-index: 1;
        }

        /* Card glass feel for readability */
        body.login-page .card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .lang-switcher .btn.active {
            background-color: var(--nir-primary);
            border-color: var(--nir-primary);
            color: white;
        }
        .lang-switcher .btn.active:hover {
            background-color: #e7f3ff;
            font-weight: bold;
        }
        
        /* 卡片圓角 */
        .card {
            border-radius: 30px !important;
        }
        
        /* 移動端調整 */
        @media (max-width: 768px) {
            .card-body {
                padding-left: 1.25rem !important;
                padding-right: 1.25rem !important;
            }
        }
    </style>
</head>
<body class="login-page">
    <div id="alertContainer" class="position-fixed start-50 translate-middle-x" style="z-index: 9999; max-width: 500px; top: 60px; margin-top: 10px;"></div>
    
    <!-- 返回首頁和語言切換 -->
    <div class="d-flex justify-content-between align-items-center" style="position: absolute; top: 20px; left: 20px; right: 20px; z-index: 1000;">
        <a href="/" class="btn btn-outline-dark btn-sm" data-i18n="login.back">
            <i class="bi bi-arrow-left"></i> <span data-i18n="login.back">返回</span>
        </a>
        <div class="dropdown">
            <a class="btn btn-sm btn-outline-primary dropdown-toggle" href="#" role="button" id="setPasswordLangDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-globe2 me-1"></i><span data-i18n="nav.language">語言</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="setPasswordLangDropdown">
                <li><a class="dropdown-item" href="#" data-lang="zh">繁體中文</a></li>
                <li><a class="dropdown-item" href="#" data-lang="zh-CN">简体中文</a></li>
                <li><a class="dropdown-item" href="#" data-lang="en">English</a></li>
            </ul>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center min-vh-100" style="padding-top: 10px; padding-bottom: 80px;">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-4 p-lg-5">
                        <div class="text-center mb-4">
                            <div class="d-flex align-items-end justify-content-center mb-3" style="gap: 8px;">
                                <img src="/static/logo3.png" alt="vWork" style="height: auto; max-height: 32px; display: block;">
                            </div>
                            <h4 class="mb-1" data-i18n="setPassword.title">設定密碼</h4>
                            <p class="text-muted mb-0" data-i18n="setPassword.subtitle">完成帳號設定以加入團隊</p>
                            {{if .TenantName}}
                            <div class="alert alert-info mt-2 mb-0" style="font-size: 0.875rem;">
                                <i class="bi bi-building me-1"></i>
                                <span data-i18n="setPassword.joiningTenant">您即將加入</span>: <strong>{{.TenantName}}</strong>
                            </div>
                            {{end}}
                        </div>

                        <!-- 無效或過期的 Token -->
                        <div id="invalidTokenMessage" style="display: none;">
                            <div class="alert alert-danger text-center">
                                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                                <span data-i18n="setPassword.invalidToken">此連結無效或已過期。請聯繫管理員重新發送邀請。</span>
                            </div>
                            <div class="text-center mt-3">
                                <a href="/login" class="btn btn-primary" style="border-radius: 100px;">
                                    <i class="bi bi-box-arrow-in-right"></i>
                                    <span data-i18n="setPassword.goToLogin">前往登入</span>
                                </a>
                            </div>
                        </div>

                        <!-- 設定密碼表單 -->
                        <div id="setPasswordContainer">
                            <form id="setPasswordForm">
                                <input type="hidden" id="token" value="{{.Token}}" />

                                <div class="mb-3">
                                    <label for="newPassword" class="form-label" data-i18n="setPassword.newPassword">新密碼</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input type="password" class="form-control" id="newPassword" data-i18n-placeholder="setPassword.passwordPlaceholder" placeholder="至少 6 位" required>
                                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                            <i class="bi bi-eye" id="eyeIcon"></i>
                                        </button>
                                    </div>
                                    <div class="form-text" data-i18n="setPassword.passwordHint">密碼長度 6-20 位</div>
                                </div>

                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label" data-i18n="setPassword.confirmPassword">確認密碼</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                        <input type="password" class="form-control" id="confirmPassword" data-i18n-placeholder="setPassword.confirmPlaceholder" placeholder="再次輸入" required>
                                    </div>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-primary" style="border-radius: 100px;">
                                        <i class="bi bi-check2-circle"></i>
                                        <span data-i18n="setPassword.setPasswordBtn">設定密碼</span>
                                    </button>
                                </div>
                            </form>
                            
                            <div class="position-relative mb-3">
                                <hr>
                                <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small" data-i18n="login.or">或</span>
                            </div>
                            
                            <div class="d-grid mb-3">
                                <button type="button" class="btn btn-outline-secondary" id="btnGoogleLogin" style="border-radius: 100px;">
                                    <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right: 8px; vertical-align: middle;">
                                        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                                        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                                        <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.348 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
                                        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
                                    </svg>
                                    <span data-i18n="setPassword.googleLogin">使用 Google 帳號登入</span>
                                </button>
                            </div>

                            <div class="text-center">
                                <a href="/login" class="text-decoration-none" data-i18n="setPassword.alreadyHaveAccount">已有帳戶？返回登入</a>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Footer -->
                <div class="text-center text-muted mt-3">
                    <p class="mb-0 small">© 2025 {{if .CompanyName}}{{.CompanyName}}{{else}}V-sys Limited{{end}}. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/static/vendor/jquery/jquery-3.7.1.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script>
        // i18n helper
        const t = (key, fallback) => {
            try {
                if (typeof I18n === 'undefined' || !I18n.t) return (fallback ?? key);
                const v = I18n.t(key);
                if (!v || v === key) return (fallback ?? key);
                return v;
            } catch (_e) {
                return (fallback ?? key);
            }
        };

        // Toggle password visibility
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        if (togglePasswordBtn) {
            togglePasswordBtn.addEventListener('click', () => {
                const input = document.getElementById('newPassword');
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                eyeIcon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
            });
        }

        // Language switcher
        document.addEventListener('DOMContentLoaded', function() {
            const langItems = document.querySelectorAll('#setPasswordLangDropdown + ul .dropdown-item');
            langItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    const lang = this.getAttribute('data-lang');
                    if (typeof I18n !== 'undefined' && I18n.switchLanguage) {
                        I18n.switchLanguage(lang);
                    }
                });
            });

            // Check if token is valid
            const token = document.getElementById('token').value.trim();
            if (!token) {
                document.getElementById('setPasswordContainer').style.display = 'none';
                document.getElementById('invalidTokenMessage').style.display = 'block';
            }
        });

        // Set password form submission
        document.getElementById('setPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = document.getElementById('token').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!token) {
                App.showAlert(t('setPassword.invalidToken', '連結無效，請重新從郵件打開'), 'danger');
                return;
            }
            if (newPassword.length < 6 || newPassword.length > 20) {
                App.showAlert(t('setPassword.passwordLengthError', '密碼長度需為 6-20 位'), 'danger');
                return;
            }
            if (newPassword !== confirmPassword) {
                App.showAlert(t('setPassword.passwordMismatch', '兩次輸入的密碼不一致'), 'danger');
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> ' + t('setPassword.setting', '設定中...');

            try {
                // Use the same reset password API (token is already associated with user)
                const res = await fetch('/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword })
                });

                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    App.showAlert(data.error || t('setPassword.setFailed', '設定失敗，請重新申請邀請連結'), 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                    return;
                }

                App.showAlert(t('setPassword.success', '密碼設定成功！正在跳轉到登入頁面...'), 'success');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } catch (err) {
                App.showAlert(t('setPassword.networkError', '網路錯誤，請稍後再試'), 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // Google OAuth configuration
        let googleOAuthConfig = null;
        let googleClientID = null;

        // Load Google OAuth config
        async function loadGoogleOAuthConfig() {
            try {
                const response = await fetch('/api/v1/auth/google/config');
                if (response.ok) {
                    const data = await response.json();
                    googleOAuthConfig = data;
                    googleClientID = data.client_id;
                    
                    if (data.enabled && data.client_id) {
                        const waitForGoogleSDK = (maxAttempts = 20, attempt = 0) => {
                            if (window.google && window.google.accounts && window.google.accounts.id) {
                                initializeGoogleSignIn();
                            } else if (attempt < maxAttempts) {
                                setTimeout(() => waitForGoogleSDK(maxAttempts, attempt + 1), 500);
                            }
                        };
                        waitForGoogleSDK();
                    }
                }
            } catch (error) {
                console.error('Failed to load Google OAuth config:', error);
            }
        }

        // Initialize Google Sign-In
        function initializeGoogleSignIn() {
            if (!googleClientID) return;
            
            try {
                window.google.accounts.id.initialize({
                    client_id: googleClientID,
                    callback: handleGoogleSignIn,
                    auto_select: false,
                    cancel_on_tap_outside: true,
                    itp_support: true,
                    use_fedcm_for_prompt: false
                });
                
                window.google.accounts.id.disableAutoSelect();
            } catch (error) {
                console.error('Failed to initialize Google Sign-In:', error);
            }
        }

        // Handle Google Sign-In callback
        async function handleGoogleSignIn(response) {
            try {
                if (!response.credential) {
                    throw new Error('No credential received from Google');
                }

                // Send to backend
                const apiResponse = await fetch('/api/v1/auth/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });

                const data = await apiResponse.json();

                if (!apiResponse.ok) {
                    throw new Error(data.error || 'Google login failed');
                }

                // Save token and user info
                if (data.token) {
                    localStorage.setItem('auth_token', data.token);
                }
                if (data.user) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                }
                if (data.tenant) {
                    if (data.tenant.subdomain) localStorage.setItem('tenant_subdomain', data.tenant.subdomain);
                    if (data.tenant.id) localStorage.setItem('tenant_id', data.tenant.id);
                    if (data.tenant.name) localStorage.setItem('tenant_name', data.tenant.name);
                }

                // Redirect
                if (data.requires_setup) {
                    window.location.replace(getSetupTenantUrl());
                } else {
                    window.location.replace(getProductRedirectUrl());
                }

            } catch (error) {
                console.error('Google login error:', error);
                App.showAlert(error.message || t('login.googleLoginFailed', 'Google 登錄失敗，請稍後再試'), 'danger');
            }
        }

        // Trigger Google Sign-In
        function triggerGoogleSignIn() {
            if (!googleOAuthConfig || !googleOAuthConfig.enabled) {
                App.showAlert(t('login.googleOAuthNotEnabled', 'Google 登錄功能未啟用'), 'warning');
                return;
            }

            if (!googleClientID) {
                App.showAlert(t('login.googleOAuthNotConfigured', 'Google 登錄未配置'), 'warning');
                return;
            }

            if (!window.google || !window.google.accounts || !window.google.accounts.id) {
                App.showAlert(t('login.googleSDKNotLoaded', 'Google 登錄 SDK 未加載，請稍候再試'), 'warning');
                return;
            }

            try {
                // Create hidden container for button
                let container = document.getElementById('google-signin-button-hidden');
                if (!container) {
                    container = document.createElement('div');
                    container.id = 'google-signin-button-hidden';
                    container.style.display = 'none';
                    container.style.position = 'absolute';
                    container.style.top = '-9999px';
                    container.style.left = '-9999px';
                    document.body.appendChild(container);
                }
                container.innerHTML = '';

                setTimeout(() => {
                    try {
                        window.google.accounts.id.renderButton(container, {
                            theme: 'outline',
                            size: 'large',
                            text: 'signin_with',
                            width: 300,
                            type: 'standard'
                        });
                        
                        setTimeout(() => {
                            const button = container.querySelector('div[role="button"]');
                            if (button) {
                                button.click();
                            } else {
                                App.showAlert(t('login.googleLoginFailed', 'Google 登錄失敗，請稍後再試'), 'danger');
                            }
                        }, 200);
                    } catch (renderError) {
                        console.error('Failed to render button:', renderError);
                        App.showAlert(t('login.googleLoginFailed', 'Google 登錄失敗，請稍後再試'), 'danger');
                    }
                }, 100);
            } catch (error) {
                console.error('Google sign-in error:', error);
                App.showAlert(error.message || t('login.googleLoginFailed', 'Google 登錄失敗，請稍後再試'), 'danger');
            }
        }

        // Google login button
        const btnGoogleLogin = document.getElementById('btnGoogleLogin');
        if (btnGoogleLogin) {
            btnGoogleLogin.addEventListener('click', triggerGoogleSignIn);
        }

        // Load Google OAuth config on page load
        loadGoogleOAuthConfig();
    </script>
</body>
</html>
