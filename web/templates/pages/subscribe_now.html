<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇訂閱方案 - vWork</title>
    <link rel="icon" type="image/png" href="/static/vworkicon.png">
    <link rel="apple-touch-icon" href="/static/vworkicon.png">
    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/vendor/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <style>
        

        body {
            margin: 0;
            padding: 0;
            background: #F5F5F8;
        }

        .subscribe-modal {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .subscribe-content {
            background: white;
            border-radius: 0.75rem;
            padding: 2rem;
            max-width: 1100px;
            width: 100%;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .subscribe-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .subscribe-logo img {
            height: 24px;
            width: auto;
        }

        @media (max-width: 768px) {
            .subscribe-modal {
                padding: 0;
            }
            .subscribe-content {
                max-width: 100%;
                border-radius: 0;
                min-height: 100vh;
                padding: 1rem;
            }
            .subscribe-logo img {
                height: 18px;
            }
        }

        .subscribe-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .subscribe-content h1 {
            color: #1e293b;
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .subscribe-content .subtitle {
            color: #64748b;
            font-size: 0.9375rem;
            margin-bottom: 0.25rem;
        }

        .subscribe-content .help-text {
            color: #94a3b8;
            font-size: 0.8125rem;
            margin-top: 0.25rem;
        }

        .plan-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 1.25rem;
            margin: 2rem 0;
            justify-content: center;
        }

        .plan-card {
            flex: 1 1 280px;
            min-width: 280px;
            max-width: 100%;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        @media (max-width: 768px) {
            .plan-cards {
                flex-direction: column;
            }
            .plan-card {
                flex: 1 1 100%;
                min-width: 100%;
                max-width: 100%;
            }
        }

        .plan-card:hover {
            border-color: #0d6efd;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.15);
        }

        .plan-card.selected {
            border-color: #0d6efd;
            background: rgba(13, 110, 253, 0.05);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.15);
        }

        .plan-card.selected::before {
            content: '\2713';
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 24px;
            height: 24px;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: bold;
        }

        .plan-card h3 {
            color: #1e293b;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 1.125rem;
        }

        .plan-card .price {
            font-size: 2rem;
            font-weight: 700;
            color: #0d6efd;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .plan-card .price .period {
            font-size: 0.9375rem;
            font-weight: 400;
            color: #64748b;
        }

        .plan-card .features {
            list-style: none;
            padding: 0;
            margin: 1.25rem 0;
            text-align: left;
        }

        .plan-card .features li {
            padding: 0.5rem 0;
            color: #475569;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
        }

        .plan-card .features li:before {
            content: "\2713";
            color: #10b981;
            font-weight: bold;
            margin-right: 0.75rem;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .btn-subscribe {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: #0d6efd;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1.5rem;
        }

        .btn-subscribe:hover:not(:disabled) {
            background: #0b5ed7;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
        }

        .btn-subscribe:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #94a3b8;
        }

        .skip-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 1.25rem;
            padding: 0.75rem 2rem;
            border: 2px solid #cbd5e1;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
            gap: 0.4rem;
        }

        .skip-link:hover {
            color: #0d6efd;
            border-color: #0d6efd;
            background: #f0f6ff;
        }

        .addon-checkbox {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        .addon-checkbox:hover {
            border-color: #0d6efd;
            background: rgba(13, 110, 253, 0.03);
        }

        .addon-checkbox.checked {
            border-color: #0d6efd;
            background: rgba(13, 110, 253, 0.05);
        }

        .addon-checkbox input[type="checkbox"] {
            margin-top: 0.2rem;
            width: 1.125rem;
            height: 1.125rem;
            flex-shrink: 0;
            accent-color: #0d6efd;
            cursor: pointer;
        }

        .addon-checkbox .addon-info {
            flex: 1;
        }

        .addon-checkbox .addon-title {
            font-weight: 600;
            font-size: 0.9375rem;
            color: #1e293b;
            margin-bottom: 0.125rem;
        }

        .addon-checkbox .addon-desc {
            font-size: 0.8125rem;
            color: #64748b;
            margin: 0;
        }

        .addon-checkbox .addon-price {
            font-weight: 700;
            color: #0d6efd;
            font-size: 0.9375rem;
            white-space: nowrap;
        }

        .addon-terms {
            display: none;
            margin-top: 0.5rem;
            padding: 0.5rem 1rem;
            font-size: 0.8125rem;
            color: #475569;
        }

        .addon-terms.show {
            display: block;
        }

        .addon-terms a {
            color: #0d6efd;
            text-decoration: underline;
            cursor: pointer;
        }

        .terms-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .terms-modal-overlay.show {
            display: flex;
        }

        .terms-modal-box {
            background: white;
            border-radius: 0.75rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .terms-modal-box h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .terms-modal-box ul {
            list-style: disc;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .terms-modal-box ul li {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #334155;
        }

        .company-info-form {
            margin-top: 1rem;
        }

        .company-info-form textarea {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.875rem;
            resize: vertical;
            min-height: 60px;
        }

        .company-info-form input[type="file"] {
            margin-top: 0.5rem;
            font-size: 0.8125rem;
        }

        .congrats-banner {
            background: linear-gradient(135deg, #0d6efd 0%, #6366f1 100%);
            color: white;
            border-radius: 0.75rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .congrats-banner h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: white;
        }

        .congrats-banner p {
            font-size: 0.875rem;
            margin: 0;
            opacity: 0.9;
        }

        /* Pill-style billing toggle (matching homepage) */
        .pricing-toggle {
            display: inline-flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 100px;
            padding: 4px;
            gap: 0;
            position: relative;
        }
        .pricing-toggle-opt {
            position: relative;
            z-index: 1;
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            background: transparent;
            color: #64748b;
            border-radius: 100px;
            cursor: pointer;
            transition: color 0.25s ease;
            white-space: nowrap;
        }
        .pricing-toggle-opt.active {
            color: #fff;
        }
        .pricing-toggle-slider {
            position: absolute;
            top: 4px;
            height: calc(100% - 8px);
            border-radius: 100px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.35);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
        }
        .pricing-toggle-save {
            display: inline-block;
            margin-left: 0.75rem;
            padding: 0.25rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #059669;
            background: rgba(5, 150, 105, 0.1);
            border-radius: 100px;
            letter-spacing: 0.01em;
        }
    </style>
</head>
<body>

            <button class="btn-subscribe" id="subscribeBtn" disabled>
                選擇方案以繼續
            </button>

            <div class="text-center">
                <a href="/dashboard" class="skip-link" id="skipLink">
                    <i class="bi bi-arrow-right me-1"></i> 返回系統
                </a>
            </div>
        </div>
    </div>

    <script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script>
        var selectedPlanId = 'vsuite_pro_plus_yearly';
        var isYearly = true;
        var addWebsite = false;

        function toggleAddonWebsite() {
            var cb = document.getElementById('addonWebsiteCheck');
            if (cb && cb.disabled) return;
            var label = document.getElementById('addonWebsite');
            var termsBox = document.getElementById('addonTerms');
            // The label click will toggle the checkbox, so read the NEW state after toggle
            setTimeout(function() {
                addWebsite = cb.checked;
                if (addWebsite) {
                    label.classList.add('checked');
                    if (termsBox) termsBox.classList.add('show');
                } else {
                    label.classList.remove('checked');
                    if (termsBox) termsBox.classList.remove('show');
                    var tc = document.getElementById('addonTermsCheck');
                    if (tc) tc.checked = false;
                }
                updateSubscribeButton();
            }, 0);
        }

        function showTermsPopup(e) {
            if (e) e.preventDefault();
            if (e) e.stopPropagation();
            document.getElementById('termsOverlay').classList.add('show');
        }

        function closeTermsPopup(agree) {
            document.getElementById('termsOverlay').classList.remove('show');
            if (agree) {
                var tc = document.getElementById('addonTermsCheck');
                if (tc) tc.checked = true;
                updateSubscribeButton();
            }
        }

        function showCompanyInfoModal() {
            document.getElementById('companyInfoOverlay').classList.add('show');
        }

        function skipCompanyInfo(e) {
            if (e) e.preventDefault();
            document.getElementById('companyInfoOverlay').classList.remove('show');
            proceedToCheckout();
        }

        async function submitCompanyInfo() {
            var link = (document.getElementById('companyLink').value || '').trim();
            var files = document.getElementById('companyFiles').files;

            if (!link && files.length === 0) {
                skipCompanyInfo();
                return;
            }

            try {
                var token = localStorage.getItem('auth_token');
                var headers = {};
                if (token && token !== 'temp_token') {
                    headers['Authorization'] = 'Bearer ' + token;
                }

                var formData = new FormData();
                if (link) formData.append('company_link', link);
                for (var i = 0; i < files.length; i++) {
                    formData.append('files', files[i]);
                }
                formData.append('purchase_type', 'tailor_made_website');

                await fetch('/api/v1/hardware-purchase/submit-company-info', {
                    method: 'POST',
                    headers: headers,
                    credentials: 'same-origin',
                    body: formData
                });
            } catch (_e) {}

            document.getElementById('companyInfoOverlay').classList.remove('show');
            proceedToCheckout();
        }

        // Store pending checkout data when website addon is selected
        var pendingCheckoutData = null;

        function proceedToCheckout() {
            if (pendingCheckoutData && pendingCheckoutData.checkout_url) {
                window.location.href = pendingCheckoutData.checkout_url;
            }
        }

        var plans = { vsuite_pro_plus: {
                name: 'vSuite Pro+',
                monthlyPrice: '$2,500',
                yearlyPrice: '$2,200',
                period: '/月',
                yearlyTotal: '年付 $26,400',
                badge: '最強方案',
                badgeClass: 'bg-warning text-dark',
                yearlySavings: '節省 $3,600/年',
                features: [
                    '所有 vSuite Pro 功能',
                    '每月 3,000 vCoins',
                    'vAi 影片生成',
                    '自動搵客 Lead Finder',
                    'vOffice - AI 智慧辦公',
                    'vMarket - 商品市集',
                    '企業支援服務',
                    '資料遺失防護',
                    '安全控管服務'
                ]
            }
        };

        function getPlanId(tier) {
            return tier + (isYearly ? '_yearly' : '_monthly');
        }

        function renderPlans() {
            var planCards = document.getElementById('planCards');

            // Pill-style toggle (matching homepage)
            var html = '<div class="d-flex justify-content-center align-items-center mb-3 w-100">';
            html += '<div class="pricing-toggle" id="pricingToggle">';
            html += '<div class="pricing-toggle-slider" id="pricingToggleSlider"></div>';
            html += '<button type="button" class="pricing-toggle-opt' + (!isYearly ? ' active' : '') + '" id="pricingOptMonthly" onclick="toggleBilling(false)">月付</button>';
            html += '<button type="button" class="pricing-toggle-opt' + (isYearly ? ' active' : '') + '" id="pricingOptYearly" onclick="toggleBilling(true)">年付</button>';
            html += '</div>';
            html += '<span class="pricing-toggle-save" id="pricingToggleSave">' + (isYearly ? '年付更優惠' : '沒有優惠') + '</span>';
            html += '</div>';

            // Plan cards
            var tiers = Object.keys(plans);
            for (var t = 0; t < tiers.length; t++) {
                var tier = tiers[t];
                var plan = plans[tier];
                var planId = getPlanId(tier);
                var price = isYearly ? plan.yearlyPrice : plan.monthlyPrice;
                html += '<div class="plan-card ' + (selectedPlanId === planId ? 'selected' : '') + '" data-plan-id="' + planId + '" onclick="selectPlan(\'' + planId + '\')">';
                html += '<div class="badge ' + plan.badgeClass + ' mb-2">' + plan.badge + '</div>';
                html += '<h3>' + plan.name + '</h3>';
                html += '<div class="price">' + price + '<span class="period">' + plan.period + '</span></div>';
                if (isYearly && plan.yearlyTotal) {
                    html += '<div class="text-muted small mb-2">' + plan.yearlyTotal + '</div>';
                }
                if (isYearly && plan.yearlySavings) {
                    html += '<div class="alert alert-success py-2 px-3 mb-2" style="font-size: 0.875rem;"><strong>' + plan.yearlySavings + '</strong></div>';
                }
                html += '<ul class="features">';
                for (var f = 0; f < plan.features.length; f++) {
                    html += '<li>' + plan.features[f] + '</li>';
                }
                html += '</ul></div>';
            }

            planCards.innerHTML = html;
            updateSubscribeButton();
        }

        function toggleBilling(yearly) {
            isYearly = yearly;
            var currentTier = selectedPlanId.replace('_monthly', '').replace('_yearly', '');
            selectedPlanId = getPlanId(currentTier);
            renderPlans();
            setTimeout(positionPricingSlider, 0);
        }

        function positionPricingSlider() {
            var slider = document.getElementById('pricingToggleSlider');
            var optM = document.getElementById('pricingOptMonthly');
            var optY = document.getElementById('pricingOptYearly');
            if (!slider || !optM || !optY) return;
            var active = isYearly ? optY : optM;
            slider.style.left = active.offsetLeft + 'px';
            slider.style.width = active.offsetWidth + 'px';
            // Update save tag
            var saveTag = document.getElementById('pricingToggleSave');
            if (saveTag) {
                if (isYearly) {
                    saveTag.textContent = '年付更優惠';
                    saveTag.style.color = '#059669';
                    saveTag.style.background = 'rgba(5, 150, 105, 0.1)';
                } else {
                    saveTag.textContent = '沒有優惠';
                    saveTag.style.color = '#94a3b8';
                    saveTag.style.background = 'rgba(148, 163, 184, 0.1)';
                }
            }
        }

        function updateSubscribeButton() {
            var subscribeBtn = document.getElementById('subscribeBtn');
            var termsCheck = document.getElementById('addonTermsCheck');
            var websiteCheck = document.getElementById('addonWebsiteCheck');
            // If website addon is checked, terms must also be checked
            var termsOk = !websiteCheck || !websiteCheck.checked || (termsCheck && termsCheck.checked);

            if (selectedPlanId && termsOk) {
                var tier = selectedPlanId.replace('_monthly', '').replace('_yearly', '');
                var planName = plans[tier] ? plans[tier].name : selectedPlanId;
                subscribeBtn.disabled = false;
                subscribeBtn.textContent = '立即訂閱 ' + planName;
            } else {
                subscribeBtn.disabled = true;
                if (selectedPlanId && !termsOk) {
                    subscribeBtn.textContent = '請先同意訂製網站條款';
                } else {
                    subscribeBtn.textContent = '選擇方案以繼續';
                }
            }
        }

        function selectPlan(planId) {
            selectedPlanId = planId;
            var cards = document.querySelectorAll('.plan-card');
            for (var i = 0; i < cards.length; i++) {
                cards[i].classList.remove('selected');
            }
            var selectedCard = document.querySelector('[data-plan-id="' + planId + '"]');
            if (selectedCard) {
                selectedCard.classList.add('selected');
            }
            updateSubscribeButton();
        }

        // Determine skip destination based on product param
        function getSkipDestination() {
            var urlParams = new URLSearchParams(window.location.search);
            var product = urlParams.get('product');
            if (product === 'vmarket') return '/vmarket-search';
            if (product === 'vai') return '/vai-chat';
            if (product === 'voffice') return '/voffice-download';
            return '/industry-template-selector';
        }

        // Update skip link href
        var skipLink = document.getElementById('skipLink');
        if (skipLink) {
            skipLink.href = getSkipDestination();
        }

        renderPlans();

        // Detect if website service was already purchased
        (async function() {
            try {
                var token = localStorage.getItem('auth_token');
                if (!token || token === 'temp_token') return;
                var resp = await fetch('/api/v1/hardware-purchase/records', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!resp.ok) return;
                var records = await resp.json().catch(function() { return {}; });
                var recordList = (records && Array.isArray(records.data)) ? records.data : (Array.isArray(records) ? records : []);
                if (recordList.length === 0) return;
                var purchased = recordList.some(function(r) {
                    return r.status === 'paid' && r.items && r.items.some(function(item) {
                        return item.id === 'tailor_made_website';
                    });
                });
                if (purchased) {
                    var addonCheck = document.getElementById('addonWebsiteCheck');
                    if (addonCheck) addonCheck.disabled = true;
                    var addonBox = document.getElementById('addonWebsite');
                    if (addonBox) {
                        addonBox.style.cursor = 'default';
                        addonBox.style.opacity = '0.6';
                    }
                    var addonTitle = addonBox && addonBox.querySelector('.addon-title');
                    if (addonTitle) addonTitle.innerHTML += ' <span class="badge bg-success" style="font-size:0.75rem;vertical-align:middle;">已購買</span>';
                    var addonPrice = addonBox && addonBox.querySelector('.addon-price');
                    if (addonPrice) addonPrice.style.display = 'none';
                    // Hide terms when already purchased
                    var termsBox = document.getElementById('addonTerms');
                    if (termsBox) termsBox.style.display = 'none';
                    addWebsite = false;
                }
            } catch (_e) {}
        })();
    </script>
</body>
</html>
{{end}}
