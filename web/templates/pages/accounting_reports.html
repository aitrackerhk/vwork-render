{{ define "pages/accounting_reports" }}
<style>
    .report-header {
        background: linear-gradient(135deg, #0f4c81 0%, #1a759f 100%);
        color: #fff;
        border-radius: 12px;
        padding: 1.2rem;
        margin-bottom: 1.2rem;
    }
    .report-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
    }
    .report-card {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
    }
    .report-card .card-body {
        padding: 1rem;
    }
    .metric-box {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 0.75rem;
        background: #f8fafc;
    }
    .summary-table td,
    .summary-table th {
        padding: 0.4rem 0.6rem;
        font-size: 0.9rem;
    }
    @media (max-width: 992px) {
        .report-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="container-fluid">
    <div class="report-header">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <h3 class="mb-1"><i class="bi bi-file-earmark-bar-graph me-2"></i>專業會計報表中心</h3>
                <div class="small text-white-50">支援損益表、資產負債表、現金流、應收/應付帳齡與稅務摘要</div>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-light" id="btnInitDefaultAccounts">
                    <i class="bi bi-diagram-3"></i> 初始化預設會計科目
                </button>
                <a class="btn btn-outline-light" href="/posting-rules">
                    <i class="bi bi-diagram-2"></i> 過帳規則
                </a>
                <button class="btn btn-outline-light" id="btnBackfillEntries">
                    <i class="bi bi-arrow-repeat"></i> 補過帳歷史資料
                </button>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-3" id="setupStatusCards">
                <div class="col-md-3 col-6">
                    <div class="metric-box">
                        <div class="text-muted small">科目數量</div>
                        <div class="fw-bold fs-5" id="metricAccountCount">-</div>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="metric-box">
                        <div class="text-muted small">過帳規則</div>
                        <div class="fw-bold fs-5" id="metricRuleCount">-</div>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="metric-box">
                        <div class="text-muted small">已過帳收入</div>
                        <div class="fw-bold fs-5" id="metricIncomePosted">-</div>
                    </div>
                </div>
                <div class="col-md-3 col-6">
                    <div class="metric-box">
                        <div class="text-muted small">已過帳支出</div>
                        <div class="fw-bold fs-5" id="metricExpensePosted">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-bold">開始日期</label>
                    <input type="date" class="form-control" id="reportStartDate">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">結束日期</label>
                    <input type="date" class="form-control" id="reportEndDate">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">報表類型</label>
                    <select class="form-select" id="reportType">
                        <option value="profit-loss">損益表 (P&L)</option>
                        <option value="balance-sheet">資產負債表</option>
                        <option value="cash-flow">現金流量表</option>
                        <option value="ar-aging">應收帳款帳齡分析</option>
                        <option value="ap-aging">應付帳款帳齡分析</option>
                        <option value="tax-summary">稅務摘要報告</option>
                    </select>
                </div>
                <div class="col-md-3 d-grid">
                    <button class="btn btn-primary" id="btnLoadReport"><i class="bi bi-search"></i> 產生報表</button>
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-outline-success" id="btnExportExcel" disabled><i class="bi bi-file-earmark-excel"></i> 匯出 Excel</button>
                <button class="btn btn-outline-danger" id="btnExportPDF" disabled><i class="bi bi-file-earmark-pdf"></i> 匯出 PDF</button>
            </div>
        </div>
    </div>

    <div class="report-grid">
        <div class="report-card">
            <div class="card-body">
                <h5 class="mb-3"><i class="bi bi-clipboard-data me-2"></i>報表摘要</h5>
                <div id="reportMeta" class="small text-muted mb-2">請先選擇日期並產生報表</div>
                <div class="table-responsive">
                    <table class="table table-sm summary-table mb-0">
                        <thead>
                            <tr>
                                <th>項目</th>
                                <th class="text-end">金額</th>
                            </tr>
                        </thead>
                        <tbody id="summaryBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="report-card">
            <div class="card-body">
                <h5 class="mb-3"><i class="bi bi-table me-2"></i>明細資料（前 100 筆）</h5>
                <div class="table-responsive">
                    <table class="table table-sm align-middle mb-0" id="detailTable">
                        <thead id="detailHead"></thead>
                        <tbody id="detailBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentReportType = '';
    let currentQuery = '';
    let isAccountsInitialized = false;

    function currency(v) {
        const n = Number(v || 0);
        return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function qs(params) {
        const q = new URLSearchParams(params);
        return q.toString();
    }

    async function loadReport() {
        try {
            const type = document.getElementById('reportType').value;
            const start = document.getElementById('reportStartDate').value;
            const end = document.getElementById('reportEndDate').value;

            const query = qs({ start_date: start, end_date: end });
            const data = await App.apiRequest(`/accounting/reports/${type}?${query}`);

            currentReportType = type;
            currentQuery = query;

            const summaryBody = document.getElementById('summaryBody');
            summaryBody.innerHTML = '';
            const keys = Object.keys(data.summary || {}).sort();
            keys.forEach((k) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${k}</td><td class="text-end fw-semibold">${currency(data.summary[k])}</td>`;
                summaryBody.appendChild(tr);
            });

            const meta = document.getElementById('reportMeta');
            const p = data.period || {};
            meta.textContent = `${data.title || ''} | ${p.start_date || p.as_of_date || ''}${p.end_date ? ' ~ ' + p.end_date : ''}`;

            const rows = (data.rows || []).slice(0, 100);
            const head = document.getElementById('detailHead');
            const body = document.getElementById('detailBody');
            head.innerHTML = '';
            body.innerHTML = '';

            if (rows.length === 0) {
                body.innerHTML = '<tr><td class="text-muted">無資料</td></tr>';
            } else {
                const cols = Object.keys(rows[0]);
                head.innerHTML = '<tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr>';
                rows.forEach((r) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = cols.map(c => `<td>${r[c] ?? ''}</td>`).join('');
                    body.appendChild(tr);
                });
            }

            document.getElementById('btnExportExcel').disabled = false;
            document.getElementById('btnExportPDF').disabled = false;
        } catch (e) {
            App.showAlert('載入報表失敗: ' + e.message, 'danger');
        }
    }

    function initDefaultDates() {
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
        document.getElementById('reportStartDate').value = firstDay.toISOString().slice(0, 10);
        document.getElementById('reportEndDate').value = now.toISOString().slice(0, 10);
    }

    async function initDefaultAccounts() {
        if (isAccountsInitialized) {
            App.showAlert('預設會計科目已初始化，無需重複操作', 'info');
            return;
        }
        try {
            const resp = await App.apiRequest('/accounts/initialize-default', { method: 'POST' });
            if (resp && resp.initialized) {
                isAccountsInitialized = true;
                updateInitButtonState();
                App.showAlert('初始化完成：已建立科目、規則並補過帳歷史資料', 'success');
            } else {
                isAccountsInitialized = true;
                updateInitButtonState();
                App.showAlert('預設會計科目已存在，已停用重複初始化', 'info');
            }
            await loadSetupStatus();
        } catch (e) {
            App.showAlert('初始化失敗: ' + e.message, 'warning');
        }
    }

    async function checkAccountsInitialized() {
        try {
            const resp = await App.apiRequest('/accounts?limit=1');
            const total = Number(resp && resp.total ? resp.total : 0);
            isAccountsInitialized = total > 0;
            updateInitButtonState();
        } catch (e) {
            console.warn('檢查會計科目初始化狀態失敗:', e);
        }
    }

    async function loadSetupStatus() {
        try {
            const s = await App.apiRequest('/accounting/setup-status');
            document.getElementById('metricAccountCount').textContent = String(s.account_count || 0);
            document.getElementById('metricRuleCount').textContent = String(s.posting_rule_count || 0);
            document.getElementById('metricIncomePosted').textContent = String(s.income_posted_count || 0);
            document.getElementById('metricExpensePosted').textContent = String(s.expense_posted_count || 0);
        } catch (e) {
            console.warn('載入 setup status 失敗', e);
        }
    }

    async function backfillEntries() {
        try {
            const resp = await App.apiRequest('/accounting/backfill', { method: 'POST' });
            App.showAlert(`補過帳完成：收入 ${resp.income_posted || 0} 筆，支出 ${resp.expense_posted || 0} 筆`, 'success');
            await loadSetupStatus();
        } catch (e) {
            App.showAlert('補過帳失敗: ' + e.message, 'danger');
        }
    }

    function updateInitButtonState() {
        const btn = document.getElementById('btnInitDefaultAccounts');
        if (!btn) return;
        if (isAccountsInitialized) {
            btn.disabled = true;
            btn.classList.remove('btn-light');
            btn.classList.add('btn-outline-light');
            btn.innerHTML = '<i class="bi bi-check-circle"></i> 已初始化預設會計科目';
            btn.title = '已初始化，不可重複執行';
        } else {
            btn.disabled = false;
            btn.classList.remove('btn-outline-light');
            btn.classList.add('btn-light');
            btn.innerHTML = '<i class="bi bi-diagram-3"></i> 初始化預設會計科目';
            btn.title = '';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (!App.checkAuth()) return;

        initDefaultDates();
        checkAccountsInitialized();
        loadSetupStatus();
        document.getElementById('btnLoadReport').addEventListener('click', loadReport);
        document.getElementById('btnInitDefaultAccounts').addEventListener('click', initDefaultAccounts);
        document.getElementById('btnBackfillEntries').addEventListener('click', backfillEntries);

        document.getElementById('btnExportExcel').addEventListener('click', function() {
            if (!currentReportType) return;
            window.open(`/api/v1/accounting/reports/${currentReportType}/export/excel?${currentQuery}`, '_blank');
        });
        document.getElementById('btnExportPDF').addEventListener('click', function() {
            if (!currentReportType) return;
            window.open(`/api/v1/accounting/reports/${currentReportType}/export/pdf?${currentQuery}`, '_blank');
        });
    });
</script>
{{ end }}
