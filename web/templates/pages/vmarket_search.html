{{define "pages/vmarket_search"}}
<div class="container-fluid py-4">
    <div class="row mb-4">
        <div class="col-12">
            <h3 class="fw-semibold" data-i18n="vmarket.search.pageTitle">找尋公司與服務</h3>
            <p class="text-muted" data-i18n="vmarket.search.pageSubtitle">搜尋並瀏覽各家公司的精選商品與專業服務。</p>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="row mb-4">
        <div class="col-12 col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-start-0" id="vmarketCmsSearchInput" data-i18n-placeholder="vmarket.search.searchPlaceholder" placeholder="搜尋商品名稱、服務項目或公司名稱...">
                        <button class="btn btn-dark" type="button" id="vmarketCmsSearchBtn" data-i18n="vmarket.home.searchButton">搜尋</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Categories -->
    <div class="row mb-4">
        <div class="col-12">
            <h5 class="fw-semibold mb-3" data-i18n="vmarket.search.categories">瀏覽分類</h5>
        </div>
        <div class="col-6 col-md-4 col-lg-3 mb-3">
            <a href="{{.BasePath}}/products" class="card border-0 bg-light h-100 text-decoration-none">
                <div class="card-body text-center p-3">
                    <i class="bi bi-box-seam text-primary d-block mb-2" style="font-size: 2rem;"></i>
                    <h6 class="fw-semibold text-dark mb-0" data-i18n="vmarket.nav.products">商品</h6>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-3 mb-3">
            <a href="{{.BasePath}}/services" class="card border-0 bg-light h-100 text-decoration-none">
                <div class="card-body text-center p-3">
                    <i class="bi bi-tools text-success d-block mb-2" style="font-size: 2rem;"></i>
                    <h6 class="fw-semibold text-dark mb-0" data-i18n="vmarket.nav.services">服務</h6>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-3 mb-3">
            <a href="{{.BasePath}}/companies" class="card border-0 bg-light h-100 text-decoration-none">
                <div class="card-body text-center p-3">
                    <i class="bi bi-buildings text-info d-block mb-2" style="font-size: 2rem;"></i>
                    <h6 class="fw-semibold text-dark mb-0" data-i18n="vmarket.nav.companies">公司</h6>
                </div>
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-3 mb-3">
            <a href="{{.BasePath}}/map" class="card border-0 bg-light h-100 text-decoration-none">
                <div class="card-body text-center p-3">
                    <i class="bi bi-geo-alt text-danger d-block mb-2" style="font-size: 2rem;"></i>
                    <h6 class="fw-semibold text-dark mb-0" data-i18n="vmarket.nav.map">地圖</h6>
                </div>
            </a>
        </div>
    </div>

    <!-- Search Results -->
    <div class="row" id="vmarketCmsSearchPanel" style="display: none;">
        <div class="col-12">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <h5 class="fw-semibold mb-0" data-i18n="vmarket.home.searchResultsTitle">搜尋結果</h5>
                <span class="text-muted small" id="vmarketCmsSearchCount"></span>
            </div>
            <div id="vmarketCmsSearchResults"></div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('vmarketCmsSearchInput');
    const searchBtn = document.getElementById('vmarketCmsSearchBtn');
    const searchPanel = document.getElementById('vmarketCmsSearchPanel');
    const searchResults = document.getElementById('vmarketCmsSearchResults');
    const searchCount = document.getElementById('vmarketCmsSearchCount');

    async function doSearch() {
        const q = (searchInput.value || '').trim();
        if (!q) return;

        searchPanel.style.display = '';
        searchResults.innerHTML = '<div class="text-center p-3"><span class="spinner-border spinner-border-sm"></span></div>';

        try {
            const resp = await fetch('{{.BasePath}}/api/search?q=' + encodeURIComponent(q));
            if (!resp.ok) throw new Error('Search failed');
            const data = await resp.json();
            const items = data.results || data.data || [];
            searchCount.textContent = items.length + ' ' + I18n.t('vmarket.search.resultsCount');

            if (items.length === 0) {
                searchResults.innerHTML = '<div class="text-center text-muted p-4"><i class="bi bi-search mb-2 d-block" style="font-size:2rem;"></i>' + I18n.t('vmarket.search.noResults') + '</div>';
                return;
            }

            searchResults.innerHTML = items.map(function(item) {
                return '<div class="card border-0 shadow-sm mb-2"><div class="card-body p-3">' +
                    '<h6 class="fw-semibold mb-1">' + (item.name || item.title || '') + '</h6>' +
                    '<p class="text-muted small mb-0">' + (item.description || item.subtitle || '') + '</p>' +
                    '</div></div>';
            }).join('');
        } catch (e) {
            searchResults.innerHTML = '<div class="text-center text-danger p-3">' + I18n.t('vmarket.search.searchError') + '</div>';
        }
    }

    if (searchBtn) searchBtn.addEventListener('click', doSearch);
    if (searchInput) searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') doSearch();
    });
});
</script>
{{end}}
