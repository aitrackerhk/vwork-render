{{define "pages/public_page_not_found"}}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暫時沒有此頁</title>
  <link rel="icon" type="image/png" href="/static/vworkicon.png">
  <link rel="apple-touch-icon" href="/static/vworkicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .not-found-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .not-found-content {
      text-align: center;
      max-width: 500px;
    }
    .not-found-icon {
      font-size: 4rem;
      color: #6c757d;
      margin-bottom: 1.5rem;
    }
    .not-found-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #212529;
      margin-bottom: 1rem;
    }
    .not-found-message {
      font-size: 1rem;
      color: #6c757d;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="not-found-container">
    <div class="not-found-content">
      <div class="not-found-icon">
        <i class="bi bi-file-earmark-x"></i>
      </div>
      <h1 class="not-found-title">暫時沒有此頁</h1>
      <p class="not-found-message">{{if .Message}}{{.Message}}{{else}}此頁面尚未建立，請稍後再試。{{end}}</p>
    </div>
  </div>
</body>
</html>
{{end}}
