{{ define "pages/project_analysis_report" }}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0" data-i18n="projectAnalysisReport.title">項目分析報告</h3>
  <div class="d-flex gap-2">
    <a href="/projects" class="btn btn-outline-secondary"><i class="bi bi-folder2-open"></i> <span data-i18n="menu.projects">項目</span></a>
  </div>
</div>

<div class="card mb-3">
  <div class="card-body">
    <div class="row g-2 align-items-end">
      <div class="col-md-3">
        <label class="form-label" data-i18n="accounting.startDate">開始日期</label>
        <input type="date" class="form-control" id="paStart">
      </div>
      <div class="col-md-3">
        <label class="form-label" data-i18n="accounting.endDate">結束日期</label>
        <input type="date" class="form-control" id="paEnd">
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary w-100" type="button" onclick="ProjectAnalysis.load()"><i class="bi bi-search"></i> <span data-i18n="accounting.search">查詢</span></button>
      </div>
    </div>
  </div>
</div>

<div class="row g-3 mb-3">
  <div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted small" data-i18n="projectAnalysisReport.totalProjects">項目總數</div><div class="fs-4 fw-semibold" id="paTotalProjects">-</div></div></div></div>
  <div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted small" data-i18n="projectAnalysisReport.active">進行中</div><div class="fs-4 fw-semibold" id="paActiveProjects">-</div></div></div></div>
  <div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted small" data-i18n="projectAnalysisReport.completed">已完成</div><div class="fs-4 fw-semibold" id="paCompletedProjects">-</div></div></div></div>
  <div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted small" data-i18n="projectAnalysisReport.overdueTasks">逾期任務</div><div class="fs-4 fw-semibold" id="paOverdueTasks">-</div></div></div></div>
</div>

<div class="row g-3 mb-3">
  <div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted small" data-i18n="projectAnalysisReport.endingToday">今日到期項目</div><div class="fs-4 fw-semibold" id="paEndingToday">-</div></div></div></div>
  <div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted small" data-i18n="projectAnalysisReport.projectExpense">項目支出合計</div><div class="fs-4 fw-semibold" id="paProjectExpense">-</div></div></div></div>
</div>

<div class="card">
  <div class="card-header bg-white">
    <div class="fw-semibold" data-i18n="projectAnalysisReport.topExpenses">Top 項目支出</div>
  </div>
  <div class="card-body p-0">
    <div class="report-table">
    <div class="table-responsive">
      <table class="table table-sm align-middle mb-0">
        <thead class="text-muted small">
          <tr>
            <th data-i18n="menu.projects">項目</th>
            <th style="width: 180px;" class="text-end" data-i18n="fields.amount">支出</th>
            <th style="width: 90px;"></th>
          </tr>
        </thead>
        <tbody id="paTopTbody">
          <tr class="text-muted"><td colspan="3" class="text-center py-3" data-i18n="common.loading">載入中...</td></tr>
        </tbody>
      </table>
      </div>
    </div>
  </div>
</div>

<script>
const ProjectAnalysis = (() => {
  function qs(id){ return document.getElementById(id); }
  function fmtMoney(n){ return '$' + Number(n || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

  function defaultRange() {
    const end = new Date();
    const start = new Date();
    start.setDate(end.getDate() - 30);
    qs('paStart').value = start.toISOString().slice(0,10);
    qs('paEnd').value = end.toISOString().slice(0,10);
  }

  async function load() {
    const start = qs('paStart').value;
    const end = qs('paEnd').value;
    const tbody = qs('paTopTbody');
    const t = (k, fallback) => (typeof I18n !== 'undefined' && I18n.t) ? I18n.t(k) : fallback;
    if (tbody) tbody.innerHTML = `<tr class="text-muted"><td colspan="3" class="text-center py-3">${t('common.loading','載入中...')}</td></tr>`;
    try {
      const res = await App.apiRequest(`/reports/project-analysis?start_date=${encodeURIComponent(start)}&end_date=${encodeURIComponent(end)}`);
      const s = res.summary || {};
      qs('paTotalProjects').textContent = s.total_projects ?? '-';
      qs('paActiveProjects').textContent = s.active_projects ?? '-';
      qs('paCompletedProjects').textContent = s.completed_projects ?? '-';
      qs('paOverdueTasks').textContent = s.overdue_tasks ?? '-';
      qs('paEndingToday').textContent = s.ending_today ?? '-';
      qs('paProjectExpense').textContent = fmtMoney(s.project_expense || 0);

      const rows = res.top_project_expenses || [];
      if (!rows.length) {
        tbody.innerHTML = `<tr class="text-muted"><td colspan="3" class="text-center py-3">${t('common.noData','沒有資料')}</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(r => {
        return `
          <tr>
            <td>${(r.project_name || '').trim() || r.project_id}</td>
            <td class="text-end">${fmtMoney(r.expense || 0)}</td>
            <td class="text-end">
              <a class="btn btn-sm btn-outline-primary" href="/projects/${r.project_id}/edit" target="_blank"><i class="bi bi-pencil"></i></a>
            </td>
          </tr>
        `;
      }).join('');
    } catch (e) {
      console.error(e);
      if (tbody) tbody.innerHTML = `<tr class="text-danger"><td colspan="3" class="text-center py-3">${t('common.loadError','載入失敗')}</td></tr>`;
      App.showAlert(e.message || t('common.loadError','載入失敗'), 'danger');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (!App.checkAuth()) return;
    defaultRange();
    load();
  });

  return { load };
})();
</script>
{{ end }}
