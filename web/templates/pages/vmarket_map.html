{{define "pages/vmarket_map"}}
<section class="vmarket-map-page">
  {{if .GoogleMapsAPIKey}}
  <div class="vmarket-map-layout">
    <aside class="vmarket-map-sidebar">
      <div class="vmarket-map-sidebar-header">
        <div class="vmarket-pill"><i class="bi bi-geo-alt"></i> <span data-i18n="vmarket.nav.map">地圖</span></div>
        <h1 class="h5 fw-semibold mb-1" data-i18n="vmarket.map.heroTitle">探索公司位置</h1>
        <p class="small text-muted mb-0" data-i18n="vmarket.map.tip">點擊地圖上的標記即可前往公司頁面。</p>
        <!-- Location search -->
        <div class="vmarket-map-search">
          <div class="vmarket-map-search-input-wrap">
            <i class="bi bi-search vmarket-map-search-icon"></i>
            <input type="text" id="vmarket-map-search" class="vmarket-map-search-input" data-i18n-placeholder="vmarket.map.searchPlaceholder" placeholder="搜尋地點，查看附近商店...">
            <button type="button" id="vmarket-map-search-clear" class="vmarket-map-search-clear d-none" title="Clear">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
          <div id="vmarket-map-search-status" class="vmarket-map-search-status d-none"></div>
        </div>
      </div>
      <div class="vmarket-map-list" id="vmarket-map-list">
        {{range .Companies}}
          {{if .Address}}
          <button type="button" class="vmarket-map-item" data-map-key="{{.CompanyURL}}">
            <div class="d-flex align-items-start justify-content-between gap-2">
              <div class="vmarket-map-item-title">{{.EnterpriseName}}</div>
              <span class="vmarket-map-item-distance d-none" data-map-dist-key="{{.CompanyURL}}"></span>
            </div>
            <div class="vmarket-map-item-sub">{{.Address}}</div>
            <span class="vmarket-map-item-action" data-i18n="vmarket.map.shopButton">Shop</span>
          </button>
          {{end}}
        {{end}}
      </div>
    </aside>
    <div class="vmarket-map-canvas">
      <div id="vmarket-map" class="vmarket-map"></div>
      <span id="vmarket-map-link-label" class="d-none" data-i18n="vmarket.map.linkLabel">前往公司頁</span>
    </div>
  </div>
  {{else}}
  <div class="container">
    <div class="alert alert-warning">
      <h5 class="mb-2" data-i18n="vmarket.map.noKeyTitle">尚未設定 Google Maps 金鑰</h5>
      <p class="mb-0" data-i18n="vmarket.map.noKeyBody">請在 .env 設定 GOOGLE_MAPS_API_KEY，並啟用 Maps JavaScript API 與 Geocoding API。</p>
    </div>
  </div>
  {{end}}
</section>

{{if .GoogleMapsAPIKey}}
<script>
  window.vmarketCompanies = {{toJSON .Companies}};
</script>
<script>
  window.initVMarketMap = function () {
    const mapEl = document.getElementById('vmarket-map');
    if (!mapEl) return;

    const defaultCenter = { lat: 25.033964, lng: 121.564468 };
    const companies = Array.isArray(window.vmarketCompanies) ? window.vmarketCompanies : [];

    const map = new google.maps.Map(mapEl, {
      center: defaultCenter,
      zoom: 11,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: false
    });

    let hasFitBounds = false;

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function (position) {
          const userCenter = { lat: position.coords.latitude, lng: position.coords.longitude };
          if (!hasFitBounds) {
            map.setCenter(userCenter);
            map.setZoom(12);
          }
        },
        function () {},
        { enableHighAccuracy: false, timeout: 5000, maximumAge: 300000 }
      );
    }

    const geocoder = new google.maps.Geocoder();
    const bounds = new google.maps.LatLngBounds();
    const infoWindow = new google.maps.InfoWindow();

    const linkLabelEl = document.getElementById('vmarket-map-link-label');
    const linkLabel = linkLabelEl ? linkLabelEl.textContent || '前往公司頁' : '前往公司頁';

    const renderInfo = (company, distText) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'vmarket-map-info';

      const title = document.createElement('div');
      title.className = 'fw-semibold mb-1';
      title.textContent = company.EnterpriseName || company.Name || '';

      const address = document.createElement('div');
      address.className = 'small text-muted mb-2';
      address.textContent = company.Address || '';

      wrapper.appendChild(title);
      if (company.Address) wrapper.appendChild(address);

      if (distText) {
        const dist = document.createElement('div');
        dist.className = 'small text-primary mb-2';
        dist.innerHTML = '<i class="bi bi-geo-alt me-1"></i>' + distText;
        wrapper.appendChild(dist);
      }

      const link = document.createElement('a');
      link.className = 'btn btn-sm btn-dark rounded-pill';
      link.textContent = linkLabel;
      link.href = company.CompanyURL || company.MapURL || '#';
      link.target = '_blank';
      link.rel = 'noopener';
      if (company.CompanyURL || company.MapURL) wrapper.appendChild(link);

      return wrapper;
    };

    const list = companies.filter((item) => item && item.Address && item.CompanyURL);
    let rendered = 0;
    const markers = {};
    const companyPositions = {};  // CompanyURL -> google.maps.LatLng
    const listButtons = document.querySelectorAll('[data-map-key]');

    listButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const key = button.getAttribute('data-map-key');
        const marker = markers[key];
        const company = list.find((item) => item.CompanyURL === key);
        if (marker && company) {
          map.panTo(marker.getPosition());
          map.setZoom(Math.max(map.getZoom() || 0, 14));
          const distText = getDistanceText(key);
          infoWindow.setContent(renderInfo(company, distText));
          infoWindow.open(map, marker);
        }
      });
    });

    const geocodeNext = (index) => {
      if (index >= list.length) {
        if (rendered > 0) {
          map.fitBounds(bounds);
          hasFitBounds = true;
        }
        return;
      }

      const company = list[index];
      geocoder.geocode({ address: company.Address }, (results, status) => {
        if (status === 'OK' && results && results[0]) {
          const location = results[0].geometry.location;
          const marker = new google.maps.Marker({ map, position: location, title: company.EnterpriseName || company.Name || '' });
          markers[company.CompanyURL] = marker;
          companyPositions[company.CompanyURL] = location;
          bounds.extend(location);
          rendered += 1;
          marker.addListener('click', () => {
            const distText = getDistanceText(company.CompanyURL);
            infoWindow.setContent(renderInfo(company, distText));
            infoWindow.open(map, marker);
          });
        }
        window.setTimeout(() => geocodeNext(index + 1), 200);
      });
    };

    if (list.length > 0) {
      geocodeNext(0);
    }

    // ---- Location Search ----
    const searchInput = document.getElementById('vmarket-map-search');
    const clearBtn = document.getElementById('vmarket-map-search-clear');
    const statusEl = document.getElementById('vmarket-map-search-status');
    const listContainer = document.getElementById('vmarket-map-list');
    let searchMarker = null;
    let searchOrigin = null;  // google.maps.LatLng of searched location
    const NEARBY_RADIUS_KM = 50;

    // Initialize Places Autocomplete
    const autocomplete = new google.maps.places.Autocomplete(searchInput, {
      fields: ['geometry', 'formatted_address', 'name']
    });
    autocomplete.bindTo('bounds', map);

    autocomplete.addListener('place_changed', () => {
      const place = autocomplete.getPlace();
      if (!place || !place.geometry || !place.geometry.location) {
        // If no geometry, try geocoding the typed text
        const query = searchInput.value.trim();
        if (query) {
          geocoder.geocode({ address: query }, (results, status) => {
            if (status === 'OK' && results && results[0]) {
              applySearchLocation(results[0].geometry.location, results[0].formatted_address || query);
            }
          });
        }
        return;
      }
      applySearchLocation(place.geometry.location, place.formatted_address || place.name || searchInput.value);
    });

    // Also handle Enter key as fallback
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const query = searchInput.value.trim();
        if (!query) return;
        geocoder.geocode({ address: query }, (results, status) => {
          if (status === 'OK' && results && results[0]) {
            applySearchLocation(results[0].geometry.location, results[0].formatted_address || query);
          }
        });
      }
    });

    function applySearchLocation(latLng, label) {
      searchOrigin = latLng;

      // Move map
      map.panTo(latLng);
      map.setZoom(13);

      // Place / move search marker
      if (searchMarker) {
        searchMarker.setPosition(latLng);
      } else {
        searchMarker = new google.maps.Marker({
          map: map,
          position: latLng,
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 10,
            fillColor: '#3b82f6',
            fillOpacity: 1,
            strokeColor: '#ffffff',
            strokeWeight: 3
          },
          title: label,
          zIndex: 9999
        });
      }

      // Show clear button
      clearBtn.classList.remove('d-none');

      // Calculate distances and sort/filter
      updateNearbyList();
    }

    function updateNearbyList() {
      if (!searchOrigin) return;

      const items = Array.from(listButtons);
      let nearbyCount = 0;

      // Calculate distance for each company
      const distances = {};
      items.forEach((btn) => {
        const key = btn.getAttribute('data-map-key');
        const pos = companyPositions[key];
        if (pos) {
          const dist = haversineKm(searchOrigin.lat(), searchOrigin.lng(), pos.lat(), pos.lng());
          distances[key] = dist;
        } else {
          distances[key] = Infinity;
        }
      });

      // Sort by distance
      items.sort((a, b) => {
        const da = distances[a.getAttribute('data-map-key')] || Infinity;
        const db = distances[b.getAttribute('data-map-key')] || Infinity;
        return da - db;
      });

      // Re-append in sorted order, show/hide based on radius, update distance label
      items.forEach((btn) => {
        const key = btn.getAttribute('data-map-key');
        const dist = distances[key];
        const distLabel = btn.querySelector('[data-map-dist-key]');
        const marker = markers[key];

        if (dist !== Infinity && dist <= NEARBY_RADIUS_KM) {
          btn.classList.remove('d-none');
          if (distLabel) {
            distLabel.textContent = formatDistance(dist);
            distLabel.classList.remove('d-none');
          }
          if (marker) marker.setVisible(true);
          nearbyCount++;
        } else {
          btn.classList.add('d-none');
          if (distLabel) distLabel.classList.add('d-none');
          if (marker) marker.setVisible(false);
        }
        listContainer.appendChild(btn);
      });

      // Status text
      const nearbyLabel = statusEl.getAttribute('data-i18n-nearby') || '附近 {radius} km 內有 {count} 間公司';
      const noneLabel = statusEl.getAttribute('data-i18n-none') || '附近 {radius} km 內沒有找到公司';
      if (nearbyCount > 0) {
        statusEl.textContent = nearbyLabel.replace('{radius}', NEARBY_RADIUS_KM).replace('{count}', nearbyCount);
        statusEl.className = 'vmarket-map-search-status text-primary small';
      } else {
        statusEl.textContent = noneLabel.replace('{radius}', NEARBY_RADIUS_KM);
        statusEl.className = 'vmarket-map-search-status text-muted small';
      }
      statusEl.classList.remove('d-none');
    }

    function clearSearch() {
      searchOrigin = null;
      searchInput.value = '';
      clearBtn.classList.add('d-none');
      statusEl.classList.add('d-none');

      if (searchMarker) {
        searchMarker.setMap(null);
        searchMarker = null;
      }

      // Show all items, hide distance labels, restore original order
      const items = Array.from(listButtons);
      items.forEach((btn) => {
        btn.classList.remove('d-none');
        const distLabel = btn.querySelector('[data-map-dist-key]');
        if (distLabel) distLabel.classList.add('d-none');
        const key = btn.getAttribute('data-map-key');
        if (markers[key]) markers[key].setVisible(true);
        listContainer.appendChild(btn);
      });

      // Reset map view
      if (rendered > 0) {
        map.fitBounds(bounds);
      }
    }

    clearBtn.addEventListener('click', clearSearch);

    function getDistanceText(companyKey) {
      if (!searchOrigin || !companyPositions[companyKey]) return '';
      const dist = haversineKm(searchOrigin.lat(), searchOrigin.lng(), companyPositions[companyKey].lat(), companyPositions[companyKey].lng());
      return formatDistance(dist);
    }

    function formatDistance(km) {
      if (km < 1) return Math.round(km * 1000) + ' m';
      return km.toFixed(1) + ' km';
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function toRad(deg) { return deg * Math.PI / 180; }
  };
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key={{.GoogleMapsAPIKey}}&libraries=places&callback=initVMarketMap"></script>
{{end}}
{{end}}
