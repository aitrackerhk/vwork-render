    // 解析輸入類型：商品、訂單、餐桌QR、URL
    function parseInputType(input) {
        const value = input.trim();
        if (!value) return { type: 'empty', value: '' };

        // 1. 檢查是否為 URL 或包含餐桌參數 (支援 QR Code / Link)
        if (value.includes('dining_table_') || value.includes('table_') || value.includes('http') || value.includes('queue_') || value.includes('ticket_')) {
            try {
                let url;
                if (value.startsWith('http')) {
                    url = new URL(value);
                } else if (value.includes('?') || value.includes('=')) {
                    // 嘗試建構 URL 以解析參數
                    url = new URL(window.location.origin + '/?' + value.replace(/^[?&]/, ''));
                }

                if (url) {
                    const getParam = (names) => {
                        for (const name of names) {
                            if (url.searchParams.has(name)) return url.searchParams.get(name);
                        }
                        return null;
                    };

                    const tableId = getParam(['dining_table_id', 'table_id']);
                    const tableCode = getParam(['dining_table_code', 'table_code', 'code']);
                    const queueId = getParam(['dining_queue_id', 'queue_id']);
                    const ticketNumber = getParam(['dining_ticket_number', 'ticket_number', 'ticket']);

                    if (tableId || tableCode || queueId || ticketNumber) {
                        return { type: 'dining', tableId, tableCode, queueId, ticketNumber };
                    }
                }
            } catch (e) {
                console.log('輸入解析為 URL失敗', e);
            }
            
            // Regex Fallback
            const extract = (pattern) => {
                const match = value.match(pattern);
                return match ? decodeURIComponent(match[1]) : null;
            };
            
            const tableId = extract(/(?:dining_table_id|table_id)=([^&]+)/);
            const tableCode = extract(/(?:dining_table_code|table_code)=([^&]+)/);
            const queueId = extract(/(?:dining_queue_id|queue_id)=([^&]+)/);
            const ticketNumber = extract(/(?:dining_ticket_number|ticket_number|ticket)=([^&]+)/);

            if (tableId || tableCode || queueId || ticketNumber) {
                return { type: 'dining', tableId, tableCode, queueId, ticketNumber };
            }
        }
        
        // 2. 檢查是否為 UUID 格式（可能是訂單 ID 或餐桌 ID）
        const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
        if (uuidRegex.test(value)) {
            return { type: 'uuid', value };
        }
        
        // 3. 檢查是否為訂單編號格式（通常以 ORD- 開頭或類似格式）
        // 更新：支援包含連字符的訂單號 (如 ORD-20260204-002)
        const orderNumberRegex = /^(ORD[-_]?[\d-]+|[A-Z]{2,4}[-_]?[\d-]+|#?\d{8,})$/i;
        if (orderNumberRegex.test(value)) {
            return { type: 'order', value };
        }
        
        // 4. 預設為商品條碼/SKU/編號
        return { type: 'product', value };
    }

    // 統一處理 POS 多類型輸入
    async function handlePosMultiInput() {
        const inputEl = document.getElementById('productSearch');
        const value = inputEl.value.trim();
        
        if (!value) {
            return;
        }
        
        const parsed = parseInputType(value);
        console.log('POS 輸入解析結果:', parsed);
        
        switch (parsed.type) {
            case 'dining':
                await handleDiningTableInput(parsed);
                break;
                
            case 'uuid':
                // UUID 可能是商品 ID / 訂單 ID / 餐桌 ID：先嘗試商品，再嘗試訂單/餐桌
                await handleOrderOrTableById(parsed.value);
                break;
                
            case 'order':
                // 訂單完全命中後清空輸入框（便於連續掃描）
                if (await loadExistingOrder()) {
                    document.getElementById('productSearch').value = '';
                }
                break;
                
            case 'product':
                await handleProductInput(parsed.value);
                break;
                
            default:
                App.showAlert('無法識別輸入類型', 'warning');
        }
    }

    // 處理餐桌 QR 輸入
    async function handleDiningTableInput(parsed) {
        try {
            App.showLoading('正在處理餐桌資訊...');
            
            let tableInfo = null;
            
            // 步驟 1: 獲取餐桌詳情
            if (parsed.tableId) {
                try {
                    tableInfo = await App.apiRequest(`/dining-tables/${parsed.tableId}`);
                } catch (e) {
                    console.log('通過 ID 獲取餐桌失敗:', e);
                }
            }
            
            if (!tableInfo && parsed.tableCode) {
                // 通過 code 獲取餐桌
                try {
                    const encodedCode = encodeURIComponent(parsed.tableCode);
                    // 嘗試搜索列表 (因為沒有直接 by-code API 保證存在)
                    const res = await App.apiRequest(`/dining-tables?search=${encodedCode}&limit=1`); 
                    // 注意：search 可能模糊匹配，最好 filter
                    if (res.data && res.data.length > 0) {
                        // 尋找精確匹配
                        tableInfo = res.data.find(t => t.code === parsed.tableCode) || res.data[0];
                    }
                } catch (e) {
                    console.log('通過 code 獲取餐桌失敗:', e);
                }
            }
            
            if (!tableInfo) {
                App.hideLoading();
                App.showAlert('找不到對應的餐桌', 'warning');
                return;
            }

            console.log('識別到餐桌:', tableInfo);

            // 步驟 2: 檢查該餐桌是否有進行中的訂單
            let activeOrder = null;
            try {
                const res = await App.apiRequest(`/orders?dining_table_id=${tableInfo.id}&limit=10&exclude_quotation=true`);
                if (res.data && res.data.length > 0) {
                    // 找到最新的非結束(completed/cancelled/void)狀態訂單
                    activeOrder = res.data.find(o => 
                        o.status !== 'completed' && 
                        o.status !== 'cancelled' && 
                        o.status !== 'void'
                    );
                }
            } catch (e) {
                console.error('檢查餐桌訂單失敗:', e);
            }

            App.hideLoading();

            if (activeOrder) {
                // Case 1: 有訂單 -> 進入編輯模式
                const confirmMsg = `餐桌「${tableInfo.name}」(${tableInfo.code}) 有進行中的訂單 (${activeOrder.order_number})。\n是否載入並編輯該訂單？`;
                if (confirm(confirmMsg)) {
                    document.getElementById('productSearch').value = '';
                    await loadExistingOrder(activeOrder.id);
                    App.showAlert(`已載入餐桌訂單: ${activeOrder.order_number}`, 'success');
                }
            } else {
                // Case 2: 無訂單 -> 設置新訂單的餐桌資料
                
                // 確認是否覆蓋現有餐桌設置 (如果已經選了別的)
                if (window.posOrderInfo && window.posOrderInfo.dining_table_id && window.posOrderInfo.dining_table_id !== tableInfo.id) {
                    if (!confirm(`當前已選擇餐桌「${window.posOrderInfo.dining_table_name}」。是否切換到「${tableInfo.name}」？`)) {
                        return;
                    }
                }

                window.posOrderInfo = window.posOrderInfo || {};
                window.posOrderInfo.dining_table_id = tableInfo.id;
                window.posOrderInfo.dining_table_code = tableInfo.code;
                window.posOrderInfo.dining_table_name = tableInfo.name || tableInfo.code;
                
                if (parsed.queueId) window.posOrderInfo.dining_queue_id = parsed.queueId;
                if (parsed.ticketNumber) window.posOrderInfo.dining_ticket_number = parsed.ticketNumber;
                
                // 清空輸入框
                document.getElementById('productSearch').value = '';
                
                // 顯示提示
                let msg = `已選擇餐桌: ${tableInfo.name || tableInfo.code}`;
                if (parsed.ticketNumber) msg += ` (候位: ${parsed.ticketNumber})`;
                App.showAlert(msg, 'success');
                
                // 更新 UI: 如果有餐桌下拉選單，選中對應選項
                const tableSelect = document.getElementById('editOrderDiningTable');
                if (tableSelect) {
                    let optionExists = false;
                    for (let opt of tableSelect.options) {
                        if (opt.value === tableInfo.id) {
                            optionExists = true;
                            break;
                        }
                    }
                    if (!optionExists) {
                        const option = document.createElement('option');
                        option.value = tableInfo.id;
                        option.text = tableInfo.name || tableInfo.code;
                        tableSelect.add(option);
                    }
                    tableSelect.value = tableInfo.id;
                }
                
                // 顯示餐桌資訊 UI
                const tableInfoDiv = document.getElementById('posDiningTableInfo');
                const tableText = document.getElementById('posDiningTableText');
                if (tableInfoDiv && tableText) {
                    tableText.textContent = tableInfo.name || tableInfo.code;
                    tableInfoDiv.style.display = 'block';
                }
            }
        } catch (error) {
            App.hideLoading();
            console.error('處理餐桌輸入失敗:', error);
            App.showAlert('處理餐桌資訊失敗: ' + error.message, 'danger');
        }
    }

    // 處理 UUID 輸入（可能是訂單或餐桌）
    async function handleOrderOrTableById(uuid) {
        // 先嘗試作為商品 ID（避免 UUID 直接被當成訂單 ID）
        try {
            const matchedProduct = (allProducts || products || []).find(p =>
                (p.id && p.id.toLowerCase() === uuid.toLowerCase())
            );
            if (matchedProduct) {
                await addToCart(matchedProduct.id, 'product');
                document.getElementById('productSearch').value = '';
                searchProducts();
                App.showAlert(`已添加商品: ${matchedProduct.name}`, 'success');
                return;
            }
        } catch (e) {
            console.log('作為商品 ID 檢查失敗:', e);
        }

        // 先嘗試作為訂單 ID
        try {
            const order = await App.apiRequest(`/orders/${uuid}`);
            if (order && order.id) {
                // 找到訂單，調用載入函數
                await loadExistingOrder();
                return;
            }
        } catch (e) {
            console.log('作為訂單 ID 查詢失敗，嘗試餐桌');
        }
        
        // 嘗試作為餐桌 ID
        try {
            const table = await App.apiRequest(`/dining-tables/${uuid}`);
            if (table && table.id) {
                await handleDiningTableInput({ tableId: uuid, tableCode: null });
                return;
            }
        } catch (e) {
            console.log('作為餐桌 ID 查詢失敗');
        }
        
        // 都找不到，嘗試作為商品
        await handleProductInput(uuid);
    }

    // 處理商品輸入
    async function handleProductInput(value) {
        // 在完整商品列表中查找匹配的商品（避免被分類/標籤/搜尋篩選影響掃描加入）
        const matchedProduct = (allProducts || products || []).find(p => 
            (p.barcode && p.barcode.toLowerCase() === value.toLowerCase()) ||
            (p.sku && p.sku.toLowerCase() === value.toLowerCase()) ||
            (p.code && p.code.toLowerCase() === value.toLowerCase()) ||
            (p.id && p.id.toLowerCase() === value.toLowerCase())
        );
        
        if (matchedProduct) {
            // 找到商品，添加到購物車
            await addToCart(matchedProduct.id, 'product');
            document.getElementById('productSearch').value = '';
            searchProducts();
            App.showAlert(`已添加商品: ${matchedProduct.name}`, 'success');
        } else {
            // 未找到商品：保留輸入內容並顯示搜索結果（同一個輸入框）
            const searchInput = document.getElementById('productSearch');
            if (searchInput) {
                searchInput.value = value;
            }
            searchProducts();
            App.showAlert('未找到精確匹配的商品，已顯示搜索結果', 'info');
        }
    }

    // 載入現有訂單進行編輯
    async function loadExistingOrder(optionalIdOrNumber) {
        const orderIdInput = document.getElementById('productSearch');
        const orderIdOrNumber = optionalIdOrNumber || orderIdInput.value.trim();
        
        if (!orderIdOrNumber) {
            App.showAlert(I18n.t('pos.pleaseEnterOrderId') || '請輸入訂單編號', 'warning');
            return false;
        }
        
        try {
            // 嘗試用訂單編號或 ID 搜尋
            let order = null;
            
            // 先嘗試用 order_number 搜尋
            try {
                // 顯式傳遞 exclude_quotation=false 以便能搜尋到報價單
                const response = await App.apiRequest(`/orders?search=${encodeURIComponent(orderIdOrNumber)}&limit=1&exclude_quotation=false`);
                // API 返回 { data: [...], total, page, limit }，需要取 data 屬性
                const orders = response && response.data ? response.data : (Array.isArray(response) ? response : []);
                if (orders && orders.length > 0) {
                    order = orders[0];
                }
            } catch (e) {
                console.log('搜尋訂單失敗，嘗試直接用 ID 載入', e);
            }
            
            // 如果找不到，嘗試直接用 ID 載入
            if (!order) {
                try {
                    order = await App.apiRequest(`/orders/${orderIdOrNumber}`);
                } catch (e) {
                    throw new Error(I18n.t('pos.orderNotFound') || '找不到訂單');
                }
            }
            
            if (!order) {
                throw new Error(I18n.t('pos.orderNotFound') || '找不到訂單');
            }

            // 訂單找到後立即清空輸入框（避免後續 UI 流程把值留著）
            orderIdInput.value = '';
            
            // 設定編輯狀態
            posOrderId = order.id;
            
            // 顯示編輯中狀態
            document.getElementById('posEditingOrderInfo').style.display = 'block';
            document.getElementById('posEditingOrderNumber').textContent = order.order_number;
            // 載入訂單後，輸入框維持可用以便繼續掃描/搜尋商品
            orderIdInput.value = '';
            orderIdInput.readOnly = false;
            
            // 清空當前購物車
            cart = [];
            
            // 載入客戶
            if (order.customer_id) {
                const customerSelect = document.getElementById('customerSelect');
                // 確保客戶在列表中
                let customerExists = false;
                for (let i = 0; i < customerSelect.options.length; i++) {
                    if (customerSelect.options[i].value === order.customer_id) {
                        customerExists = true;
                        break;
                    }
                }
                
                if (customerExists) {
                    customerSelect.value = order.customer_id;
                    // 觸發客戶變更事件
                    const event = new Event('change', { bubbles: true });
                    customerSelect.dispatchEvent(event);
                } else if (order.customer) {
                    // 添加客戶到列表
                    const option = document.createElement('option');
                    option.value = order.customer_id;
                    option.text = order.customer.name || order.customer.email || '客戶';
                    customerSelect.add(option);
                    customerSelect.value = order.customer_id;
                    const event = new Event('change', { bubbles: true });
                    customerSelect.dispatchEvent(event);
                }
            }
            
            // 載入聯絡資訊
            window.posOrderInfo = {
                name: order.contact_name || '',
                phone: order.contact_phone || '',
                email: order.contact_email || '',
                address: order.contact_address || ''
            };
            
            // 載入訂單商品
            if (order.order_items && order.order_items.length > 0) {
                for (const item of order.order_items) {
                    cart.push({
                        product_id: item.product_id,
                        item_name: (item.product && item.product.name) ? item.product.name : '未知商品',
                        quantity: parseFloat(item.quantity) || 0,
                        unit_price: parseFloat(item.unit_price) || 0,
                        total_amount: parseFloat(item.total_price) || 0,
                        discount_amount: 0,
                        tax_rate: 0,
                        notes: item.notes || '',
                        extra_fields: item.extra_fields || {}
                    });
                }
            }
            
            // 載入標籤
            if (order.labels && order.labels.length > 0) {
                posSelectedLabelIds = order.labels.map(l => l.id);
                renderPosOrderLabels();
            }
            
            // 載入優惠券
            if (order.coupon_id && order.coupon) {
                currentCoupon = order.coupon;
                couponDiscount = order.coupon_discount || 0;
                document.getElementById('posCouponCode').value = order.coupon.code || '';
            }
            
            // 載入積分
            if (order.points_used > 0) {
                posPointsUsed = order.points_used;
                posPointsDiscount = order.points_discount || 0;
                document.getElementById('posPointsUsed').value = order.points_used;
            }
            
            // 載入訂單折扣
            if (order.extra_fields && order.extra_fields.order_discount) {
                posOrderDiscount = parseFloat(order.extra_fields.order_discount) || 0;
                document.getElementById('posOrderDiscount').value = posOrderDiscount;
            }
            
            // 載入介紹人代碼
            if (order.referral_code) {
                document.getElementById('referralCode').value = order.referral_code;
            }
            
            // 更新顯示
            updateCartDisplay();
            calculateCartTotal();
            
            App.showAlert(I18n.t('pos.orderLoaded') || `已載入訂單 ${order.order_number}`, 'success');

            return true;
            
        } catch (error) {
            console.error('載入訂單失敗:', error);
            App.showAlert((I18n.t('pos.loadOrderError') || '載入訂單失敗') + ': ' + error.message, 'danger');

            return false;
        }
    }
    
    // 清除編輯狀態
    function clearEditingOrder() {
        posOrderId = null;
        
        // 隱藏編輯中狀態
        document.getElementById('posEditingOrderInfo').style.display = 'none';
        document.getElementById('posEditingOrderNumber').textContent = '';
        
        const orderIdInput = document.getElementById('productSearch');
        orderIdInput.value = '';
        orderIdInput.readOnly = false;
        
        // 清空購物車和所有狀態
        cart = [];
        currentCoupon = null;
        couponDiscount = 0;
        posPointsUsed = 0;
        posPointsDiscount = 0;
        posOrderDiscount = 0;
        posSelectedLabelIds = [];
        window.posOrderInfo = null;
        
        // 重設客戶選擇
        document.getElementById('customerSelect').value = '';
        
        // 重設表單
        document.getElementById('posCouponCode').value = '';
        document.getElementById('posCouponMessage').textContent = '';
        document.getElementById('posPointsUsed').value = 0;
        document.getElementById('posOrderDiscount').value = 0;
        document.getElementById('referralCode').value = '';

        updateCartDisplay();
        calculateCartTotal();
        
        App.showAlert(I18n.t('pos.editCleared') || '已清除編輯狀態', 'info');
    }

    // 複製訂單商品到 POS
    async function copyOrderItems(orderId) {
        try {
            const order = await App.apiRequest(`/orders/${orderId}`);
            if (order.order_items && order.order_items.length > 0) {
                // 清空當前購物車
                cart = [];
                
                // 添加訂單商品到購物車
                for (const item of order.order_items) {
                    cart.push({
                        product_id: item.product_id,
                        item_name: (item.product && item.product.name) ? item.product.name : '未知商品',
                        quantity: parseFloat(item.quantity) || 0,
                        unit_price: parseFloat(item.unit_price) || 0,
                        total_amount: parseFloat(item.total_price) || 0,
                        discount_amount: 0,
                        tax_rate: 0,
                        notes: item.notes || '',
                        extra_fields: item.extra_fields || {}
                    });
                }
                
                // 複製標籤
                if (order.labels && order.labels.length > 0) {
                    posSelectedLabelIds = order.labels.map(l => l.id);
                    renderPosOrderLabels();
                }
                
                // 更新購物車顯示
                updateCartDisplay();
                calculateCartTotal();

    // 顯示美化的訂單完成對話框
    function showOrderCompleteDialog(message, orderId) {
        // 讀取 POS 小票設定
        const posTicketSettings = JSON.parse(localStorage.getItem('vwork_pos_ticket_settings') || '{}');
        const printerSettings = JSON.parse(localStorage.getItem('vwork_printer_settings') || '{}');
        const autoPrintEnabled = posTicketSettings.autoPrintEnabled === true;
        const hasPosTicketPrinter = posTicketSettings.connectorPrinter || posTicketSettings.printerType === 'usb';
        const hasInvoicePrinter = printerSettings.defaultPrinter;
        
        // 創建 overlay
        const overlay = document.createElement('div');
        overlay.id = 'orderCompleteOverlay';
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        `;
        
        // 創建對話框
        const dialog = document.createElement('div');
        dialog.id = 'orderCompleteDialog';
        dialog.style.cssText = `
            background: white;
            border-radius: 16px;
            padding: 40px 50px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
            cursor: default;
            z-index: 10001;
        `;
        
        // 倒數計時器
        let countdown = 20;
        const countdownElement = document.createElement('div');
        countdownElement.id = 'orderCompleteCountdown';
        countdownElement.style.cssText = `
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        `;
        
        // 更新倒數
        let countdownTimer = null;
        const updateCountdown = () => {
            countdownElement.textContent = `將在 ${countdown} 秒後自動關閉`;
            if (countdown > 0) {
                countdown--;
                countdownTimer = setTimeout(updateCountdown, 1000);
            } else {
                closeDialog();
            }
        };
        
        // 關閉對話框
        const closeDialog = () => {
            if (countdownTimer) {
                clearTimeout(countdownTimer);
            }
            if (overlay.parentNode) {
                overlay.parentNode.removeChild(overlay);
            }
        };
        
        // 點擊 overlay 關閉
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                closeDialog();
            }
        });
        
        // 創建編輯訂單鏈接
        let editLinkHtml = '';
        if (orderId) {
            const editUrl = `/orders/${orderId}/edit`;
            editLinkHtml = `
                <div style="margin-top: 20px; margin-bottom: 10px;">
                    <a href="${editUrl}" target="_blank" style="
                        color: #007bff;
                        text-decoration: none;
                        font-size: 16px;
                        font-weight: 500;
                        display: inline-flex;
                        align-items: center;
                        gap: 8px;
                        padding: 8px 16px;
                        border-radius: 8px;
                        transition: all 0.2s;
                    " onmouseover="this.style.backgroundColor='#f0f0f0'; this.style.textDecoration='underline';" 
                       onmouseout="this.style.backgroundColor='transparent'; this.style.textDecoration='none';">
                        <i class="bi bi-pencil-square"></i>
                        <span>編輯訂單</span>
                        <i class="bi bi-box-arrow-up-right" style="font-size: 12px;"></i>
                    </a>
                </div>
            `;
        }
        
        // 創建打印按鈕區域（僅在未開啟自動打印且有設定打印機時顯示）
        let printButtonsHtml = '';
        if (!autoPrintEnabled && (hasPosTicketPrinter || hasInvoicePrinter)) {
            printButtonsHtml = `
                <div style="margin-top: 15px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
                    ${hasPosTicketPrinter ? `
                    <button type="button" onclick="printPosTicket('${orderId}')" style="
                        background: #28a745;
                        color: white;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 8px;
                        font-size: 14px;
                        font-weight: 500;
                        cursor: pointer;
                        display: inline-flex;
                        align-items: center;
                        gap: 6px;
                        transition: all 0.2s;
                    " onmouseover="this.style.backgroundColor='#218838'" onmouseout="this.style.backgroundColor='#28a745'">
                        <i class="bi bi-receipt"></i>
                        打印 POS 小票
                    </button>
                    ` : ''}
                    ${hasInvoicePrinter ? `
                    <button type="button" onclick="printInvoice('${orderId}')" style="
                        background: #007bff;
                        color: white;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 8px;
                        font-size: 14px;
                        font-weight: 500;
                        cursor: pointer;
                        display: inline-flex;
                        align-items: center;
                        gap: 6px;
                        transition: all 0.2s;
                    " onmouseover="this.style.backgroundColor='#0056b3'" onmouseout="this.style.backgroundColor='#007bff'">
                        <i class="bi bi-file-text"></i>
                        打印 Invoice
                    </button>
                    ` : ''}
                </div>
            `;
        }
        
        // 對話框內容
        dialog.innerHTML = `
            <div style="font-size: 48px; color: #28a745; margin-bottom: 20px;">
                <i class="bi bi-check-circle-fill"></i>
            </div>
            <h3 style="color: #333; margin-bottom: 15px; font-size: 28px; font-weight: 600;">${message}</h3>
            ${printButtonsHtml}
            ${editLinkHtml}
        `;
        dialog.appendChild(countdownElement);
        
        // 添加到頁面
        overlay.appendChild(dialog);
        document.body.appendChild(overlay);
        
        // 開始倒數
        updateCountdown();
        
        // 自動打印 POS 小票（如果開啟了自動打印）
        if (autoPrintEnabled && hasPosTicketPrinter && orderId) {
            setTimeout(() => {
                printPosTicket(orderId);
            }, 500);
        }
    }
    
    // 打印 POS 小票
    async function printPosTicket(orderId) {
        try {
            // 獲取訂單詳情
            const order = await App.apiRequest(`/orders/${orderId}`);
            if (!order) {
                App.showError('無法獲取訂單資料');
                return;
            }
            
            const posTicketSettings = JSON.parse(localStorage.getItem('vwork_pos_ticket_settings') || '{}');
            
            // 準備打印數據
            const ticketData = {
                orderNumber: order.order_number,
                storeName: posTicketSettings.showStoreName !== false ? (order.store?.name || '') : '',
                orderTime: posTicketSettings.showOrderTime !== false ? new Date(order.created_at).toLocaleString() : '',
                items: posTicketSettings.showItemDetails !== false ? (order.order_items || []).map(item => ({
                    name: item.product?.name || item.product_name || '商品',
                    quantity: item.quantity,
                    price: item.unit_price * item.quantity
                })) : [],
                subtotal: posTicketSettings.showSubtotal !== false ? (order.subtotal_amount || order.total_amount) : null,
                total: posTicketSettings.showTotal !== false ? order.total_amount : null,
                paymentMethod: posTicketSettings.showPaymentMethod ? (order.extra_fields?.payment_records?.[0]?.payment_method || '') : '',
                footerMessage: posTicketSettings.footerMessage || ''
            };
            
            // 根據打印機類型打印
            if (posTicketSettings.printerType === 'connector' && posTicketSettings.connectorPrinter) {
                if (window.VWorkConnector) {
                    await window.VWorkConnector.printPosTicket(posTicketSettings.connectorPrinter, ticketData);
                    App.showSuccess('POS 小票已發送到打印機');
                }
            } else if (posTicketSettings.printerType === 'usb' && typeof ThermalPrinterManager !== 'undefined') {
                await ThermalPrinterManager.printPosTicket(ticketData);
                App.showSuccess('POS 小票已打印');
            } else {
                App.showWarning('請先設定 POS 小票打印機');
            }
        } catch (error) {
            console.error('打印 POS 小票失敗:', error);
            App.showError('打印失敗: ' + error.message);
        }
    }
    
    // 打印 Invoice
    async function printInvoice(orderId) {
        try {
            const printerSettings = JSON.parse(localStorage.getItem('vwork_printer_settings') || '{}');
            const invoiceUrl = `/orders/${orderId}/invoice?print=1`;
            
            if (printerSettings.silentPrint && printerSettings.defaultPrinter) {
                // 靜默打印模式
                if (window.VWorkConnector) {
                    await window.VWorkConnector.printUrl(printerSettings.defaultPrinter, invoiceUrl);
                    App.showSuccess('Invoice 已發送到打印機');
                } else {
                    // 回退到普通打印
                    window.open(invoiceUrl, '_blank');
                }
            } else {
                // 普通打印（開啟預覽）
                window.open(invoiceUrl, '_blank');
            }
        } catch (error) {
            console.error('打印 Invoice 失敗:', error);
            App.showError('打印失敗: ' + error.message);
        }
    }
</script>


<!-- Select2 JS 已由 cms_layout.html 載入（本地化） -->
<script>
    // 初始化 Select2 客戶選擇器
    window.addEventListener('DOMContentLoaded', function() {
        function getUILang() {
            // i18n.js 使用 u-nai_lang 作為 key
            return localStorage.getItem('u-nai_lang') || 'zh';
        }

        function getPlaceholderText() {
            // 優先使用 i18n，否則用語言 fallback（避免出現英文）
            if (window.I18n && typeof I18n.t === 'function') {
                const t = I18n.t('pos.searchOrSelectCustomer');
                if (t && t !== 'pos.searchOrSelectCustomer') return t;
            }
            const lang = getUILang();
            if (lang === 'zh-CN') return '搜索或选择客户...';
            if (lang === 'en') return 'Search or select customer...';
            return '搜尋或選擇客戶...';
        }

        function getLangText(key, fallbackZh, fallbackZhCN, fallbackEn) {
            if (window.I18n && typeof I18n.t === 'function') {
                const t = I18n.t(key);
                if (t && t !== key) return t;
            }
            const lang = getUILang();
            if (lang === 'zh-CN') return fallbackZhCN;
            if (lang === 'en') return fallbackEn;
            return fallbackZh;
        }

        function ensureCustomerSelect2() {
            // 確保 jQuery 與 Select2 已載入
            if (!window.jQuery || !window.$ || !window.$.fn || !window.$.fn.select2) {
                setTimeout(ensureCustomerSelect2, 100);
                return;
            }
            const $ = window.$;
            const $select = $('#customerSelect');
            if (!$select.length) {
                setTimeout(ensureCustomerSelect2, 100);
                return;
            }

            const desiredPlaceholder = getPlaceholderText();
            const prevPlaceholder = $select.data('select2Placeholder');
            const hasSelect2 = $select.hasClass('select2-hidden-accessible');

            // 若已初始化但 placeholder 變更（語言載入完成/切換），則重建 select2 以更新 placeholder
            if (hasSelect2 && prevPlaceholder && prevPlaceholder !== desiredPlaceholder) {
                const currentVal = $select.val();
                $select.off('select2:select select2:clear');
                try { $select.select2('destroy'); } catch (e) {}
                $select.removeData('select2Placeholder');
                if (currentVal) {
                    // 保留選擇值
                    $select.val(currentVal);
                }
            }

            if (!$select.hasClass('select2-hidden-accessible')) {
                $select.select2({
                    theme: 'bootstrap-5',
                    placeholder: desiredPlaceholder,
                    allowClear: true,
                    ajax: {
                        url: '/api/v1/customers',
                        dataType: 'json',
                        delay: 250,
                        headers: {
                            'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                            'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                        },
                        data: function (params) {
                            return {
                                search: params.term || '',
                                limit: 50,
                                page: params.page || 1
                            };
                        },
                        processResults: function (data, params) {
                            params.page = params.page || 1;
                            return {
                                results: (data.data || []).map(function(customer) {
                                    const displayName = formatCustomerDisplayName(customer.name, customer.last_name);
                                    return {
                                        id: customer.id,
                                        text: displayName + (customer.phone ? ' (' + customer.phone + ')' : '')
                                    };
                                }),
                                pagination: {
                                    more: (data.data || []).length === 50
                                }
                            };
                        },
                        cache: true
                    },
                    minimumInputLength: 0,
                    language: {
                        inputTooShort: function () {
                            return getLangText('pos.inputAtLeastOneChar', '請輸入至少一個字', '请至少输入一个字', 'Please enter at least 1 character');
                        },
                        searching: function() {
                            return getLangText('pos.searching', '搜尋中...', '搜索中...', 'Searching...');
                        },
                        noResults: function() {
                            return getLangText('pos.noCustomersFound', '沒有符合的客戶', '未找到客户', 'No customers found');
                        }
                    }
                });

                $select.data('select2Placeholder', desiredPlaceholder);

                // 監聽選擇變化
                $select.on('select2:select', function (e) {
                    const customerId = e.params.data.id;
                    loadCustomerReferralCode(customerId);
                    loadCustomerInfo(customerId);
                });

                // 監聽清除選擇
                $select.on('select2:clear', function () {
                    loadCustomerReferralCode('');
                    loadCustomerInfo('');
                });
            }
        }

        // 初始嘗試（不依賴 I18n 是否已載入）
        ensureCustomerSelect2();

        // 等 i18n 載入/切換語言後，再確保 placeholder 與語言字串是最新
        window.addEventListener('languageChanged', function () {
            ensureCustomerSelect2();
            // 語言切換後也要更新按鈕文字
            setTimeout(() => {
                updateModeButtonText();
            }, 100);
        });

        // 初始化 Kiosk 模式
        initKioskMode();
        
        // 確保按鈕文字在頁面完全加載後更新（延遲執行以確保 DOM 和 I18n 已準備好）
        setTimeout(() => {
            updateModeButtonText();
        }, 200);
    });

    // ===== Kiosk 模式相關功能 =====
    let isKioskMode = false;

    // 更新模式按鈕文字
    function updateModeButtonText() {
        const modeText = document.getElementById('posModeText');
        
        if (!modeText) {
            return;
        }
        
        // 確保 isKioskMode 狀態與 localStorage 一致
        const savedMode = localStorage.getItem('pos_kiosk_mode');
        if (savedMode === 'true') {
            isKioskMode = true;
        } else {
            isKioskMode = false;
        }
        
        // POS 模式（isKioskMode = false）時，按鈕顯示 "自助模式"
        // 自助模式（isKioskMode = true）時，按鈕顯示 "POS 模式"
        let text;
        if (isKioskMode) {
            // 自助模式時顯示 "POS 模式"
            text = (typeof I18n !== 'undefined' && I18n.t) ? I18n.t('pos.posMode') : 'POS 模式';
        } else {
            // POS 模式時顯示 "自助模式"
            text = (typeof I18n !== 'undefined' && I18n.t) ? I18n.t('pos.kioskMode') : '自助模式';
        }
        
        // 更新購物車中的按鈕文字
        if (modeText) {
            modeText.textContent = text;
        }
        
        // topnav 中的按鈕文字固定為"切換模式"，不更新
    }

    function initKioskMode() {
        // 從 localStorage 讀取模式狀態
        const savedMode = localStorage.getItem('pos_kiosk_mode');
        if (savedMode === 'true') {
            // 恢復自助模式（kiosk mode）
            isKioskMode = true;
            document.body.classList.add('kiosk-mode');
            enableKioskMode(false); // false = 不需要密碼驗證
        } else {
            // 默認 POS 模式
            isKioskMode = false;
            document.body.classList.remove('kiosk-mode');
            localStorage.setItem('pos_kiosk_mode', 'false');
            // 確保 UI 狀態正確（POS 模式）
            document.getElementById('kioskPhoneInputFullWidthContainer').style.display = 'none';
            document.getElementById('posMainContentArea').style.display = 'block';
            document.getElementById('posCartContainer').style.display = 'flex';
            document.getElementById('normalCustomerSelect').style.display = 'block';
            document.getElementById('posLabelsSection').style.display = 'block';
            document.getElementById('posCartSettingsBtn').style.display = 'block';
            document.getElementById('quickAddCustomerBtn').style.display = 'block';
            document.getElementById('kioskReselectCustomerBtn').style.display = 'none';
            updateTopnavForKiosk(false);
            // 更新按鈕文字（POS 模式時顯示 "自助模式"）
            updateModeButtonText();
        }
        
        // 綁定鍵盤事件（綁定到所有 kiosk-key 按鈕，包括全寬容器中的）
        function bindKioskKeys() {
            document.querySelectorAll('.kiosk-key').forEach(btn => {
                // 移除舊的事件監聽器（如果有的話）
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                // 添加新的事件監聽器
                newBtn.addEventListener('click', function() {
                    const key = this.getAttribute('data-key');
                    addKioskPhoneDigit(key);
                });
            });
        }
        bindKioskKeys();
        
        // 當全寬容器顯示時，確保鍵盤事件已綁定
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    const container = document.getElementById('kioskPhoneInputFullWidthContainer');
                    if (container && container.style.display !== 'none') {
                        bindKioskKeys();
                    }
                }
            });
        });
        const kioskContainer = document.getElementById('kioskPhoneInputFullWidthContainer');
        if (kioskContainer) {
            observer.observe(kioskContainer, { attributes: true, attributeFilter: ['style'] });
        }
    }

    async function showPosModePasswordModal() {
        // 先檢查用戶是否有密碼
        try {
            const userResponse = await fetch('/api/v1/user/me', {
                headers: {
                    'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                    'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                }
            });
            
            const userData = await userResponse.json();
            const hasPassword = userData.has_password === true;
            
            const modal = new bootstrap.Modal(document.getElementById('posModePasswordModal'));
            const setupSection = document.getElementById('posModeSetupPasswordSection');
            const verifySection = document.getElementById('posModeVerifyPasswordSection');
            const modalTitle = document.getElementById('posModePasswordModalTitle');
            const confirmBtn = document.getElementById('posModePasswordConfirmBtn');
            
            // 清空所有輸入和錯誤
            document.getElementById('posModePassword').value = '';
            document.getElementById('posModeNewPassword').value = '';
            document.getElementById('posModeConfirmPassword').value = '';
            document.getElementById('posModePasswordError').style.display = 'none';
            document.getElementById('posModeSetupPasswordError').style.display = 'none';
            
            if (!hasPassword) {
                // 沒有密碼，顯示設置密碼界面
                setupSection.style.display = 'block';
                verifySection.style.display = 'none';
                modalTitle.textContent = '設置密碼';
                confirmBtn.textContent = '設置並切換模式';
                confirmBtn.onclick = setupPasswordAndSwitchMode;
                
                // Enter 鍵確認（在設置密碼輸入框）
                const setupInputs = ['posModeNewPassword', 'posModeConfirmPassword'];
                setupInputs.forEach(inputId => {
                    const input = document.getElementById(inputId);
                    input.onkeypress = function(e) {
                        if (e.key === 'Enter') {
                            setupPasswordAndSwitchMode();
                        }
                    };
                });
            } else {
                // 有密碼，顯示驗證密碼界面
                setupSection.style.display = 'none';
                verifySection.style.display = 'block';
                modalTitle.textContent = '切換模式';
                confirmBtn.textContent = '確認';
                confirmBtn.onclick = confirmPosModeSwitch;
                
                // Enter 鍵確認
                const passwordInput = document.getElementById('posModePassword');
                passwordInput.onkeypress = function(e) {
                    if (e.key === 'Enter') {
                        confirmPosModeSwitch();
                    }
                };
            }
            
            modal.show();
        } catch (error) {
            console.error('檢查用戶密碼狀態失敗:', error);
            // 默認顯示驗證密碼界面
            const modal = new bootstrap.Modal(document.getElementById('posModePasswordModal'));
            document.getElementById('posModeSetupPasswordSection').style.display = 'none';
            document.getElementById('posModeVerifyPasswordSection').style.display = 'block';
            document.getElementById('posModePassword').value = '';
            document.getElementById('posModePasswordError').style.display = 'none';
            modal.show();
        }
    }

    async function confirmPosModeSwitch() {
        const password = document.getElementById('posModePassword').value;
        const errorDiv = document.getElementById('posModePasswordError');
        
        if (!password) {
            errorDiv.textContent = '請輸入密碼';
            errorDiv.style.display = 'block';
            return;
        }
        
        try {
            // 調用 API 驗證當前用戶的密碼
            const response = await fetch('/api/v1/user/verify-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                    'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                },
                body: JSON.stringify({ password: password })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                // 密碼正確，切換模式
                const modal = bootstrap.Modal.getInstance(document.getElementById('posModePasswordModal'));
                modal.hide();
                
                // 切換模式
                isKioskMode = !isKioskMode;
                if (isKioskMode) {
                    enableKioskMode(true);
                } else {
                    disableKioskMode();
                }
                
                // 刷新頁面以防止初始化問題
                setTimeout(() => {
                    window.location.reload();
                }, 300);
            } else {
                if (data.has_password === false) {
                    errorDiv.textContent = '您尚未設置密碼，請先設置密碼';
                    errorDiv.style.display = 'block';
                } else {
                    errorDiv.textContent = data.error || '密碼錯誤';
                    errorDiv.style.display = 'block';
                }
            }
        } catch (error) {
            console.error('驗證密碼失敗:', error);
            errorDiv.textContent = '驗證密碼失敗，請稍後再試';
            errorDiv.style.display = 'block';
        }
    }

    async function setupPasswordAndSwitchMode() {
        const newPassword = document.getElementById('posModeNewPassword').value;
        const confirmPassword = document.getElementById('posModeConfirmPassword').value;
        const errorDiv = document.getElementById('posModeSetupPasswordError');
        
        // 驗證密碼
        if (!newPassword) {
            errorDiv.textContent = '請輸入密碼';
            errorDiv.style.display = 'block';
            return;
        }
        
        if (newPassword.length < 6) {
            errorDiv.textContent = '密碼至少需要 6 個字符';
            errorDiv.style.display = 'block';
            return;
        }
        
        if (newPassword.length > 20) {
            errorDiv.textContent = '密碼最多 20 個字符';
            errorDiv.style.display = 'block';
            return;
        }
        
        if (newPassword !== confirmPassword) {
            errorDiv.textContent = '兩次輸入的密碼不一致';
            errorDiv.style.display = 'block';
            return;
        }
        
        try {
            // 調用 API 設置密碼（使用更新用戶資料的 API）
            const response = await fetch('/api/v1/user/me', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                    'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                },
                body: JSON.stringify({ password: newPassword })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                // 密碼設置成功，切換模式
                const modal = bootstrap.Modal.getInstance(document.getElementById('posModePasswordModal'));
                modal.hide();
                
                // 切換模式
                isKioskMode = !isKioskMode;
                if (isKioskMode) {
                    enableKioskMode(true);
                } else {
                    disableKioskMode();
                }
                
                // 刷新頁面以防止初始化問題
                setTimeout(() => {
                    window.location.reload();
                }, 300);
            } else {
                errorDiv.textContent = data.error || '設置密碼失敗';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            console.error('設置密碼失敗:', error);
            errorDiv.textContent = '設置密碼失敗，請稍後再試';
            errorDiv.style.display = 'block';
        }
    }

        if (posSidebarToggle) {

        // 處理 topnav 中的其他元素（自助模式下只保留 logo 和切換模式按鈕）

    async function searchKioskCustomer() {
        const phone = document.getElementById('kioskPhoneInput').value.trim();
        if (!phone) {
            alert('請輸入電話號碼');
            return;
        }
        
        try {
            // 只搜索電話號碼，不需要區碼（後端會自動匹配 phone 字段）
            const response = await fetch(`/api/v1/customers?search=${encodeURIComponent(phone)}&limit=50`, {
                headers: {
                    'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                    'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                }
            });
            
            const data = await response.json();
            const customers = data.data || [];
            
            // 後端已經使用 ILIKE 搜索，直接使用返回的結果
            // 如果後端沒有返回結果，嘗試更寬鬆的匹配
            let filteredCustomers = customers;
            
            // 如果後端沒有返回結果，嘗試只匹配電話號碼數字部分
            if (filteredCustomers.length === 0 && phone) {
                // 移除所有非數字字符
                const searchPhoneDigits = phone.replace(/\D/g, '');
                if (searchPhoneDigits.length > 0) {
                    // 重新搜索，只使用數字部分
                    const retryResponse = await fetch(`/api/v1/customers?search=${encodeURIComponent(searchPhoneDigits)}&limit=50`, {
                        headers: {
                            'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                            'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                        }
                    });
                    const retryData = await retryResponse.json();
                    filteredCustomers = retryData.data || [];
                }
            }
            
            // 進一步過濾：確保電話號碼匹配（支持包含區碼的情況）
            if (filteredCustomers.length > 0) {
                const searchPhoneDigits = phone.replace(/\D/g, '');
                filteredCustomers = filteredCustomers.filter(customer => {
                    if (!customer.phone) return false;
                    const customerPhoneDigits = customer.phone.replace(/\D/g, '');
                    // 匹配：搜索的數字是客戶電話的後綴，或完全匹配
                    return customerPhoneDigits.endsWith(searchPhoneDigits) || 
                           customerPhoneDigits === searchPhoneDigits ||
                           customerPhoneDigits.includes(searchPhoneDigits);
                });
            }
            
            const resultsDiv = document.getElementById('kioskCustomerResults');
            const listDiv = document.getElementById('kioskCustomerList');
            
            if (filteredCustomers.length === 0) {
                // 使用 CMS 的 bootstrap alert
                if (typeof App !== 'undefined' && App.showAlert) {
                    const message = (typeof I18n !== 'undefined' && I18n.t) ? I18n.t('pos.noCustomerFound') : '找不到相關客戶';
                    App.showAlert(message, 'warning');
                } else {
                    // 後備方案：如果 App.showAlert 不可用，使用標準 bootstrap alert
                    listDiv.innerHTML = '<div class="alert alert-warning alert-dismissible fade show"><span>找不到相關客戶</span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
                }
                resultsDiv.style.display = 'block';
            } else if (filteredCustomers.length === 1) {
                // 只有一個客戶，自動選擇
                selectKioskCustomer(filteredCustomers[0]);
            } else {
                // 多個客戶，顯示列表
                listDiv.innerHTML = filteredCustomers.map(customer => {
                    const displayName = formatCustomerDisplayName(customer.name, customer.last_name);
                    return `
                        <div class="card mb-2">
                            <div class="card-body">
                                <h6 class="card-title">${displayName}</h6>
                                <p class="card-text small text-muted">電話: ${customer.phone || '-'}</p>
                                <button class="btn btn-primary btn-sm" onclick="selectKioskCustomerById('${customer.id}')">選擇</button>
                            </div>
                        </div>
                    `;
                }).join('');
                resultsDiv.style.display = 'block';
            }
        } catch (error) {
            console.error('搜尋客戶失敗:', error);
            alert('搜尋客戶失敗');
        }
    }

    async function selectKioskCustomer(customer) {
        // 鎖定客戶選擇
        const customerSelect = document.getElementById('customerSelect');
        if (window.$ && $(customerSelect).hasClass('select2-hidden-accessible')) {
            // 如果已初始化 Select2，先銷毀
            $(customerSelect).select2('destroy');
        }
        
        // 設置值並禁用
        customerSelect.innerHTML = `<option value="${customer.id}" selected>${formatCustomerDisplayName(customer.name, customer.last_name)}${customer.phone ? ' (' + customer.phone + ')' : ''}</option>`;
        customerSelect.disabled = true;
        
        // 設置當前客戶
        currentCustomer = customer;
        
        // 載入客戶資料並更新 posOrderInfo（用於編輯訂單信息）
        try {
            await loadCustomerInfo(customer.id);
            // 確保 posOrderInfo 已設置
            if (!window.posOrderInfo) {
                console.warn('posOrderInfo 未設置，重新載入客戶資料');
                await loadCustomerInfo(customer.id);
            }
            await loadCustomerReferralCode(customer.id);
        } catch (error) {
            console.error('載入客戶資料失敗:', error);
        }
        
        // 隱藏全寬電話輸入容器
        document.getElementById('kioskPhoneInputFullWidthContainer').style.display = 'none';
        
        // 顯示其他區域（選好帳號後）
        document.getElementById('posMainContentArea').style.display = 'block';
        document.getElementById('posCartContainer').style.display = 'flex';
        
        // 顯示客戶選擇和重選按鈕
        document.getElementById('normalCustomerSelect').style.display = 'block';
        document.getElementById('kioskReselectCustomerBtn').style.display = 'block';
        document.getElementById('kioskCustomerResults').style.display = 'none';
        
        // 隱藏快速添加客戶按鈕（kiosk mode 不允許）
        document.getElementById('quickAddCustomerBtn').style.display = 'none';
        
        // 顯示編輯客戶鏈接
        document.getElementById('customerEditRow').style.display = 'block';
        
        // 觸發 change 事件以更新其他相關功能
        if (window.$) {
            $(customerSelect).trigger('change');
        } else {
            customerSelect.dispatchEvent(new Event('change'));
        }
    }

    async function selectKioskCustomerById(customerId) {
        try {
            const response = await fetch(`/api/v1/customers/${customerId}`, {
                headers: {
                    'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                    'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                }
            });
            const customer = await response.json();
            selectKioskCustomer(customer);
        } catch (error) {
            console.error('獲取客戶資料失敗:', error);
            alert('獲取客戶資料失敗');
        }
    }

    function reselectKioskCustomer() {
        // 解鎖客戶選擇
        const customerSelect = document.getElementById('customerSelect');
        customerSelect.disabled = false;
        customerSelect.value = '';
        
        // 顯示全寬電話輸入容器
        document.getElementById('kioskPhoneInputFullWidthContainer').style.display = 'flex';
        
        // 隱藏產品搜索區域（直到選好帳號）
        document.getElementById('posMainContentArea').style.display = 'none';
        
        // 顯示購物車側邊欄（輸入電話時已存在）
        document.getElementById('posCartContainer').style.display = 'flex';
        
        // 隱藏客戶選擇和重選按鈕
        document.getElementById('normalCustomerSelect').style.display = 'none';
        document.getElementById('kioskReselectCustomerBtn').style.display = 'none';
        document.getElementById('kioskPhoneInput').value = '';
        document.getElementById('kioskCustomerResults').style.display = 'none';
        
        // 重新初始化 Select2（如果需要）
        if (window.$ && typeof ensureCustomerSelect2 === 'function') {
            ensureCustomerSelect2();
        }
    }
</script>
{{ end }}
