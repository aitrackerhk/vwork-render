{{ define "pages/pos" }}
    <!-- html5-qrcode for QR code scanning (本地化) -->
    <script src="/static/vendor/html5-qrcode/html5-qrcode.min.js"></script>
    <!-- vWork Connector for card terminal and printer integration -->
    <script src="/static/js/vwork-connector.js"></script>
    <link rel="stylesheet" href="/static/css/pos.css">
    <style>
        #posCalcShippingBtn:hover {
            color: white !important;
        }
    </style>
    
    <!-- 左下角側邊欄切換按鈕（自助模式下隱藏） -->
    <button type="button" class="pos-sidebar-toggle" id="posSidebarToggle" onclick="togglePosSidebar()" data-i18n-title="pos.showMenu">
        <i class="bi bi-list"></i>
    </button>

    <div class="pos-main-content">
            <!-- 多用途輸入已合併到商品搜尋區（productSearch） -->

            <!-- Kiosk 模式：電話輸入全寬容器 -->
            <div id="kioskPhoneInputFullWidthContainer" class="card mb-3" style="display: none;">
                <div class="card-body">
                    <!-- 使用全站統一的 #alertContainer（與表單同款提示） -->
                    <div class="row justify-content-center">
                        <div class="col-12 col-md-10 col-lg-10">
                            <div class="mb-3">
                                <label class="form-label text-center d-block" data-i18n="pos.enterPhone" style="font-size: 1.25rem; font-weight: 600;">輸入電話號碼</label>
                                <input type="text" class="form-control form-control-lg text-center" id="kioskPhoneInput" placeholder="請輸入電話號碼" readonly style="font-size: 2rem; letter-spacing: 0.2em; padding: 1rem;">
                            </div>
                            <!-- 數字鍵盤 -->
                            <div class="kiosk-keyboard">
                                <div class="row g-3 mb-3">
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="1" style="min-height: 70px; font-size: 1.5rem;">1</button></div>
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="2" style="min-height: 70px; font-size: 1.5rem;">2</button></div>
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="3" style="min-height: 70px; font-size: 1.5rem;">3</button></div>
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="4" style="min-height: 70px; font-size: 1.5rem;">4</button></div>
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="5" style="min-height: 70px; font-size: 1.5rem;">5</button></div>
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="6" style="min-height: 70px; font-size: 1.5rem;">6</button></div>
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="7" style="min-height: 70px; font-size: 1.5rem;">7</button></div>
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="8" style="min-height: 70px; font-size: 1.5rem;">8</button></div>
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="9" style="min-height: 70px; font-size: 1.5rem;">9</button></div>
                                </div>
                                <div class="row g-3 mb-3">
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="*" style="min-height: 70px; font-size: 1.5rem;">*</button></div>
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="0" style="min-height: 70px; font-size: 1.5rem;">0</button></div>
                                    <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="#" style="min-height: 70px; font-size: 1.5rem;">#</button></div>
                                </div>
                                <div class="row g-3">
                                    <div class="col-6"><button type="button" class="btn btn-danger btn-lg w-100" onclick="clearKioskPhone()" data-i18n="pos.clear" style="min-height: 60px; font-size: 1.25rem;">清除</button></div>
                                    <div class="col-6"><button type="button" class="btn btn-primary btn-lg w-100" onclick="searchKioskCustomer()" data-i18n="pos.search" style="min-height: 60px; font-size: 1.25rem;">搜尋</button></div>
                                </div>
                                <!-- 訪客購買按鈕 (僅在允許訪客結帳時顯示) -->
                                <div class="row g-3 mt-2" id="kioskGuestPurchaseRow" style="display: none;">
                                    <div class="col-12"><button type="button" class="btn btn-outline-secondary btn-lg w-100" onclick="startGuestPurchase()" data-i18n="pos.guestPurchase" style="min-height: 60px; font-size: 1.25rem;"><i class="bi bi-person-x me-2"></i>訪客購買</button></div>
                                </div>
                            </div>
                            <!-- 客戶選擇結果 -->
                            <div id="kioskCustomerResults" class="mt-4" style="display: none;">
                                <div id="kioskCustomerList"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 正常內容區域（在 kiosk 模式下，選好帳號後才顯示） -->
            <div id="posMainContentArea">
            <!-- 客戶選擇 -->
            <div class="card mb-3 pos-customer-card">
                <div class="card-body position-relative">
                    <div class="row">
                        <div class="col-lg-4 col-md-6 mb-3 mb-md-0">
                            <label class="form-label" data-i18n="pos.customer">客戶</label>
                            <!-- Kiosk 模式：電話輸入（舊版，已移到上方全寬容器） -->
                            <div id="kioskPhoneInputContainer" style="display: none;">
                                <div class="mb-3">
                                    <label class="form-label" data-i18n="pos.enterPhone">輸入電話號碼</label>
                                    <input type="text" class="form-control form-control-lg text-center" id="kioskPhoneInput" placeholder="請輸入電話號碼" readonly style="font-size: 1.5rem; letter-spacing: 0.1em;">
                                </div>
                                <!-- 數字鍵盤 -->
                                <div class="kiosk-keyboard">
                                    <div class="row g-2 mb-2">
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="1">1</button></div>
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="2">2</button></div>
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="3">3</button></div>
                                    </div>
                                    <div class="row g-2 mb-2">
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="4">4</button></div>
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="5">5</button></div>
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="6">6</button></div>
                                    </div>
                                    <div class="row g-2 mb-2">
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="7">7</button></div>
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="8">8</button></div>
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="9">9</button></div>
                                    </div>
                                    <div class="row g-2 mb-2">
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="*">*</button></div>
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="0">0</button></div>
                                        <div class="col-4"><button type="button" class="btn btn-outline-secondary btn-lg w-100 kiosk-key" data-key="#">#</button></div>
                                    </div>
                                    <div class="row g-2">
                                        <div class="col-6"><button type="button" class="btn btn-danger btn-lg w-100" onclick="clearKioskPhone()" data-i18n="pos.clear">清除</button></div>
                                        <div class="col-6"><button type="button" class="btn btn-primary btn-lg w-100" onclick="searchKioskCustomer()" data-i18n="pos.search">搜尋</button></div>
                                    </div>
                                </div>
                                <!-- 客戶選擇結果 -->
                                <div id="kioskCustomerResults" class="mt-3" style="display: none;">
                                    <div id="kioskCustomerList"></div>
                                </div>
                            </div>
                            <!-- 正常模式：客戶選擇 -->
                            <div id="normalCustomerSelect">
                            <div class="input-group">
                                <select class="form-select" id="customerSelect">
                                    <option value="" data-i18n="pos.guest">散客</option>
                                </select>
                                    <button type="button" class="btn btn-outline-primary" id="quickAddCustomerBtn" onclick="quickAddCustomer()" data-i18n-title="pos.quickAddCustomer">
                                    <i class="bi bi-person-plus"></i>
                                </button>
                                </div>
                                <!-- Kiosk 模式：重選帳號按鈕 -->
                                <div id="kioskReselectCustomerBtn" style="display: none; margin-top: 10px;">
                                    <button type="button" class="btn btn-outline-warning w-100" onclick="reselectKioskCustomer()" data-i18n="pos.reselectAccount">重選帳號</button>
                                </div>
                            </div>
                            <div id="customerEditRow" style="display: none; margin-top: 5px;">
                                <a href="#" id="editCustomerLink" class="text-primary text-decoration-none small" onclick="editCustomer(event); return false;">
                                    <i class="bi bi-pencil"></i> <span data-i18n="pos.editCustomer">編輯客戶資料</span>
                                </a>
                            </div>
                            <!-- 訂單標籤在客戶下方 -->
                            <div class="mt-3" id="posLabelsSection">
                                <label class="form-label" data-i18n="pos.orderLabels">訂單標籤</label>
                                <div class="d-flex gap-2 mb-2">
                                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="showPosLabelSelector()">
                                        <i class="bi bi-plus-circle"></i> <span data-i18n="pos.selectLabels">選擇標籤</span>
                                    </button>
                                    <button type="button" class="btn btn-sm btn-outline-success" onclick="showPosQuickCreateLabel()">
                                        <i class="bi bi-plus-lg"></i> <span data-i18n="pos.quickCreate">快速建立</span>
                                    </button>
                        </div>
                                <div id="posOrderLabelsContainer" class="d-flex flex-wrap gap-2">
                                    <span class="text-muted small" data-i18n="pos.noLabels">No labels</span>
                        </div>
                    </div>
                            <div class="mt-2" id="posDiningTableInfo" style="display: none;">
                                <small class="text-muted" data-i18n="fields.餐桌號碼">餐桌號碼：</small>
                                <span id="posDiningTableText" class="fw-semibold"></span>
                            </div>
                        </div>
                        <div class="col-lg-4 col-md-6 mb-3 mb-md-0">
                            <label class="form-label" data-i18n="pos.referralCode">介紹人代碼 (Referral Code)</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="referralCode" data-i18n-placeholder="pos.referralCodePlaceholder" readonly onchange="updateQRCodePreview('referralCode')">
                                <button type="button" class="btn btn-outline-secondary" id="referralCode_preview_btn" 
                                        onclick="showQRCodePreview('referralCode')" style="display: none;">
                                    <i class="bi bi-qr-code-scan"></i> <span data-i18n="pos.previewQRCode">Preview QR Code</span>
                                </button>
                            </div>
                            <!-- edit order info button 在介紹人代碼下方 -->
                            <div class="mt-3">
                                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="showEditOrderInfoModal(); return false;" data-i18n-title="pos.editOrderInfo">
                        <i class="bi bi-pencil-square"></i> <span data-i18n="pos.editOrderInfo">編輯訂單信息</span>
                    </button>
                            </div>
                            <div class="mt-2" id="referrerInfoRow" style="display: none;">
                            <small class="text-muted" data-i18n="pos.referrer">介紹人：</small>
                            <a href="#" id="referrerNameLink" class="text-primary text-decoration-none" onclick="showReferrerModal(event); return false;">
                                <span id="referrerName">-</span>
                            </a>
                        </div>
                    </div>
                        <div class="col-lg-4 col-md-12">
                            <label class="form-label"><i class="bi bi-qr-code-scan"></i> <span data-i18n="pos.qrCodeScan">QR Code 掃描</span></label>
                            <div class="pos-qr-scanner-area" id="qrScannerArea">
                                <div id="qr-reader" style="display: none;"></div>
                                <div id="qrScannerPlaceholder" class="text-center">
                                    <i class="bi bi-camera-video" style="font-size: 1.5rem; color: #667eea;"></i>
                                    <p class="mt-1 mb-0 small text-muted" data-i18n="pos.clickToStartScan">點擊按鈕開始掃描</p>
                            </div>
                                <button type="button" class="btn btn-sm btn-primary pos-qr-scanner-toggle-btn" id="qrScannerToggleBtn" onclick="toggleQRScanner()">
                                    <i class="bi bi-camera-video"></i> <span data-i18n="pos.startScan">開始掃描</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 商品搜索和選擇 -->
            <div class="card mb-3" id="posProductSearchArea">
                <div class="card-header pos-search-header">
                    <div class="row align-items-center g-2">
                        <div class="col">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="bi bi-upc-scan"></i></span>
                                <input type="text" class="form-control" id="productSearch" placeholder="掃描或輸入：商品條碼/SKU/訂單編號/餐桌QR..." data-i18n-placeholder="pos.multiInputPlaceholder" onkeyup="searchProducts()" onkeypress="handlePosInputKeypress(event)">
                                <button type="button" class="btn btn-outline-primary pos-multi-input-btn" onclick="handlePosMultiInput()">
                                    <i class="bi bi-search"></i> <span data-i18n="pos.search">搜尋</span>
                                </button>
                            </div>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn btn-warning btn-sm" id="posEditingOrderInfo" onclick="clearEditingOrder()" style="display: none;">
                                <i class="bi bi-pencil-square"></i> <span data-i18n="pos.editingOrder">編輯中</span>: <span id="posEditingOrderNumber"></span>
                                <i class="bi bi-x-lg ms-2"></i>
                            </button>
                        </div>
                    </div>
                    <small class="text-dark mt-2 d-block" data-i18n="pos.searchHint">提示：可以直接掃描條碼或輸入 SKU 快速添加商品</small>
                    <div class="mt-2" id="posProductLabelsSection">
                        <div class="d-flex flex-wrap align-items-center gap-2">
                            <span class="text-muted small fw-semibold" data-i18n="pos.productLabels">產品標籤</span>
                            <div class="d-flex flex-wrap gap-2" id="posProductLabelsList"></div>
                        </div>
                    </div>
                </div>
                <!-- 產品分類篩選 Tab -->
                <div class="card-body p-2 border-bottom">
                    <ul class="nav nav-tabs nav-tabs-sm" id="productFilterTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="all-products-tab" data-bs-toggle="tab" data-bs-target="#all-products" type="button" role="tab" onclick="filterProductsByCategory('all')">
                                <span data-i18n="pos.products">貨品</span>
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="product-type-tab" data-bs-toggle="tab" data-bs-target="#product-type" type="button" role="tab" onclick="filterProductsByCategory('product_type')">
                                <span data-i18n="pos.productType">產品類型</span>
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="brand-tab" data-bs-toggle="tab" data-bs-target="#brand" type="button" role="tab" onclick="filterProductsByCategory('brand')">
                                <span data-i18n="pos.brand">品牌</span>
                            </button>
                        </li>
                    </ul>
                    <!-- 產品類型卡片顯示 -->
                    <div id="productTypeFilter" class="mt-2" style="display: none;">
                        <div id="productTypesGrid" class="row g-2" style="--bs-gutter-x:0.5rem;">
                            <!-- 產品類型卡片將在這裡動態加載 -->
                        </div>
                    </div>
                    <!-- 品牌卡片顯示 -->
                    <div id="brandFilter" class="mt-2" style="display: none;">
                        <div id="brandsGrid" class="row g-2" style="--bs-gutter-x:0.5rem;">
                            <!-- 品牌卡片將在這裡動態加載 -->
                        </div>
                    </div>
                </div>
                <div class="card-body" style="max-height: 400px; overflow-y: auto;">
                    <div id="productsGrid" class="row g-2" style="--bs-gutter-x:0.5rem;">
                        <!-- 商品將在這裡動態加載 -->
                    </div>
                </div>
            </div>
    </div>
            <!-- posMainContentArea 結束 -->

    <!-- 右側：購物車和結帳（固定側邊框） -->
    <div class="pos-cart-container" id="posCartContainer">
        <div class="pos-cart-header">
            <h5 class="mb-0"><i class="bi bi-cart"></i> <span data-i18n="pos.cart">購物車</span></h5>
            <div class="d-flex gap-2">
                <button type="button" class="pos-cart-mode-btn" id="posModeToggleBtn" onclick="showPosModePasswordModal()" title="切換模式" data-i18n-title="pos.switchMode">
                    <i class="bi bi-display"></i> <span id="posModeText">自助模式</span>
                </button>
                <button type="button" class="pos-cart-settings-btn" id="posCartSettingsBtn" onclick="openPosSettingsModal(event)" title="POS 設定" data-i18n-title="pos.settings">
                <i class="bi bi-gear"></i>
            </button>
            </div>
        </div>
        <div class="pos-cart-body">
            <div class="pos-cart-scrollable">
                <!-- 第一步：購物車內容 -->
                <div id="posStep1" class="pos-checkout-step">
                <div id="cartItems">
                    <p class="text-muted text-center" data-i18n="pos.emptyCart">購物車是空的</p>
                </div>
                
                <!-- 優惠區域（可折疊） -->
                <div class="mb-3 mt-3">
                    <button class="btn btn-sm btn-outline-secondary w-100 d-flex justify-content-between align-items-center" type="button" data-bs-toggle="collapse" data-bs-target="#posDiscountCollapse" aria-expanded="false" aria-controls="posDiscountCollapse" style="border-radius: 6px;">
                        <span><i class="bi bi-tag"></i> <span data-i18n="pos.couponsAndDiscounts">優惠與折扣</span></span>
                        <i class="bi bi-chevron-down" id="posDiscountToggleIcon"></i>
                    </button>
                    <div class="collapse" id="posDiscountCollapse">
                        <div class="mt-2">
                            <!-- 優惠券輸入 -->
                            <div class="mb-3">
                                <label class="form-label small fw-semibold" style="color: #475569;" data-i18n="pos.couponCode">優惠券代碼</label>
                    <div class="input-group input-group-sm">
                                    <input type="text" class="form-control" id="posCouponCode" data-i18n-placeholder="pos.enterCouponCode" placeholder="輸入優惠券代碼" onkeypress="if(event.key==='Enter') applyPosCoupon()" style="border-radius: 6px 0 0 6px;">
                                    <button type="button" class="btn btn-outline-primary" onclick="applyPosCoupon()" style="border-radius: 0 6px 6px 0; border-left: none;"><span data-i18n="pos.apply">應用</span></button>
                    </div>
                    <small class="text-muted" id="posCouponMessage"></small>
                </div>
                
                <!-- 積分使用 -->
                <div class="mb-3" id="pointsSection">
                                <label class="form-label small fw-semibold" style="color: #475569;" data-i18n="pos.usePoints">使用積分</label>
                    <div class="input-group input-group-sm">
                                    <input type="number" class="form-control" id="posPointsUsed" min="0" value="0" onchange="updatePosPointsDiscount()" disabled style="border-radius: 6px 0 0 6px;">
                                    <span class="input-group-text" style="border-radius: 0 6px 6px 0; background: #f1f5f9; color: #64748b;" data-i18n="pos.points">積分</span>
                    </div>
                                <small class="text-muted" id="posPointsInfo"><span data-i18n="pos.availablePoints">可用積分</span>：<span id="posAvailablePoints" class="fw-bold" style="color: #667eea;">0</span></small>
                </div>
                
                <!-- 全單折扣 -->
                <div class="mb-3" id="posOrderDiscountSection">
                                <label class="form-label small fw-semibold" style="color: #475569;" data-i18n="pos.orderDiscount">全單折扣 (%)</label>
                                <div class="input-group input-group-sm mb-2">
                                    <input type="number" class="form-control" id="posOrderDiscount" min="0" max="100" step="0.01" value="0" onchange="updatePosOrderDiscount()" disabled style="border-radius: 6px 0 0 6px;">
                                    <span class="input-group-text" style="border-radius: 0; background: #f1f5f9; color: #64748b;">%</span>
                    </div>
                                <button type="button" class="btn btn-outline-primary btn-sm w-100" onclick="applyPosMemberLevelDiscount()" id="applyMemberLevelBtn" disabled style="border-radius: 6px;">
                                    <i class="bi bi-star"></i> <span data-i18n="pos.applyMemberLevelDiscount">應用會員等級優惠</span>
                                </button>
                </div>
                
                <!-- 自動應用最優折扣按鈕 -->
                <div class="mb-3" id="posAutoDiscountSection">
                                <button type="button" class="btn btn-outline-primary btn-sm w-100" onclick="autoApplyPosBestDiscount()" id="autoApplyBestDiscountBtn" disabled style="border-radius: 6px; border-width: 2px;">
                                    <i class="bi bi-magic"></i> <span data-i18n="pos.autoApplyBestDiscount">自動應用最優折扣</span>
                    </button>
                            </div>
                            
                            <!-- 印花兌換區域 -->
                            <div class="mb-3 pt-3 border-top" id="posStampRedeemSection">
                                <label class="form-label small fw-semibold" style="color: #475569;"><i class="bi bi-award"></i> <span data-i18n="pos.stampRedeem">印花使用</span></label>
                                <div id="posCustomerStampBalances" class="mb-2">

<script>
    // 統一處理：避免 popup/modal 在 i18n 尚未 ready 時先顯示預設繁體，稍後再跳成英文造成「閃一下」
    async function ensureI18nReadyForPopup(timeoutMs = 3000) {
        if (typeof I18n !== 'undefined' && I18n.whenReady) {
            try { await I18n.whenReady(timeoutMs); } catch (e) { /* ignore */ }
        }
    }
    function applyI18nNow() {
        if (typeof I18n !== 'undefined' && I18n.updatePage) {
            try { I18n.updatePage(); } catch (e) { /* ignore */ }
        }
    }
    // POS 頁面初始化：隱藏 sidebar
    document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.add('pos-page');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const toggleBtn = document.getElementById('posSidebarToggle');
        
        if (sidebar) {
            sidebar.classList.remove('show');
        }
        
        // 監聽 overlay 點擊事件，關閉 side menu 時顯示按鈕
        if (overlay) {
            overlay.addEventListener('click', function() {
                if (toggleBtn) {
                    toggleBtn.style.display = 'flex';
                }
            });
        }
        
        // 監聽 sidebar 的顯示/隱藏變化
        if (sidebar) {
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.attributeName === 'class' && toggleBtn) {
                        if (sidebar.classList.contains('show')) {
                            toggleBtn.style.display = 'none';
                        } else {
                            toggleBtn.style.display = 'flex';
                        }
                    }
                });
            });
            observer.observe(sidebar, { attributes: true });
        }
        
        // 處理優惠區域折疊圖標旋轉
        const discountCollapse = document.getElementById('posDiscountCollapse');
        const discountToggleIcon = document.getElementById('posDiscountToggleIcon');
        if (discountCollapse && discountToggleIcon) {
            discountCollapse.addEventListener('show.bs.collapse', function() {
                discountToggleIcon.classList.remove('bi-chevron-down');
                discountToggleIcon.classList.add('bi-chevron-up');
            });
            discountCollapse.addEventListener('hide.bs.collapse', function() {
                discountToggleIcon.classList.remove('bi-chevron-up');
                discountToggleIcon.classList.add('bi-chevron-down');
            });
        }
    });
    
    // 切換 POS sidebar
    function togglePosSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const toggleBtn = document.getElementById('posSidebarToggle');
        
        if (sidebar) {
            sidebar.classList.toggle('show');
            if (overlay) {
                overlay.classList.toggle('show');
            }
            if (toggleBtn) {
                // 當 side menu 顯示時，隱藏按鈕；當 side menu 隱藏時，顯示按鈕
                if (sidebar.classList.contains('show')) {
                    toggleBtn.style.display = 'none';
                } else {
                    toggleBtn.style.display = 'flex';
                }
            }
        }
    }

    let currentCustomer = null;

    let posCustomerDefaultAddress = null; // {country_code, region_code}

    let posAccessBlockTimer = null;
    function showPosBlockOverlayWithCountdown(message, seconds = 5, redirectUrl = '/dashboard') {
        try {
            // 避免重複計時器
            if (posAccessBlockTimer) {
                clearInterval(posAccessBlockTimer);
                posAccessBlockTimer = null;
            }

            // Overlay
            let overlay = document.getElementById('posAccessBlockOverlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'posAccessBlockOverlay';
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    z-index: 9999;
                    background: rgba(0,0,0,0.35);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 1rem;
                `;
                overlay.innerHTML = `
                    <div style="max-width: 560px; width: 100%; background: #fff; border-radius: 16px; padding: 1.25rem 1.25rem; box-shadow: 0 12px 28px rgba(0,0,0,.18);">
                        <div class="d-flex align-items-center mb-2">
                            <i class="bi bi-exclamation-triangle me-2" style="font-size: 1.25rem;"></i>
                            <div style="font-weight: 800;">無法進入 POS</div>
                        </div>
                        <div id="posAccessBlockMsg" style="color:#333; line-height:1.5;"></div>
                        <div class="mt-3 d-flex align-items-center justify-content-between">
                            <div class="text-muted small">將於 <span id="posAccessBlockCountdown">5</span> 秒後返回儀表板</div>
                            <a href="/dashboard" class="btn btn-outline-secondary btn-sm">立即返回</a>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
            }
            const msgEl = document.getElementById('posAccessBlockMsg');
            if (msgEl) msgEl.textContent = message;

            let remaining = Math.max(1, Number(seconds) || 5);
            const countdownEl = document.getElementById('posAccessBlockCountdown');

            const render = () => {
                if (countdownEl) countdownEl.textContent = String(remaining);
            };
            render();

            posAccessBlockTimer = setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    clearInterval(posAccessBlockTimer);
                    posAccessBlockTimer = null;
                    window.location.href = redirectUrl;
                    return;
                }
                render();
            }, 1000);
        } catch (e) {
            // 最保底：直接 alert + redirect
            alert(message);
            setTimeout(() => (window.location.href = redirectUrl), 5000);
        }
    }

    async function ensurePosStoreAccess() {
        const params = new URLSearchParams(window.location.search);
        const urlStoreId = params.get('store_id');
        
        try {
            const me = await App.apiRequest('/user/me');
            userStores = (me && me.extra_fields && Array.isArray(me.extra_fields.stores))
                ? me.extra_fields.stores.filter(s => s && s.store_id && (s.belongs_to_store !== false))
                : [];
            console.log('載入用戶店舖:', userStores);
        } catch (err) {
            console.warn('載入用戶店舖失敗', err);
            userStores = [];
        }

        // 若沒有被分配店舖
        if (!userStores.length) {
            // 如果 URL 帶了 store_id，表示用戶嘗試用未授權店舖，直接拒絕
            if (urlStoreId) {
                showPosBlockOverlayWithCountdown('您沒有權限使用該店舖', 5, '/dashboard');
                return false;
            }
            // 無 store_id 且無店舖關聯：允許進入，訂單不關聯店舖
            posStoreId = null;
            return true;
        }

        // 有被分配店舖時，驗證 store_id
        if (urlStoreId) {
            // 確保 store_id 比較時類型一致（都轉為字符串）
            const allowed = userStores.some(s => String(s.store_id || s.id) === String(urlStoreId));
            console.log('驗證 store_id:', {
                urlStoreId,
                userStores: userStores.map(s => ({
                    store_id: s.store_id || s.id,
                    belongs_to_store: s.belongs_to_store
                })),
                allowed
            });
            if (!allowed) {
                // store_id 不屬於用戶，彈出提示並重定向到 dashboard
                showPosBlockOverlayWithCountdown('您沒有權限使用該店舖', 5, '/dashboard');
                return false;
            }
            posStoreId = urlStoreId;
        } else {
            // 未帶 store_id，自動選擇預設店舖或第一個可用店舖
            const def = userStores.find(s => s.is_default === true || s.is_default === 'true' || s.is_default === 1 || s.is_default === 'on');
            posStoreId = (def && (def.store_id || def.id))
                ? (def.store_id || def.id)
                : (userStores[0] ? (userStores[0].store_id || userStores[0].id) : null);
            
            // 更新 URL 以反映實際使用的 store_id
            if (posStoreId) {
                const newUrl = new URL(window.location.href);
                newUrl.searchParams.set('store_id', posStoreId);
                window.history.replaceState({}, '', newUrl.toString());
            }
        }

        return true;
    }

    function refreshPosDepositPreview() {
        try {
            // 只在付款步驟需要顯示（但即使不在，也不會出錯）
            const subtotal = calculateCartSubtotal();
            const discount = parseFloat(document.getElementById('cartDiscount')?.textContent?.replace('-$', '')) || 0;
            const tax = parseFloat(document.getElementById('cartTax')?.textContent?.replace('$', '')) || 0;
            const total = subtotal + tax - discount + (posShippingFee || 0);
            const depositFromPercent = (posDepositPercent > 0) ? (total * posDepositPercent / 100) : 0;
            const deposit = Math.min(total, Math.max(depositFromPercent, posDepositFixed || 0));
            const totalEl = document.getElementById('posAmountTotal');
            const depEl = document.getElementById('posAmountDeposit');
            if (totalEl) totalEl.textContent = `$${total.toFixed(2)}`;
            if (depEl) depEl.textContent = `$${deposit.toFixed(2)}`;
        } catch (e) {
            console.warn('refreshPosDepositPreview failed', e);
        }
    }

    // 載入客戶資料並更新 posOrderInfo
    async function loadCustomerInfo(customerId) {
        const prevDining = window.posOrderInfo ? {
            dining_table_id: window.posOrderInfo.dining_table_id || null,
            dining_table_code: window.posOrderInfo.dining_table_code || null,
            dining_area_id: window.posOrderInfo.dining_area_id || null,
            dining_area_name: window.posOrderInfo.dining_area_name || null
        } : {};

        if (!customerId) {
            // 清空 posOrderInfo（保留餐桌資訊）
            window.posOrderInfo = (prevDining.dining_table_id || prevDining.dining_table_code) ? prevDining : null;
            updatePosDiningTableDisplay();
            return;
        }
        
        try {
            const customer = await App.apiRequest(`/customers/${customerId}`);
            // 更新 posOrderInfo（用於結帳時的聯絡人資料）
            // 解析電話號碼和區號
            // 優先使用 customer.phone_country_code 和 customer.phone（分開的字段）
            let phoneCountryCode = customer.phone_country_code || '';
            let phoneNumber = customer.phone || '';
            let phone = '';
            
            // 如果 customer 有 phone_country_code 和 phone（分開的字段），直接使用
            if (phoneCountryCode && phoneNumber) {
                phone = `${phoneCountryCode} ${phoneNumber}`.trim();
            } else if (customer.phone) {
                // 如果只有 phone 字段（可能是組合的），嘗試解析
                phone = customer.phone;
                const match = phone.match(/^(\+?\d{1,4})\s*(.+)$/);
                if (match) {
                    phoneCountryCode = match[1].startsWith('+') ? match[1] : '+' + match[1];
                    phoneNumber = match[2];
                } else {
                    // 嘗試匹配開頭的區號（1-4位數字）
                    const codeMatch = phone.match(/^(\+?\d{1,4})/);
                    if (codeMatch) {
                        phoneCountryCode = codeMatch[1].startsWith('+') ? codeMatch[1] : '+' + codeMatch[1];
                        phoneNumber = phone.substring(codeMatch[1].length).trim();
                    } else {
                        // 如果無法解析，phoneNumber 就是整個 phone
                        phoneNumber = phone;
                    }
                }
            }
            
            // 如果還是沒有區號，嘗試獲取系統預設
            if (!phoneCountryCode) {
                try {
                    const resp = await App.apiRequest('/api/v1/phone-country-codes');
                    const codes = (resp && resp.data) ? resp.data : [];
                    const defaultCode = codes.find(c => c && (c.is_default === true || c.is_default === 'true' || c.is_default === 1));
                    if (defaultCode) {
                        phoneCountryCode = defaultCode.code;
                        if (phoneNumber) {
                            phone = `${phoneCountryCode} ${phoneNumber}`.trim();
                        }
                    }
                } catch (error) {
                    console.warn('獲取預設電話區號失敗:', error);
                }
            }
            
            // 優先使用地址管理中的地址（類似 orders/new）
            let customerAddress = customer.address || '';
            try {
                // 嘗試獲取客戶的地址管理中的地址
                const addressesResponse = await App.apiRequest(`/api/v1/customers/${customerId}/addresses`);
                if (addressesResponse && addressesResponse.data && Array.isArray(addressesResponse.data) && addressesResponse.data.length > 0) {
                    const addresses = addressesResponse.data;
                    // 優先使用默認地址
                    let defaultAddress = addresses.find(addr => addr.is_default === true || addr.is_default === 'true' || addr.is_default === 1);
                    // 如果沒有默認地址，使用最新的地址（按 created_at 排序）
                    if (!defaultAddress) {
                        // 按 created_at 降序排序，取最新的
                        const sortedAddresses = [...addresses].sort((a, b) => {
                            const dateA = new Date(a.created_at || 0);
                            const dateB = new Date(b.created_at || 0);
                            return dateB - dateA; // 降序
                        });
                        defaultAddress = sortedAddresses[0];
                    }
                    
                    if (defaultAddress) {
                        posCustomerDefaultAddress = {
                            country_code: defaultAddress.country_code || '',
                            region_code: defaultAddress.region_code || ''
                        };
                        // 獲取當前語言（從 localStorage 或默認中文）
                        const currentLang = localStorage.getItem('cms_language') || 'zh';
                        const lang = currentLang === 'en' ? 'en' : 'zh';
                        
                        // 格式化地址
                        let formattedAddress = '';
                        if (lang === 'en') {
                            // 英文地址格式：地址 + ", " + 地區 + ", " + 國家
                            const addressParts = [];
                            if (defaultAddress.address_line1) {
                                addressParts.push(defaultAddress.address_line1);
                            }
                            if (defaultAddress.address_line2) {
                                addressParts.push(defaultAddress.address_line2);
                            }
                            const fullAddress = addressParts.filter(p => p).join(' ');
                            
                            const parts = [];
                            if (fullAddress) {
                                parts.push(fullAddress);
                            }
                            if (defaultAddress.region_name) {
                                parts.push(defaultAddress.region_name);
                            }
                            if (defaultAddress.country_name) {
                            parts.push(defaultAddress.country_name);
                            }
                            formattedAddress = parts.filter(p => p).join(', ');
                        } else {
                            // 中文地址格式：國家 + " " + 地區 + " " + 地址
                            const parts = [];
                            if (defaultAddress.country_name) {
                                parts.push(defaultAddress.country_name);
                            }
                            if (defaultAddress.region_name) {
                                parts.push(defaultAddress.region_name);
                            }
                            const addressParts = [];
                            if (defaultAddress.address_line1) {
                                addressParts.push(defaultAddress.address_line1);
                            }
                            if (defaultAddress.address_line2) {
                                addressParts.push(defaultAddress.address_line2);
                            }
                            const fullAddress = addressParts.filter(p => p).join(' ');
                            if (fullAddress) {
                                parts.push(fullAddress);
                            }
                            formattedAddress = parts.filter(p => p).join(' ');
                        }
                        
                        customerAddress = formattedAddress;
                    }
                }
            } catch (error) {
                console.warn('載入客戶地址失敗:', error);
                posCustomerDefaultAddress = null;
                // 如果載入地址失敗，回退到舊的 address 字段
            }
            
            window.posOrderInfo = {
                name: formatCustomerDisplayName(customer.name || '', customer.last_name || ''),
                phone: phone,
                phone_country_code: phoneCountryCode,
                phone_number: phoneNumber,
                email: customer.email || '',
                address: customerAddress,
                dining_table_id: prevDining.dining_table_id || null,
                dining_table_code: prevDining.dining_table_code || null,
                dining_area_id: prevDining.dining_area_id || null,
                dining_area_name: prevDining.dining_area_name || null
            };

            updatePosDiningTableDisplay();

            // 自動計算運費（POS）
            if (posDocumentAutoSettings && posDocumentAutoSettings.auto_calculate_order_shipping === true) {
                setTimeout(() => calculatePosShippingFee(), 200);
            } else {
                updatePosShippingButtonVisibility();
            }
        } catch (error) {
            console.error('Failed to load customer info:', error);
        }
    }

    const posDiningTableCacheById = new Map();

    function buildPosDiningTableText(table) {
        if (!table) return '';
        const code = table.code || table.id || '';
        const areaName = table.area && table.area.name ? table.area.name : '';
        const seats = table.seats ? `${table.seats}人` : '';
        const extra = [areaName, seats].filter(Boolean).join(' ');
        return extra ? `${code} (${extra})` : code;
    }

    async function fetchPosDiningTableById(id) {
        const tid = String(id || '');
        if (!tid) return null;
        if (posDiningTableCacheById.has(tid)) return posDiningTableCacheById.get(tid);
        try {
            const table = await App.apiRequest(`/dining-tables/${tid}`);
            if (table && table.id) {
                posDiningTableCacheById.set(tid, table);
                return table;
            }
        } catch (e) {}
        posDiningTableCacheById.set(tid, null);
        return null;
    }

    async function fetchPosDiningTableByCode(code) {
        const c = String(code || '').trim();
        if (!c) return null;
        try {
            const table = await App.apiRequest(`/dining-tables/by-code?code=${encodeURIComponent(c)}`);
            if (table && table.id) {
                posDiningTableCacheById.set(String(table.id), table);
                return table;
            }
        } catch (e) {}
        return null;
    }

    async function ensurePosDiningTableOption($select, table) {
        if (!$select || !$select.length || !table || !table.id) return;
        const tid = String(table.id);
        if ($select.find(`option[value="${tid}"]`).length > 0) return;
        const text = buildPosDiningTableText(table) || tid;
        const opt = new Option(text, tid, true, true);
        $select.append(opt);
    }

            // 設置介紹人代碼（客戶填寫的介紹人代碼，指向介紹人的 code）
            // 注意：customer.referral_code 是客戶填寫的介紹人代碼，不是客戶自己的 code
            const referralCode = (customer.referral_code && customer.referral_code.trim() !== '') ? customer.referral_code : '';
            document.getElementById('referralCode').value = referralCode;
            // 更新 QR Code 預覽按鈕顯示狀態
            if (typeof updateQRCodePreview === 'function') {
                updateQRCodePreview('referralCode');
            }
            
            // 如果有介紹人代碼，查找介紹人
            if (referralCode) {
                await loadReferrerByCode(referralCode);
            } else {
                document.getElementById('referrerInfoRow').style.display = 'none';
                currentReferrer = null;
            }
            
            // 顯示編輯客戶鏈接
            document.getElementById('customerEditRow').style.display = 'block';
            
            // 啟用積分使用區域
            if (pointSetting && customer.total_points > 0) {
                document.getElementById('posPointsUsed').disabled = false;
                document.getElementById('posAvailablePoints').textContent = customer.total_points || 0;
            } else {
                document.getElementById('posPointsUsed').disabled = true;
                document.getElementById('posPointsUsed').value = 0;
                document.getElementById('posAvailablePoints').textContent = '0';
            }
            
            // 載入會員等級信息
            if (customer.member_level_id) {
                try {
                    const memberLevel = await App.apiRequest(`/member-levels/${customer.member_level_id}`);
                    currentMemberLevel = memberLevel;
                    // 啟用全單折扣和自動折扣按鈕
                    document.getElementById('posOrderDiscount').disabled = false;
                    document.getElementById('applyMemberLevelBtn').disabled = false;
                    document.getElementById('autoApplyBestDiscountBtn').disabled = false;
                } catch (error) {
                    console.error(I18n.t('pos.loadMemberLevelError') + ':', error);
                    currentMemberLevel = null;
                    document.getElementById('posOrderDiscount').disabled = true;
                    document.getElementById('applyMemberLevelBtn').disabled = true;
                    document.getElementById('autoApplyBestDiscountBtn').disabled = true;
                }
            } else {
                currentMemberLevel = null;
                document.getElementById('posOrderDiscount').disabled = true;
                document.getElementById('applyMemberLevelBtn').disabled = true;
                document.getElementById('autoApplyBestDiscountBtn').disabled = true;
            }
            
            // 載入客戶印花餘額
            await loadPosCustomerStamps(customerId);
        } catch (error) {
            console.error(I18n.t('pos.loadReferralCodeError') + ':', error);
        }
    }
    
    // 載入客戶印花餘額
    async function loadPosCustomerStamps(customerId) {
        posCustomerStampBalances = [];
        posStampRedeemableProductIds = []; // 可用印花兌換的產品ID列表
        
        const stampBalancesDiv = document.getElementById('posCustomerStampBalances');
        const stampUseInput = document.getElementById('posStampUseInput');
        const applyStampBtn = document.getElementById('posApplyStampBtn');
        
        // 獲取可換購產品的產品ID列表（用於驗證購物車）
        try {
            const redeemRes = await fetch('/api/v1/stamp-redeemable-products-available');
            if (redeemRes.ok) {
                const redeemData = await redeemRes.json();
                posStampRedeemableProductIds = (redeemData.data || []).map(r => r.product_id);
            }
        } catch (error) {
            console.error('載入可換購產品失敗:', error);
        }
        
        // 如果沒有客戶，禁用印花輸入
        if (!customerId) {
            if (stampBalancesDiv) {
                stampBalancesDiv.innerHTML = '<small class="text-muted">' + I18n.t('pos.selectCustomerFirst', '請先選擇客戶') + '</small>';
            }
            if (stampUseInput) {
                stampUseInput.disabled = true;
                stampUseInput.value = '';
            }
            if (applyStampBtn) {
                applyStampBtn.disabled = true;
            }
            return;
        }
        
        try {
            // 獲取客戶印花餘額
            const balanceRes = await fetch(`/api/v1/customer-stamps?customer_id=${customerId}`);
            if (balanceRes.ok) {
                const balanceData = await balanceRes.json();
                posCustomerStampBalances = balanceData.data || [];
            }
            
            // 顯示印花餘額並啟用輸入
            if (stampBalancesDiv) {
                if (posCustomerStampBalances.length > 0) {
                    let totalBalance = 0;
                    let balanceHtml = '';
                    posCustomerStampBalances.forEach(b => {
                        const settingName = b.stamp_setting?.name || I18n.t('pos.stamps');
                        balanceHtml += `<span class="badge bg-success me-1">${settingName}: ${b.balance}</span>`;
                        totalBalance += b.balance || 0;
                    });
                    stampBalancesDiv.innerHTML = balanceHtml;
                    
                    // 啟用印花輸入
                    if (stampUseInput) {
                        stampUseInput.disabled = false;
                        stampUseInput.max = totalBalance;
                        stampUseInput.placeholder = `最多可用 ${totalBalance} 印花`;
                    }
                    if (applyStampBtn) {
                        applyStampBtn.disabled = false;
                    }
                } else {
                    stampBalancesDiv.innerHTML = '<small class="text-muted">' + I18n.t('pos.noStamps', '沒有可用印花') + '</small>';
                    if (stampUseInput) {
                        stampUseInput.disabled = true;
                        stampUseInput.value = '';
                    }
                    if (applyStampBtn) {
                        applyStampBtn.disabled = true;
                    }
                }
            }
        } catch (error) {
            console.error('載入客戶印花餘額失敗:', error);
        }
    }
    
    // 頁面載入時初始化印花區域
    async function initPosStampRedeemables() {
        await loadPosCustomerStamps(null);
        
        // 綁定輸入事件
        const stampUseInput = document.getElementById('posStampUseInput');
        if (stampUseInput) {
            stampUseInput.addEventListener('input', validatePosStampInput);
        }
    }
    
    // 驗證印花輸入
    function validatePosStampInput() {
        const input = document.getElementById('posStampUseInput');
        const warningDiv = document.getElementById('posStampWarning');
        const warningText = document.getElementById('posStampWarningText');
        
        if (!input) return;
        
        const stampsToUse = parseInt(input.value) || 0;
        let totalBalance = 0;
        posCustomerStampBalances.forEach(b => totalBalance += b.balance || 0);
        
        // 檢查是否超過餘額
        if (stampsToUse > totalBalance) {
            if (warningDiv && warningText) {
                warningText.textContent = I18n.t('pos.insufficientStamps', '印花餘額不足');
                warningDiv.style.display = 'block';
            }
            return false;
        }
        
        // 檢查購物車中是否有不能用印花的產品
        const nonRedeemableItems = posCart.filter(item => 
            !item.is_stamp_redeem && 
            !posStampRedeemableProductIds.includes(item.product_id)
        );
        
        if (stampsToUse > 0 && nonRedeemableItems.length > 0) {
            const names = nonRedeemableItems.map(i => i.name).join(', ');
            if (warningDiv && warningText) {
                warningText.textContent = I18n.t('pos.someItemsNotRedeemable', '以下產品不能用印花抵扣：') + names;
                warningDiv.style.display = 'block';
            }
        } else {
            if (warningDiv) {
                warningDiv.style.display = 'none';
            }
        }
        
        return true;
    }
    
    // 套用印花折扣
    function applyPosStampDiscount() {
        // 檢查是否已選擇客戶
        if (!currentCustomer) {
            showToast(I18n.t('pos.selectCustomerFirst') || '請先選擇客戶', 'error');
            return;
        }
        
        const input = document.getElementById('posStampUseInput');
        if (!input) return;
        
        const stampsToUse = parseInt(input.value) || 0;
        if (stampsToUse <= 0) {
            // 清除印花使用
            posStampsUsed = 0;
            updateCartDisplay();
            calculateCartTotal();
            return;
        }
        
        // 驗證印花數量
        let totalBalance = 0;
        posCustomerStampBalances.forEach(b => totalBalance += b.balance || 0);
        
        if (stampsToUse > totalBalance) {
            showToast(I18n.t('pos.insufficientStamps') || '印花餘額不足', 'error');
            return;
        }
        
        // 檢查購物車中是否有可用印花的產品
        const redeemableItems = posCart.filter(item => 
            !item.is_stamp_redeem && 
            posStampRedeemableProductIds.includes(item.product_id)
        );
        
        if (redeemableItems.length === 0 && posCart.length > 0) {
            showToast(I18n.t('pos.noRedeemableItemsInCart', '購物車中沒有可用印花抵扣的產品'), 'warning');
            return;
        }
        
        // 設置使用的印花數
        posStampsUsed = stampsToUse;
        
        // 更新顯示
        const infoDiv = document.getElementById('posStampUseInfo');
        const discountAmount = document.getElementById('posStampDiscountAmount');
        if (infoDiv && discountAmount) {
            // 嘗試從印花設定中獲取現金價值，默認為 1
            let stampValue = 1;
            if (posCustomerStampBalances && posCustomerStampBalances.length > 0) {
                // 優先查找有定義 cash_value 的設定
                const balanceWithRate = posCustomerStampBalances.find(b => 
                    b.stamp_setting && 
                    b.stamp_setting.extra_fields && 
                    (b.stamp_setting.extra_fields.cash_value !== undefined || b.stamp_setting.extra_fields.rate !== undefined)
                );
                
                if (balanceWithRate && balanceWithRate.stamp_setting && balanceWithRate.stamp_setting.extra_fields) {
                    // 支持 cash_value 或 rate 字段
                    const val = balanceWithRate.stamp_setting.extra_fields.cash_value || balanceWithRate.stamp_setting.extra_fields.rate;
                    if (val && !isNaN(val)) {
                        stampValue = parseFloat(val);
                    }
                }
            }
            
            discountAmount.textContent = '$' + (stampsToUse * stampValue).toFixed(2);
            infoDiv.style.display = 'block';
        }
        
        updateCartDisplay();
        calculateCartTotal();
        showToast(I18n.t('pos.stampApplied', '已套用印花折扣'), 'success');
    }

            if (diningQueueRow) diningQueueRow.style.display = diningModuleEnabled ? '' : 'none';
            
            // 初始化電話區號 Select2
            editOrderPhoneCodeSelect = document.getElementById('editOrderPhoneCode');
            if (editOrderPhoneCodeSelect && typeof $ !== 'undefined') {

                }
                
                $(editOrderPhoneCodeSelect).select2({
                    theme: 'bootstrap-5',
                    placeholder: (typeof I18n !== 'undefined' && I18n.t) ? I18n.t('pos.searchPhoneCode') : 'Search phone country code...',
                    allowClear: true,
                    width: '110px',
                    dropdownParent: $('#editOrderInfoModal'),
                    ajax: {
                        url: '/api/v1/phone-country-codes',
                        dataType: 'json',
                        delay: 250,
                        headers: {
                            'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || '')
                        },
                        data: function(params) {
                            return {
                                search: params.term || '',
                                page: params.page || 1,
                                limit: 20
                            };
                        },
                        processResults: function(data) {
                            const results = (data.data || []).map(item => ({
                                id: item.code,
                                text: item.code
                            }));
                            return { results: results };
                        },
                        cache: true
                    },
                    minimumInputLength: 0
                });
                
                // 設置默認值（系統預設的電話區號）
                setTimeout(async () => {
                    try {
                        const resp = await App.apiRequest('/api/v1/phone-country-codes');
                        const codes = (resp && resp.data) ? resp.data : [];
                        // API 已按 is_default DESC 排序，第一個就是默認值，但還是要檢查 is_default 字段
                        const defaultCode = codes.find(c => c && (c.is_default === true || c.is_default === 'true' || c.is_default === 1));
                        // 如果沒找到，使用第一個（因為 API 已排序，第一個應該就是默認值）
                        const finalDefaultCode = defaultCode || (codes.length > 0 ? codes[0] : null);
                        
                        // 優先使用 orderInfo 中的 phone_country_code
                        let codeToSet = orderInfo.phone_country_code || null;
                        
                        // 如果沒有 phone_country_code，嘗試從 phone 中解析
                        if (!codeToSet && orderInfo.phone) {
                            const existingPhone = orderInfo.phone;
                            const match = existingPhone.match(/^(\+?\d{1,4})\s*(.+)$/);
                            if (match) {
                                codeToSet = match[1].startsWith('+') ? match[1] : '+' + match[1];
                            } else {
                                const codeMatch = existingPhone.match(/^(\+?\d{1,4})/);
                                if (codeMatch) {
                                    codeToSet = codeMatch[1].startsWith('+') ? codeMatch[1] : '+' + codeMatch[1];
                                }
                            }
                        }
                        
                        // 如果還是沒有，使用系統預設
                        if (!codeToSet && finalDefaultCode) {
                            codeToSet = finalDefaultCode.code;
                        }
                        
                        if (codeToSet) {
                            // 確保 Select2 選項存在

                            'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                        },

                            return {
                                search: params.term || '',
                                page: params.page || 1,
                                limit: 50,
                                is_active: true
                            };
                        },
                        processResults: function(data, params) {
                            params.page = params.page || 1;
                            const items = (data && data.data) ? data.data : [];
                            items.forEach(t => {
                                if (t && t.id) posDiningTableCacheById.set(String(t.id), t);
                            });

                                results: items.map(t => ({
                                    id: t.id,
                                    text: buildPosDiningTableText(t) || t.code || t.id,
                                    code: t.code,
                                    area_id: t.area ? t.area.id : null,
                                    area_name: t.area ? t.area.name : null
                                })),
                                pagination: { more: items.length === 50 }
                            };
                        },
                        cache: true
                    },
                    minimumInputLength: 0
                });

                const tableId = orderInfo.dining_table_id || '';
                const tableCode = orderInfo.dining_table_code || '';
                if (tableId || tableCode) {
                    setTimeout(async () => {
                        let table = null;

                            await ensurePosDiningTableOption($(editOrderDiningTableSelect), table);

                    $(editCustomerPhoneCodeSelect).select2('destroy');
                }
                
                $(editCustomerPhoneCodeSelect).select2({
                    theme: 'bootstrap-5',

                    allowClear: true,
                    width: '110px',
                    dropdownParent: $('#editCustomerInfoModal'),
                    ajax: {
                        url: '/api/v1/phone-country-codes',
                        dataType: 'json',
                        delay: 250,
                        headers: {
                            'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || '')
                        },
                        data: function(params) {
                            return {
                                search: params.term || '',
                                page: params.page || 1,
                                limit: 20
                            };
                        },
                        processResults: function(data) {
                            const results = (data.data || []).map(item => ({
                                id: item.code,
                                text: item.code
                            }));
                            return { results: results };
                        },
                        cache: true
                    },
                    minimumInputLength: 0
                });
                
                // 設置電話區號和號碼
                setTimeout(async () => {
                    try {
                        const resp = await App.apiRequest('/api/v1/phone-country-codes');
                        const codes = (resp && resp.data) ? resp.data : [];
                        const defaultCode = codes.find(c => c && (c.is_default === true || c.is_default === 'true' || c.is_default === 1));
                        const finalDefaultCode = defaultCode || (codes.length > 0 ? codes[0] : null);
                        
                        // 優先使用 currentCustomer 中的 phone_country_code
                        let codeToSet = currentCustomer.phone_country_code || null;
                        
                        // 如果沒有 phone_country_code，嘗試從 phone 中解析
                        if (!codeToSet && currentCustomer.phone) {
                            const existingPhone = currentCustomer.phone;
                            const match = existingPhone.match(/^(\+?\d{1,4})\s*(.+)$/);
                            if (match) {
                                codeToSet = match[1].startsWith('+') ? match[1] : '+' + match[1];
                            } else {
                                const codeMatch = existingPhone.match(/^(\+?\d{1,4})/);
                                if (codeMatch) {
                                    codeToSet = codeMatch[1].startsWith('+') ? codeMatch[1] : '+' + codeMatch[1];
                                }
                            }
                        }
                        
                        // 如果還是沒有，使用系統預設
                        if (!codeToSet && finalDefaultCode) {
                            codeToSet = finalDefaultCode.code;
                        }
                        
                        if (codeToSet) {
                            // 確保 Select2 選項存在
                            if ($(editCustomerPhoneCodeSelect).find(`option[value="${codeToSet}"]`).length === 0) {
                                const newOption = new Option(codeToSet, codeToSet, true, true);
                                $(editCustomerPhoneCodeSelect).append(newOption);
                            }
                            $(editCustomerPhoneCodeSelect).val(codeToSet).trigger('change');
                        }
                        
                        // 設置電話號碼（優先使用解析後的號碼，否則從 phone 中移除區號）
                        const phoneInput = document.getElementById('editCustomerPhone');
                        if (phoneInput) {
                            if (currentCustomer.phone && codeToSet) {
                                // 從 phone 中移除區號
                                const phoneWithoutCode = currentCustomer.phone.replace(new RegExp(`^\\+?${codeToSet.replace('+', '')}\\s*`), '').trim();
                                phoneInput.value = phoneWithoutCode;
                            } else if (currentCustomer.phone) {
                                phoneInput.value = currentCustomer.phone;
                            }
                        }
                    } catch (error) {
                        console.warn('獲取預設電話區號失敗:', error);
                    }
                }, 300);
            }
        }, { once: true });
        
        // 模態框關閉時清理
        editCustomerInfoModalElement.addEventListener('hidden.bs.modal', function() {
            // 清理 Select2
            if (editCustomerPhoneCodeSelect && typeof $ !== 'undefined' && $(editCustomerPhoneCodeSelect).hasClass('select2-hidden-accessible')) {
                $(editCustomerPhoneCodeSelect).select2('destroy');
            }
            // 移除 modal 元素
            if (editCustomerInfoModalElement && editCustomerInfoModalElement.parentNode) {
                editCustomerInfoModalElement.remove();
            }
        }, { once: true });
        
        modal.show();
    }

    // 更新 POS 積分折扣
    function updatePosPointsDiscount() {
        posPointsUsed = parseInt(document.getElementById('posPointsUsed').value) || 0;
        
        if (!pointSetting || !currentCustomer) {
            posPointsDiscount = 0;
            calculateCartTotal();
            return;
        }
        
        const availablePoints = currentCustomer.total_points || 0;
        let maxPoints = Math.floor(calculateCartSubtotal() / pointSetting.dollar_per_point);
        // 百分比限制：積分最多可抵扣小計的 X%
        if (pointSetting.max_points_percent) {
            const subtotal = calculateCartSubtotal();
            const maxDiscount = subtotal * pointSetting.max_points_percent / 100;
            const maxPointsByPercent = Math.floor(maxDiscount / pointSetting.dollar_per_point);
            maxPoints = Math.min(maxPoints, maxPointsByPercent);
        }
        
        // 限制積分使用
        if (posPointsUsed > maxPoints) {
            posPointsUsed = maxPoints;
            document.getElementById('posPointsUsed').value = posPointsUsed;
        }
        
        if (posPointsUsed > availablePoints) {
            posPointsUsed = availablePoints;
            document.getElementById('posPointsUsed').value = posPointsUsed;
        }
        
        if (posPointsUsed < pointSetting.min_points_to_use) {
            posPointsUsed = 0;
            document.getElementById('posPointsUsed').value = 0;
        }
        
        // 計算積分折扣
        posPointsDiscount = posPointsUsed * pointSetting.dollar_per_point;
        
        // 確保折扣不超過小計
        const subtotal = calculateCartSubtotal();
        if (posPointsDiscount > subtotal) {
            posPointsDiscount = subtotal;
            posPointsUsed = Math.floor(posPointsDiscount / pointSetting.dollar_per_point);
            document.getElementById('posPointsUsed').value = posPointsUsed;
        }
        
        calculateCartTotal();
    }
    
    // 計算購物車小計（不含折扣）
    function calculateCartSubtotal() {
        let subtotal = 0;
        cart.forEach(item => {
            subtotal += item.unit_price * item.quantity;
        });
        return subtotal;
    }

    // 頁面卸載時停止掃描器
    window.addEventListener('beforeunload', async () => {
        if (qrScanner && isScanning) {
            try {
                await qrScanner.stop();
                qrScanner.clear();
            } catch (error) {
                console.error('停止掃描器失敗:', error);

    // QR Code 掃描器變量
    let qrScanner = null;
    let isScanning = false;
    
    // 切換 QR Code 掃描器
    async function toggleQRScanner() {
        const scannerArea = document.getElementById('qrScannerArea');
        const qrReader = document.getElementById('qr-reader');
        const placeholder = document.getElementById('qrScannerPlaceholder');
        const toggleBtn = document.getElementById('qrScannerToggleBtn');
        
        if (!isScanning) {
            // 開始掃描
            try {
                // 檢查是否支持 html5-qrcode
                if (typeof Html5Qrcode === 'undefined') {
                    App.showAlert('QR Code 掃描庫未載入', 'warning');
                    return;
                }
                
                // 創建掃描器實例
                qrScanner = new Html5Qrcode("qr-reader");
                
                // 顯示掃描區域
                qrReader.style.display = 'block';
                placeholder.style.display = 'none';
                scannerArea.classList.add('active');
                toggleBtn.innerHTML = '<i class="bi bi-stop-circle"></i> 停止掃描';
                
                // 開始掃描
                await qrScanner.start(
                    { facingMode: "environment" }, // 使用後置攝像頭
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 },
                        aspectRatio: 1.0
                    },
                    (decodedText, decodedResult) => {
                        // 掃描成功
                        handleQRCodeScanned(decodedText);
                    },
                    (errorMessage) => {
                        // 掃描錯誤（忽略，因為會持續掃描）
                    }
                );
                
                isScanning = true;
            } catch (error) {
                console.error('啟動 QR Code 掃描失敗:', error);
                App.showAlert('無法啟動攝像頭: ' + error.message, 'danger');
                // 恢復狀態
                qrReader.style.display = 'none';
                placeholder.style.display = 'block';
                scannerArea.classList.remove('active');
                toggleBtn.innerHTML = '<i class="bi bi-camera-video"></i> 開始掃描';
            }
        } else {
            // 停止掃描
            try {
                if (qrScanner) {
                    await qrScanner.stop();
                    qrScanner.clear();
                    qrScanner = null;
                }
                
                qrReader.style.display = 'none';
                placeholder.style.display = 'block';
                scannerArea.classList.remove('active');
                toggleBtn.innerHTML = '<i class="bi bi-camera-video"></i> 開始掃描';
                isScanning = false;
            } catch (error) {
                console.error('停止 QR Code 掃描失敗:', error);
            }
        }
    }
    
    // 處理掃描到的 QR Code（支援商品條碼、訂單編號、餐桌 QR）
    async function handleQRCodeScanned(decodedText) {
        console.log('掃描到 QR Code:', decodedText);
        
        // 停止掃描（避免重複掃描）
        if (qrScanner && isScanning) {
            try {
                await qrScanner.stop();
                qrScanner.clear();
                qrScanner = null;
                isScanning = false;
                
                const scannerArea = document.getElementById('qrScannerArea');
                const qrReader = document.getElementById('qr-reader');
                const placeholder = document.getElementById('qrScannerPlaceholder');
                const toggleBtn = document.getElementById('qrScannerToggleBtn');
                
                qrReader.style.display = 'none';
                placeholder.style.display = 'block';
                scannerArea.classList.remove('active');
                toggleBtn.innerHTML = '<i class="bi bi-camera-video"></i> 開始掃描';
            } catch (error) {
                console.error('停止掃描失敗:', error);
            }
        }
        
        // 使用統一的輸入處理函數
        const scannedValue = decodedText.trim();
        const parsed = parseInputType(scannedValue);
        console.log('QR 掃描解析結果:', parsed);
        
        switch (parsed.type) {
            case 'dining':
                await handleDiningTableInput(parsed);
                break;
                
            case 'uuid':
                // UUID 可能是訂單 ID 或餐桌 ID，優先嘗試商品再訂單
                await handleOrderOrTableById(parsed.value);
                break;
                
            case 'order':
                // 設置輸入框值並載入訂單
                document.getElementById('productSearch').value = parsed.value;
                await loadExistingOrder();
                break;
                
            case 'product':
            default:
                await handleProductInput(parsed.value);
                break;
        }
    }
    
    // 處理條碼掃描（鍵盤輸入）
    function handleBarcodeScan(event) {
        // 如果按 Enter 鍵，處理條碼掃描
        if (event.key === 'Enter') {
            const searchInput = event.target;
            const searchValue = searchInput.value.trim();
            
            if (searchValue) {
                // 查找匹配的商品
                const matchedProduct = (allProducts || products || []).find(p => 
                    (p.barcode && p.barcode.toLowerCase() === searchValue.toLowerCase()) ||
                    (p.sku && p.sku.toLowerCase() === searchValue.toLowerCase()) ||
                    (p.code && p.code.toLowerCase() === searchValue.toLowerCase())
                );
                
                if (matchedProduct) {
                    // 找到商品，添加到購物車
                    addToCart(matchedProduct.id, 'product');
                    searchInput.value = '';
                    searchProducts();
                    App.showAlert(`已添加商品: ${matchedProduct.name}`, 'success');
                }
            }
        }
    }

    // 搜索商品
    function searchProducts() {
        const search = document.getElementById('productSearch').value.toLowerCase();
        let filtered = allProducts;
        
        // 應用當前篩選
        if (currentProductFilter === 'product_type') {
            const typeId = selectedProductTypeId || document.getElementById('productTypeSelect')?.value;
            if (typeId) {
                filtered = filtered.filter(p => p.product_type_id === typeId);
            }
        } else if (currentProductFilter === 'brand') {
            const brandId = selectedBrandId || document.getElementById('brandSelect')?.value;
            if (brandId) {
                filtered = filtered.filter(p => p.brand_id === brandId);
            }
        }

        // 應用產品標籤篩選
        if (posSelectedProductLabelIds.length > 0) {
            const selectedSet = new Set(posSelectedProductLabelIds.map(String));
            filtered = filtered.filter(p => Array.isArray(p.labels) && p.labels.some(l => selectedSet.has(String(l.id))));
        }
        
        // 應用搜索關鍵字
        if (search) {
            filtered = filtered.filter(p => 
            p.name.toLowerCase().includes(search) ||
                (p.code && p.code.toLowerCase().includes(search)) ||
                (p.sku && p.sku.toLowerCase().includes(search)) ||
                (p.barcode && p.barcode.toLowerCase().includes(search))
            );
        }
        
        products = filtered;
        renderProducts(products);
    }
