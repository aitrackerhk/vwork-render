    // 添加到購物車
    async function addToCart(itemId, type) {
        let item;
        if (type === 'product') {
            item = products.find(p => p.id === itemId);
            if (!item) return;
            
            // 檢查庫存和 allow_backorder
            const requestedQuantity = 1; // POS 每次添加 1 個
            const stockQuantity = item.stock_quantity || 0;
            const allowBackorder = item.allow_backorder === true || item.allow_backorder === 'yes' || item.allow_backorder === 'true';
            
            // 如果庫存不足且不允許缺貨訂購
            if (stockQuantity < requestedQuantity && !allowBackorder) {
                const confirmMessage = `產品「${item.name}」庫存不足（當前庫存：${stockQuantity}）。\n\n是否要將此產品設為允許缺貨訂購（Allow Backorder）？\n\n確認：將產品設為允許缺貨訂購並加入購物車\n取消：不加入購物車`;
                
                if (!confirm(confirmMessage)) {
                    return; // 用戶取消，不添加產品
                }
                
                // 用戶確認，更新產品為允許缺貨訂購
                try {
                    App.showLoading('正在更新產品設置...');
                    await App.apiRequest(`/products/${itemId}`, {
                        method: 'PUT',
                        body: JSON.stringify({
                            code: item.code,
                            name: item.name,
                            description: item.description,
                            category: item.category,
                            product_type_id: item.product_type_id,
                            brand_id: item.brand_id,
                            image_url: item.image_url,
                            price: item.price,
                            cost: item.cost,
                            stock_quantity: item.stock_quantity,
                            unit: item.unit,
                            is_service_package: item.is_service_package,
                            service_package_service_id: item.service_package_service_id,
                            allow_backorder: 'yes',
                            status: item.status || 'active'
                        })
                    });
                    
                    // 更新本地產品數據
                    item.allow_backorder = 'yes';
                    const productIndex = products.findIndex(p => p.id === itemId);
                    if (productIndex !== -1) {
                        products[productIndex].allow_backorder = 'yes';
                    }
                    
                    App.hideLoading();
                    App.showAlert('已將產品設為允許缺貨訂購', 'success');
                } catch (error) {
                    App.hideLoading();
                    console.error('更新產品失敗:', error);
                    App.showAlert('更新產品設置失敗: ' + (error.message || error), 'danger');
                    return; // 更新失敗，不添加產品
                }
            }
            
            // 檢查產品是否有屬性（直接從 API 載入完整產品信息）
            let productAttributes = null;
            let hasProductAttributes = false; // 標記產品是否有屬性定義
            try {
                const fullProduct = await App.apiRequest(`/products/${itemId}`);
                if (fullProduct.product_attribute_values && fullProduct.product_attribute_values.length > 0) {
                    hasProductAttributes = true; // 產品有屬性定義
                    // 載入所有產品屬性定義
                    const attributesResponse = await App.apiRequest('/product-attributes?limit=1000');
                    const allAttributes = attributesResponse.data || [];
                    const attributeMap = {};
                    allAttributes.forEach(attr => {
                        attributeMap[attr.id] = attr;
                    });
                    
                    // 檢查是否有必填屬性
                    const requiredAttributes = [];
                    fullProduct.product_attribute_values.forEach(attrValue => {
                        const attrDef = attributeMap[attrValue.attribute_id];
                        if (attrDef && (attrDef.is_required === true || attrDef.is_required === 'yes' || attrDef.is_required === 'true')) {
                            requiredAttributes.push({
                                ...attrDef,
                                currentValue: attrValue.value
                            });
                        }
                    });
                    
                    // 如果有屬性值，顯示彈窗
                    if (fullProduct.product_attribute_values.length > 0) {
                        productAttributes = await showProductAttributesModal(fullProduct.product_attribute_values, allAttributes, requiredAttributes, fullProduct.name);
                        if (productAttributes === null) {
                            return; // 用戶取消
                        }
                    }
                }
            } catch (error) {
                console.error('載入產品屬性失敗:', error);
            }
            
            const existing = cart.find(c => c.product_id === itemId && !c.service_id);
            if (existing) {
                existing.quantity += 1;
                existing.total_amount = (existing.unit_price * existing.quantity) - (existing.discount_amount || 0);
                if (productAttributes) {
                    existing.product_attributes = productAttributes;
                }
                // 更新是否有屬性的標記
                existing.has_product_attributes = hasProductAttributes;
            } else {
                cart.push({
                    product_id: itemId,
                    service_id: null,
                    item_name: item.name,
                    quantity: 1,
                    unit_price: item.price || 0,
                    discount_amount: 0,
                    tax_rate: 0,
                    total_amount: item.price || 0,
                    product_attributes: productAttributes,
                    has_product_attributes: hasProductAttributes // 標記產品是否有屬性定義
                });
            }
        }
        
        // 如果已應用優惠券，重新驗證
        if (currentCoupon) {
            await applyPosCoupon();
        } else {
            calculateCartTotal();
            updateCartDisplay();
        }
    }

    // 顯示產品屬性選擇彈窗
    async function showProductAttributesModal(productAttributeValues, allAttributes, requiredAttributes, productName = '') {
        return new Promise(async (resolve) => {
            const attributeMap = {};
            allAttributes.forEach(attr => {
                attributeMap[attr.id] = attr;
            });
            
            // 構建屬性表單 HTML
            let attributesHtml = '';
            productAttributeValues.forEach(attrValue => {
                const attrDef = attributeMap[attrValue.attribute_id];
                if (!attrDef) return;
                
                const isRequired = attrDef.is_required === true || attrDef.is_required === 'yes' || attrDef.is_required === 'true';
                const isDropdown = attrDef.attribute_type === 'select' || attrDef.attribute_type === 'dropdown';
                let options = attrDef.options || [];
                if (typeof options === 'string' && options.trim() !== '') {
                    options = options.split(',').map(opt => opt.trim()).filter(opt => opt !== '');
                }
                
                let valueField = '';
                // 解析產品已選擇的值（可能是逗號分隔的字符串）
                const selectedValues = attrValue.value ? (attrValue.value.includes(',') 
                    ? attrValue.value.split(',').map(v => v.trim()).filter(v => v)
                    : [attrValue.value.trim()]) : [];
                
                if (isDropdown && options.length > 0) {
                    // 只顯示產品已選擇的值作為選項，但用戶只能單選
                    if (selectedValues.length > 0) {
                        let optionHtml = '<option value="">請選擇</option>';
                        let currentSelectedValue = ''; // 當前已選擇的值（如果有的話）
                        
                        // 檢查 item 中是否已經選擇了這個屬性的值
                        if (window.currentEditingItem && window.currentEditingItem.product_attributes) {
                            const existingAttr = window.currentEditingItem.product_attributes.find(a => a.attribute_id === attrDef.id);
                            if (existingAttr) {
                                currentSelectedValue = existingAttr.value;
                            }
                        }
                        
                        selectedValues.forEach(selectedValue => {
                            // 在選項中查找對應的標籤
                            const matchedOption = options.find(opt => {
                                const optValue = typeof opt === 'string' ? opt : (opt.value || opt.label || opt);
                                return String(optValue).trim() === String(selectedValue).trim();
                            });
                            if (matchedOption) {
                                const optValue = typeof matchedOption === 'string' ? matchedOption : (matchedOption.value || matchedOption.label || matchedOption);
                                const optLabel = typeof matchedOption === 'string' ? matchedOption : (matchedOption.label || matchedOption.value || matchedOption);
                                const isSelected = currentSelectedValue && (String(currentSelectedValue).trim() === String(optValue).trim() || String(currentSelectedValue).trim() === String(selectedValue).trim());
                                optionHtml += `<option value="${optValue}" ${isSelected ? 'selected' : ''}>${optLabel}</option>`;
                            } else {
                                // 如果找不到匹配的選項，直接顯示值
                                const isSelected = currentSelectedValue && String(currentSelectedValue).trim() === String(selectedValue).trim();
                                optionHtml += `<option value="${selectedValue}" ${isSelected ? 'selected' : ''}>${selectedValue}</option>`;
                            }
                        });
                        valueField = `<select class="form-select attr-value-input" data-attribute-id="${attrDef.id}" ${isRequired ? 'required' : ''}>${optionHtml}</select>`;
                    } else {
                        // 如果沒有選擇任何值，不顯示這個屬性
                        return;
                    }
                } else {
                    // Input 類型：顯示輸入框
                    // 檢查是否為 read-only（如果產品已有值，則設為 read-only）
                    let currentValue = '';
                    if (window.currentEditingItem && window.currentEditingItem.product_attributes) {
                        const existingAttr = window.currentEditingItem.product_attributes.find(a => a.attribute_id === attrDef.id);
                        if (existingAttr) {
                            currentValue = existingAttr.value;
                        }
                    }
                    if (!currentValue && selectedValues.length > 0) {
                        currentValue = selectedValues.join(', ');
                    }
                    // 只要產品有 default value (selectedValues.length > 0)，input 就變 readonly
                    const isReadonly = selectedValues.length > 0;
                    const readonlyAttr = isReadonly ? 'readonly' : '';
                    const readonlyClass = isReadonly ? 'bg-light' : '';
                    const finalValue = currentValue || (selectedValues.length > 0 ? selectedValues.join(', ') : '');
                    valueField = `<input type="text" class="form-control attr-value-input ${readonlyClass}" data-attribute-id="${attrDef.id}" value="${finalValue.replace(/"/g, '&quot;')}" ${isRequired ? 'required' : ''} ${readonlyAttr} placeholder="輸入屬性值">`;
                }
                
                attributesHtml += `
                    <div class="mb-3">
                        <label class="form-label">
                            ${attrDef.name} ${isRequired ? '<span class="text-danger">*</span>' : ''}
                        </label>
                        ${valueField}
                    </div>
                `;
            });
            
            const modalHtml = `
                <div class="modal fade" id="productAttributesModal" tabindex="-1" aria-labelledby="productAttributesModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="productAttributesModalLabel">選擇產品屬性${productName ? ` - ${productName}` : ''}</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" data-i18n-aria-label="common.close"></button>
                            </div>
                            <div class="modal-body">
                                <form id="productAttributesForm">
                                    ${attributesHtml}
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="button" class="btn btn-primary" onclick="confirmProductAttributes()">確認</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 移除舊的 modal（如果存在）
            const existingModal = document.getElementById('productAttributesModal');
            if (existingModal) existingModal.remove();
            
            // 添加新的 modal（先等 i18n ready，避免顯示後才跳語言）
            await ensureI18nReadyForPopup();
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            applyI18nNow();
            const modal = new bootstrap.Modal(document.getElementById('productAttributesModal'));
            
            // 初始化 Select2（單選模式）
            modal._element.addEventListener('shown.bs.modal', function() {
                setTimeout(() => {
                    document.querySelectorAll('.attr-value-input').forEach(select => {
                        if (select.tagName === 'SELECT' && typeof $ !== 'undefined' && !$(select).hasClass('select2-hidden-accessible')) {
                            $(select).select2({
                                theme: 'bootstrap-5',
                                placeholder: '請選擇',
                                allowClear: false,
                                width: '100%'
                            });
                        }
                    });
                }, 100);
            });
            
            // 定義確認函數
            window.confirmProductAttributes = function() {
                const form = document.getElementById('productAttributesForm');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }
                
                const attributes = [];
                document.querySelectorAll('.attr-value-input').forEach(input => {
                    const attributeId = input.getAttribute('data-attribute-id');
                    let value = '';
                    
                    // 單選模式：直接獲取值
                    if (input.tagName === 'SELECT' && typeof $ !== 'undefined' && $(input).hasClass('select2-hidden-accessible')) {
                        // 使用 Select2 的值
                        value = $(input).val() || '';
                        if (Array.isArray(value)) {
                            value = value[0] || '';
                        }
                        value = String(value).trim();
                    } else {
                        value = input.value ? input.value.trim() : '';
                    }
                    
                    if (value) {
                        attributes.push({
                            attribute_id: attributeId,
                            value: value
                        });
                    }
                });
                
                modal.hide();
                resolve(attributes);
            };
            
            // 監聽 modal 關閉事件
            const modalElement = document.getElementById('productAttributesModal');
            modalElement.addEventListener('hidden.bs.modal', function() {
                if (window.confirmProductAttributes) {
                    delete window.confirmProductAttributes;
                }
                // 清理 Select2 實例
                document.querySelectorAll('.attr-value-input').forEach(select => {
                    if (select.tagName === 'SELECT' && typeof $ !== 'undefined' && $(select).hasClass('select2-hidden-accessible')) {
                        $(select).select2('destroy');
                    }
                });
                // 移除 modal 元素
                if (modalElement && modalElement.parentNode) {
                    modalElement.remove();
                }
                // 如果用戶直接關閉 modal，返回 null
                if (!document.getElementById('productAttributesModal')) {
                    resolve(null);
                }
            });
            
            modal.show();
        });
    }

    // 編輯產品屬性（POS）
    async function editPosProductAttributes(index) {
        const item = cart[index];
        if (!item.product_id) return;
        
        try {
            const fullProduct = await App.apiRequest(`/products/${item.product_id}`);
            if (fullProduct.product_attribute_values && fullProduct.product_attribute_values.length > 0) {
                // 載入所有產品屬性定義
                const attributesResponse = await App.apiRequest('/product-attributes?limit=1000');
                const allAttributes = attributesResponse.data || [];
                const attributeMap = {};
                allAttributes.forEach(attr => {
                    attributeMap[attr.id] = attr;
                });
                
                // 檢查是否有必填屬性
                const requiredAttributes = [];
                fullProduct.product_attribute_values.forEach(attrValue => {
                    const attrDef = attributeMap[attrValue.attribute_id];
                    if (attrDef && (attrDef.is_required === true || attrDef.is_required === 'yes' || attrDef.is_required === 'true')) {
                        requiredAttributes.push({
                            ...attrDef,
                            currentValue: attrValue.value
                        });
                    }
                });
                
                // 顯示彈窗
                // 設置當前編輯的 item，以便 popup 知道已選擇的值
                window.currentEditingItem = item;
                const productAttributes = await showProductAttributesModal(fullProduct.product_attribute_values, allAttributes, requiredAttributes, fullProduct.name);
                window.currentEditingItem = null;
                if (productAttributes !== null) {
                    item.product_attributes = productAttributes;
                    updateCartDisplay();
                }
            } else {
                App.showAlert('此產品沒有屬性', 'info');
            }
        } catch (error) {
            console.error('編輯產品屬性失敗:', error);
            App.showAlert('載入產品屬性失敗', 'danger');
        }
    }
    
    // 檢查並編輯產品屬性（POS）
    async function checkAndEditPosProductAttributes(index) {
        const item = cart[index];
        if (!item.product_id) return;
        
        try {
            const fullProduct = await App.apiRequest(`/products/${item.product_id}`);
            if (fullProduct.product_attribute_values && fullProduct.product_attribute_values.length > 0) {
                await editPosProductAttributes(index);
            } else {
                App.showAlert('此產品沒有屬性', 'info');
            }
        } catch (error) {
            console.error('檢查產品屬性失敗:', error);
            // 直接嘗試編輯
            await editPosProductAttributes(index);
        }
    }

    // 更新購物車數量
    function updateCartQuantity(index, change) {
        cart[index].quantity += change;
        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        } else {
            cart[index].total_amount = (cart[index].unit_price * cart[index].quantity) - (cart[index].discount_amount || 0);

    // 從購物車移除
    async function removeFromCart(index) {
        cart.splice(index, 1);
        
        // 如果已應用優惠券，重新驗證
        if (currentCoupon) {
            await applyPosCoupon();
        } else {
            calculateCartTotal();
            updateCartDisplay();
        }
    }

    // 計算購物車總額
    function calculateCartTotal() {
        let subtotal = 0;
        let discount = 0;
        let tax = 0;
        
        cart.forEach(item => {
            subtotal += item.unit_price * item.quantity;
            discount += item.discount_amount || 0;
            tax += (item.total_amount * (item.tax_rate || 0) / 100);
        });
        
        // 計算全單折扣
        const orderDiscountAmount = posOrderDiscount > 0 ? subtotal * posOrderDiscount / 100 : 0;
        
        // 計算印花折扣（假設每個印花抵扣 $1）
        const stampDiscountAmount = posStampsUsed || 0;
        
        // 添加優惠券折扣、積分折扣、全單折扣和印花折扣
        discount += couponDiscount + posPointsDiscount + orderDiscountAmount + stampDiscountAmount;
        
        const total = subtotal - discount + tax + (posShippingFee || 0);
        
        document.getElementById('cartSubtotal').textContent = '$' + subtotal.toFixed(2);
        document.getElementById('cartDiscount').textContent = '-$' + discount.toFixed(2);
        document.getElementById('cartTax').textContent = '$' + tax.toFixed(2);
        document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);

        // 自動/手動按鈕顯示控制
        updatePosShippingButtonVisibility();
    }

    function isPosSelectedShippingRequiresShipping() {
        const shippingMethodId = $('#posShippingMethodSelect').val() || null;
        if (!shippingMethodId) return false; // 沒選=視為自取
        const sm = shippingMethods.find(m => m.id === shippingMethodId);
        return !!(sm && sm.requires_shipping);
    }

    function updatePosShippingButtonVisibility() {
        const container = document.getElementById('posCalcShippingBtnContainer');
        if (!container) return;
        const autoOn = (posDocumentAutoSettings && posDocumentAutoSettings.auto_calculate_order_shipping === true);
        const requiresShipping = isPosSelectedShippingRequiresShipping();
        const canCalc = requiresShipping && currentCustomer && posCustomerDefaultAddress && posCustomerDefaultAddress.country_code;
        // 只有在第三步（付款與配送）顯示時才顯示按鈕
        const step3Visible = document.getElementById('posStep3') && document.getElementById('posStep3').style.display !== 'none';
        container.style.display = (step3Visible && !autoOn && canCalc) ? 'block' : 'none';
    }

    async function calculatePosShippingFee() {
        try {
            const requiresShipping = isPosSelectedShippingRequiresShipping();
            if (!requiresShipping) {
                posShippingFee = 0;
                posBestLogisticsCompanyId = '';
                calculateCartTotal();
                refreshPosDepositPreview();
                return;
            }
            if (!currentCustomer) {
                App.showAlert('請先選擇客戶（需要客戶地址計算運費）', 'warning');
                return;
            }
            if (!posCustomerDefaultAddress || !posCustomerDefaultAddress.country_code) {
                App.showAlert('客戶沒有地址記錄（國家/地區），無法計算運費', 'warning');
                return;
            }
            if (!cart || cart.length === 0) {
                posShippingFee = 0;
                posBestLogisticsCompanyId = '';
                calculateCartTotal();
                refreshPosDepositPreview();
                return;
            }
            const orderItems = cart.map(it => ({ product_id: it.product_id, quantity: it.quantity || 1 }));
            const resp = await App.apiRequest('/logistics-companies/calculate-best-fee', {
                method: 'POST',
                body: JSON.stringify({
                    order_items: orderItems,
                    country_code: posCustomerDefaultAddress.country_code || '',
                    region_code: posCustomerDefaultAddress.region_code || ''
                })
            });
            posShippingFee = Number(resp?.best_fee || 0) || 0;
            posBestLogisticsCompanyId = resp?.best_company?.id || '';
            
            // 如果沒有運費，顯示提示
            if (posShippingFee === 0) {
                App.showAlert('未找到合適的運費方案，運費為 $0.00', 'info');
            }
            
            calculateCartTotal();
            refreshPosDepositPreview();
        } catch (e) {
            console.error('calculatePosShippingFee failed', e);
            App.showAlert('自動計算運費失敗: ' + (e.message || '未知錯誤'), 'danger');
        }
    }
    
    // 更新全單折扣
    function updatePosOrderDiscount() {
        posOrderDiscount = parseFloat(document.getElementById('posOrderDiscount').value) || 0;
        if (posOrderDiscount > 100) {
            posOrderDiscount = 100;
            document.getElementById('posOrderDiscount').value = 100;
        } else if (posOrderDiscount < 0) {
            posOrderDiscount = 0;
            document.getElementById('posOrderDiscount').value = 0;
        }
        calculateCartTotal();
    }

            App.showAlert(I18n.t('pos.noMemberLevel'), 'warning');

        }

    // 自動應用最優折扣（POS）
    async function autoApplyPosBestDiscount() {
        if (!currentCustomer) {
            App.showAlert(I18n.t('pos.selectCustomerFirst'), 'warning');
            return;
        }
        
        if (cart.length === 0) {
            App.showAlert(I18n.t('pos.cartEmpty'), 'warning');
            return;
        }
        
        const subtotal = calculateCartSubtotal();
        const customerId = currentCustomer.id;
        
        // 構建訂單項目數據
        const orderItemsData = cart.map(item => ({
            product_id: item.product_id,
            quantity: item.quantity,
            unit_price: item.unit_price
        }));
        
        let bestDiscount = 0;
        let bestDiscountType = '';
        let bestCoupon = null;
        let bestPointsUsed = 0;
        let bestMemberDiscount = 0;
        
        // 1. 檢查會員等級折扣
        if (currentMemberLevel && currentMemberLevel.discount_rate) {
            const memberDiscount = subtotal * currentMemberLevel.discount_rate / 100;
            if (memberDiscount > bestDiscount) {
                bestDiscount = memberDiscount;
                bestDiscountType = 'member';
                bestMemberDiscount = currentMemberLevel.discount_rate;
            }
        }
        
        // 2. 檢查可用優惠券
        try {
            const coupons = await App.apiRequest('/coupons?status=active&limit=100');
            for (const coupon of coupons.data || []) {
                try {
                    let url = `/coupons/validate?code=${encodeURIComponent(coupon.code)}&amount=${subtotal}`;
                    if (customerId) url += `&customer_id=${customerId}`;
                    if (orderItemsData.length > 0) {
                        url += `&items=${encodeURIComponent(JSON.stringify(orderItemsData))}`;
                    }
                    const result = await App.apiRequest(url);
                    if (result.valid && result.discount_amount > bestDiscount) {
                        bestDiscount = result.discount_amount;
                        bestDiscountType = 'coupon';
                        bestCoupon = coupon;
                    }
                } catch (e) {
                    // 跳過無效優惠券
                }
            }
        } catch (error) {
            console.error('檢查優惠券失敗:', error);
        }
        
        // 3. 檢查積分折扣
        if (pointSetting && currentCustomer.total_points >= pointSetting.min_points_to_use) {
            const maxPoints = Math.floor(subtotal / pointSetting.dollar_per_point);
            const usablePoints = Math.min(maxPoints, currentCustomer.total_points);
            const pointsDiscount = usablePoints * pointSetting.dollar_per_point;
            if (pointsDiscount > bestDiscount) {
                bestDiscount = pointsDiscount;
                bestDiscountType = 'points';
                bestPointsUsed = usablePoints;
            }
        }
        
        // 應用最優折扣
        if (bestDiscountType === 'member') {
            document.getElementById('posOrderDiscount').value = bestMemberDiscount;
            posOrderDiscount = bestMemberDiscount;
            currentCoupon = null;
            couponDiscount = 0;
            posPointsUsed = 0;
            posPointsDiscount = 0;
            document.getElementById('posCouponCode').value = '';
            document.getElementById('posPointsUsed').value = 0;
            App.showAlert(I18n.t('pos.appliedMemberDiscount') + `：${bestMemberDiscount}%`, 'success');
        } else if (bestDiscountType === 'coupon') {
            currentCoupon = bestCoupon;
            couponDiscount = bestDiscount;
            document.getElementById('posCouponCode').value = bestCoupon.code;
                document.getElementById('posCouponMessage').textContent = I18n.t('pos.couponApplied') + `：$${couponDiscount.toFixed(2)}`;
            document.getElementById('posCouponMessage').className = 'text-success';
            posOrderDiscount = 0;
            posPointsUsed = 0;
            posPointsDiscount = 0;
            document.getElementById('posOrderDiscount').value = 0;
            document.getElementById('posPointsUsed').value = 0;
            App.showAlert(I18n.t('pos.appliedBestCoupon') + `：${bestCoupon.name}，` + I18n.t('pos.discount') + `：$${couponDiscount.toFixed(2)}`, 'success');
        } else if (bestDiscountType === 'points') {
            posPointsUsed = bestPointsUsed;
            posPointsDiscount = bestDiscount;
            document.getElementById('posPointsUsed').value = bestPointsUsed;
            updatePosPointsDiscount();
            posOrderDiscount = 0;
            currentCoupon = null;
            couponDiscount = 0;
            document.getElementById('posOrderDiscount').value = 0;
            document.getElementById('posCouponCode').value = '';
            App.showAlert(I18n.t('pos.appliedPointsDiscount') + ` ${bestPointsUsed} ` + I18n.t('pos.pointsUsed') + `：$${posPointsDiscount.toFixed(2)}`, 'success');
        } else {
            App.showAlert(I18n.t('pos.noDiscountAvailable'), 'info');
        }
        
        calculateCartTotal();
    }

    // 應用優惠券（POS）
    async function applyPosCoupon() {
        const code = document.getElementById('posCouponCode').value.trim();
        const messageEl = document.getElementById('posCouponMessage');
        
        if (!code) {
            messageEl.textContent = '';
            messageEl.className = '';
            currentCoupon = null;
            couponDiscount = 0;
            calculateCartTotal();
            return;
        }
        
        // 檢查購物車是否有商品
        if (!cart || cart.length === 0) {
            messageEl.textContent = '至少要有一件貨品先可用任何優惠';
            messageEl.className = 'text-danger';
            currentCoupon = null;
            couponDiscount = 0;
            calculateCartTotal();
            return;
        }
        
        try {
            const subtotal = parseFloat(document.getElementById('cartSubtotal').textContent.replace('$', '')) || 0;
            const customerId = $('#customerSelect').val();
            
            // 構建購物車項目數據
            const orderItems = cart.map(item => ({
                product_id: item.product_id,
                quantity: item.quantity,
                unit_price: item.unit_price
            }));
            
            let url = `/coupons/validate?code=${encodeURIComponent(code)}&amount=${subtotal}`;
            if (customerId) {
                url += `&customer_id=${customerId}`;
            }
            if (orderItems.length > 0) {
                url += `&items=${encodeURIComponent(JSON.stringify(orderItems))}`;
            }
            
            const result = await App.apiRequest(url);
            
            // 檢查 API 返回的錯誤
            if (result.error) {
                messageEl.textContent = result.error || I18n.t('pos.couponInvalid');
                messageEl.className = 'text-danger';
                currentCoupon = null;
                couponDiscount = 0;
                calculateCartTotal();
                return;
            }
            
            if (result.valid) {
                currentCoupon = result.coupon;
                couponDiscount = result.discount_amount || 0;
                messageEl.textContent = I18n.t('pos.couponApplied') + `：$${couponDiscount.toFixed(2)}`;
                messageEl.className = 'text-success';
                calculateCartTotal();
            } else {
                messageEl.textContent = result.error || I18n.t('pos.couponInvalid');
                messageEl.className = 'text-danger';
                currentCoupon = null;
                couponDiscount = 0;
                calculateCartTotal();
            }
        } catch (error) {
            // 處理 API 錯誤響應
            let errorMessage = error.message;
            if (error.error) {
                errorMessage = error.error;
            } else if (error.response && error.response.error) {
                errorMessage = error.response.error;
            }
            messageEl.textContent = I18n.t('pos.couponValidationError') + ': ' + errorMessage;
            messageEl.className = 'text-danger';
            currentCoupon = null;
            couponDiscount = 0;
            calculateCartTotal();
        }
    }

    // 處理付款（第一步） -> 進入金額輸入步驟
    function goToPaymentStep() {
        if (cart.length === 0) {
            App.showAlert(I18n.t('pos.cartEmpty'), 'warning');
            return;
        }
        
        // 檢查訂單信息：必須至少要有姓名
        const customerId = $('#customerSelect').val();
        const contactName = customerId ? null : (window.posOrderInfo?.name || null);
        
        if (!customerId && !contactName) {
            App.showAlert('請先填寫訂單信息中的姓名', 'warning');
            return;
        }
        
        // 計算總額與訂金
        const subtotal = calculateCartSubtotal();
        const discount = parseFloat(document.getElementById('cartDiscount').textContent.replace('-$', '')) || 0;
        const tax = parseFloat(document.getElementById('cartTax').textContent.replace('$', '')) || 0;
        const total = subtotal + tax - discount;
        posTotalAmount = total;
        const depositFromPercent = (posDepositPercent > 0) ? (total * posDepositPercent / 100) : 0;
        posDepositAmount = Math.min(total, Math.max(depositFromPercent, posDepositFixed || 0));
        posPayAmount = Math.min(total, Math.max(posDepositAmount, posPayAmount || total));
        document.getElementById('posAmountTotal').textContent = `$${total.toFixed(2)}`;
        document.getElementById('posAmountDeposit').textContent = `$${posDepositAmount.toFixed(2)}`;
        // 初始显示为整数形式（无小数点）
        if (posPayAmount % 1 === 0) {
            document.getElementById('posPaymentAmountDisplay').value = Math.floor(posPayAmount).toString();
        } else {
            document.getElementById('posPaymentAmountDisplay').value = posPayAmount.toFixed(2);
        }

        // 0 元單直接跳過金額輸入，進入付款/配送步驟
        if (total <= 0) {
            document.getElementById('posPayAmountLabel').textContent = `$${posPayAmount.toFixed(2)}`;
            return goToPaymentMethodStep();
        }
        
        // 顯示金額輸入步驟
        document.getElementById('posStep1').style.display = 'none';
        document.getElementById('posStep2').style.display = 'block';
        document.getElementById('posStep3').style.display = 'none';
        document.getElementById('posStep1Buttons').style.display = 'none';
        document.getElementById('posStep2Buttons').style.display = 'block';
        document.getElementById('posStep3Buttons').style.display = 'none';
    }

    // 觸控數字鍵盤輸入
    function posKeypadInput(key) {
        const displayElement = document.getElementById('posPaymentAmountDisplay');
        if (!displayElement) {
            console.error('posPaymentAmountDisplay element not found');
            return;
        }
        
        // 獲取當前顯示值
        let currentValue = displayElement.value || '0';
        
        // 移除所有非數字和小數點的字符（處理可能的格式化）
        currentValue = currentValue.replace(/[^0-9.]/g, '');
        
        // 如果為空，設為 '0'
        if (!currentValue || currentValue === '') {
            currentValue = '0';
        }
        
        // 處理小數點輸入
        if (key === '.') {
            // 如果已經有小數點，不處理
            if (currentValue.includes('.')) {
                return;
            }
            // 如果當前值是 '0'，設為 '0.'
            if (currentValue === '0' || parseFloat(currentValue) === 0) {
                displayElement.value = '0.';
            } else {
                // 否則追加小數點
                displayElement.value = currentValue + '.';
            }
            posPayAmount = parseFloat(displayElement.value) || 0;
            // 觸發更新
            displayElement.dispatchEvent(new Event('input', { bubbles: true }));
            return;
        }
        
        // 處理數字輸入（包括 '00'）
        // 如果當前值是 '0'（且沒有小數點），清空以便輸入新數字
        if (currentValue === '0' && !currentValue.includes('.')) {
            currentValue = '';
        } else if (currentValue.endsWith('.00')) {
            // 如果以 '.00' 結尾，移除 '.00' 以便繼續輸入
            currentValue = currentValue.replace(/\.00$/, '');
        }
        
        // 追加新數字
        currentValue += key;
        
        // 限制小數位數為兩位
        const parts = currentValue.split('.');
        if (parts.length > 1 && parts[1].length > 2) {
            currentValue = parts[0] + '.' + parts[1].substring(0, 2);
        }
        
        // 轉換為數字並驗證
        let numValue = parseFloat(currentValue);
        if (isNaN(numValue)) {
            numValue = 0;
        }
        
        // 限制不超過總額（如果 posTotalAmount 已設置且大於 0）
        // 注意：如果正在輸入小數部分，不要限制（避免干擾輸入）
        const hasDecimalPoint = currentValue.includes('.');
        const decimalParts = currentValue.split('.');
        const isTypingDecimal = hasDecimalPoint && decimalParts.length > 1 && decimalParts[1].length > 0 && decimalParts[1].length < 2;
        
        if (!isTypingDecimal && typeof posTotalAmount !== 'undefined' && posTotalAmount > 0 && numValue > posTotalAmount) {
            numValue = posTotalAmount;
            // 如果总额是整数，显示为整数形式；否则显示两位小数
            if (numValue % 1 === 0) {
                currentValue = Math.floor(numValue).toString();
            } else {
                currentValue = numValue.toFixed(2);
            }
        }
        
        // 更新全局變量
        posPayAmount = numValue;
        
        // 更新顯示值
        // 如果正在輸入小數部分（有小數點且小數部分少於2位），保持原樣
        const newParts = currentValue.split('.');
        if (currentValue.includes('.') && newParts.length > 1) {
            if (newParts[1].length < 2) {
                // 正在輸入小數部分（少於2位），保持原樣
                displayElement.value = currentValue;
            } else if (newParts[1].length === 2) {
                // 小數部分已完整（2位），格式化
                displayElement.value = numValue.toFixed(2);
            } else {
                // 其他情況，保持原樣
                displayElement.value = currentValue;
            }
        } else if (currentValue.endsWith('.')) {
            // 以小數點結尾，保持原樣
            displayElement.value = currentValue;
        } else {
            // 整數，顯示為整數形式（無小數點）
            displayElement.value = Math.floor(numValue).toString();
        }
        
        // 觸發 input 事件以確保 UI 更新
        try {
            const inputEvent = new Event('input', { bubbles: true, cancelable: true });
            displayElement.dispatchEvent(inputEvent);
        } catch (e) {
            // 如果新 API 失敗，使用舊 API
            try {
                if (document.createEvent) {
                    const evt = document.createEvent('HTMLEvents');
                    evt.initEvent('input', true, true);
                    displayElement.dispatchEvent(evt);
                }
            } catch (e2) {
                console.warn('無法觸發 input 事件:', e2);
            }
        }
    }

    function posKeypadBackspace() {
        const displayElement = document.getElementById('posPaymentAmountDisplay');
        if (!displayElement) {
            console.error('posPaymentAmountDisplay element not found');
            return;
        }
        
        let current = displayElement.value || '0';
        // 移除格式化（去掉 $ 和逗號，只保留數字和小數點）
        current = current.replace(/[^0-9.]/g, '');
        
        // 如果當前值為 '0' 或 '0.00'，清除後設為 '0'
        if (current === '0' || current === '0.00' || parseFloat(current) === 0) {
            posPayAmount = 0;
            displayElement.value = '0'; // 顯示為整數形式
            // 觸發 input 事件
            try {
                displayElement.dispatchEvent(new Event('input', { bubbles: true }));
            } catch (e) {
                if (document.createEvent) {
                    const evt = document.createEvent('HTMLEvents');
                    evt.initEvent('input', true, true);
                    displayElement.dispatchEvent(evt);
                }
            }
            return;
        }
        
        // 移除最後一個字符（可以刪除任何字符，包括數字和小數點）
        current = current.slice(0, -1);
        
        // 如果移除後為空，設為 '0'
        if (current === '' || current === '-') {
            posPayAmount = 0;
            displayElement.value = '0'; // 顯示為整數形式
        } else if (current === '.') {
            // 如果只剩下小數點，設為 '0'
            posPayAmount = 0;
            displayElement.value = '0'; // 顯示為整數形式
        } else {
            // 解析數值
            let val = parseFloat(current);
            if (isNaN(val)) {
                val = 0;
            }
            
            // 限制不超過總額
            if (typeof posTotalAmount !== 'undefined' && posTotalAmount > 0 && val > posTotalAmount) {
                val = posTotalAmount;
            }
            
            posPayAmount = val;
            
            // 更新顯示：根據當前狀態決定是否格式化
            if (current.endsWith('.')) {
                // 以小數點結尾，保持原樣（用戶正在輸入小數部分）
                displayElement.value = current;
            } else if (current.includes('.')) {
                // 有小數點但不是以小數點結尾
                const parts = current.split('.');
                if (parts.length > 1 && parts[1].length > 0) {
                    // 有小數部分，保持原樣（用戶正在輸入小數部分）
                    displayElement.value = current;
                } else {
                    // 小數部分為空，不應該發生，但格式化為兩位小數
                    displayElement.value = posPayAmount.toFixed(2);
                }
            } else {
                // 整數，保持原樣（不自動添加小數點）
                displayElement.value = current;
            }
        }
        
        // 強制觸發 input 事件以確保 UI 更新
        try {
            const inputEvent = new Event('input', { bubbles: true, cancelable: true });
            displayElement.dispatchEvent(inputEvent);
        } catch (e) {
            // 如果新 API 失敗，使用舊 API
            try {
                if (document.createEvent) {
                    const evt = document.createEvent('HTMLEvents');
                    evt.initEvent('input', true, true);
                    displayElement.dispatchEvent(evt);
                }
            } catch (e2) {
                console.warn('無法觸發 input 事件:', e2);
            }
        }
    }

    function goToPaymentMethodStep() {
        // 校驗付款金額
        const pay = posPayAmount || 0;
        if (pay < posDepositAmount) {
            App.showAlert(`付款金額不得低於訂金：$${posDepositAmount.toFixed(2)}`, 'warning');
            return;
        }
        if (pay > posTotalAmount) {
            App.showAlert(`付款金額不得超過訂單總額：$${posTotalAmount.toFixed(2)}`, 'warning');
            return;
        }
        // 顯示付款/配送步驟
        document.getElementById('posPayAmountLabel').textContent = `$${pay.toFixed(2)}`;
        document.getElementById('posStep1').style.display = 'none';
        document.getElementById('posStep2').style.display = 'none';
        document.getElementById('posStep3').style.display = 'block';
        document.getElementById('posStep1Buttons').style.display = 'none';
        document.getElementById('posStep2Buttons').style.display = 'none';
        document.getElementById('posStep3Buttons').style.display = 'block';

        // 初始化配送方式 Select2（若尚未初始化）
        if (!$('#posShippingMethodSelect').hasClass('select2-hidden-accessible')) {
            $('#posShippingMethodSelect').select2({
                theme: 'bootstrap-5',
                placeholder: I18n.t('pos.selectShippingMethodPlaceholder') || '請選擇配送方式（可選）',
                allowClear: true,
                data: shippingMethods.map(m => ({ id: m.id, text: m.name }))
            }).on('change', function() {
                posShippingMethodId = $('#posShippingMethodSelect').val() || null;
                // 若運送方式變為自取，清空運費
                if (!isPosSelectedShippingRequiresShipping()) {
                    posShippingFee = 0;
                    posBestLogisticsCompanyId = '';
                    calculateCartTotal();
                    refreshPosDepositPreview();
                    return;
                }
                if (posDocumentAutoSettings && posDocumentAutoSettings.auto_calculate_order_shipping === true) {
                    calculatePosShippingFee();
                } else {
                    updatePosShippingButtonVisibility();
                }
            });
            const defaultMethod = shippingMethods.find(m => m.is_default === true);
            if (defaultMethod) {
                setTimeout(() => {
                    $('#posShippingMethodSelect').val(defaultMethod.id).trigger('change');
                    posShippingMethodId = defaultMethod.id;
                }, 200);
            }
        } else {
            if (!$('#posShippingMethodSelect').val()) {
                const defaultMethod = shippingMethods.find(m => m.is_default === true);
                if (defaultMethod) {
                    $('#posShippingMethodSelect').val(defaultMethod.id).trigger('change');
                    posShippingMethodId = defaultMethod.id;
                }
            }
        }
        
        // 更新運費按鈕顯示
        updatePosShippingButtonVisibility();
    }
    
    // 完成訂單（創建訂單）
    async function completeOrder() {
        if (cart.length === 0) {
            App.showAlert(I18n.t('pos.cartEmpty'), 'warning');
            return;
        }

        if (!currentPaymentMethod) {
            App.showAlert(I18n.t('pos.selectPaymentMethodFirst'), 'warning');
            return;
        }
        
        // 獲取配送方式
        const shippingMethodId = $('#posShippingMethodSelect').val() || null;
        // 若開啟自動計算訂單運費：在創建訂單前確保運費已計算
        if (posDocumentAutoSettings && posDocumentAutoSettings.auto_calculate_order_shipping === true) {
            if (isPosSelectedShippingRequiresShipping()) {
                await calculatePosShippingFee();
            } else {
                posShippingFee = 0;
                posBestLogisticsCompanyId = '';
            }
        }
        const customerIdRaw = $('#customerSelect').val();
        const customerId = (customerIdRaw && customerIdRaw.trim() !== '') ? customerIdRaw : null;
        let contactName = customerId ? null : (window.posOrderInfo?.name || null);
        
        // 檢查是否需要訪客結帳提示
        if (!customerId && !contactName) {
            if (posAllowGuestCheckout) {
                // 顯示訪客結帳確認
                const guestConfirmMsg = (typeof I18n !== 'undefined' && I18n.t) ? I18n.t('pos.confirmGuestCheckout', '未選擇客戶，是否以「訪客」名義結帳？') : '未選擇客戶，是否以「訪客」名義結帳？';
                if (!confirm(guestConfirmMsg)) {
                    return;
                }
                contactName = '訪客';
                window.posOrderInfo = window.posOrderInfo || {};
                window.posOrderInfo.name = '訪客';
                window.posOrderInfo.is_guest = true;
            } else {
                // 不允許訪客結帳，提示選擇客戶
                App.showAlert((typeof I18n !== 'undefined' && I18n.t) ? I18n.t('pos.customerRequired', '請選擇客戶或填寫聯絡人') : '請選擇客戶或填寫聯絡人', 'warning');
                return;
            }
        }
        
        const subtotal = calculateCartSubtotal();
        const discount = parseFloat(document.getElementById('cartDiscount').textContent.replace('-$', '')) || 0;
        const tax = parseFloat(document.getElementById('cartTax').textContent.replace('$', '')) || 0;
        const total = parseFloat(document.getElementById('cartTotal').textContent.replace('$', '')) || 0;
        const payAmount = posPayAmount || 0;
        if (payAmount < posDepositAmount) {
            App.showAlert(`付款金額不得低於訂金：$${posDepositAmount.toFixed(2)}`, 'warning');
            return;
        }
        if (payAmount > total) {
            App.showAlert(`付款金額不得超過訂單總額：$${total.toFixed(2)}`, 'warning');
            return;
        }
        
        // 檢查是否使用卡機付款
        let cardPaymentResult = null;
        const extraFields = currentPaymentMethod.extra_fields || {};
        const useCardTerminal = extraFields.use_card_terminal === true || extraFields.use_card_terminal === 'true';
        
        if (useCardTerminal) {
            // 使用卡機付款
            const terminalId = extraFields.card_terminal_id;
            if (!terminalId) {
                App.showAlert('付款方式已設定使用卡機，但未配置卡機 ID。請到「付款方式管理」設定卡機。', 'danger');
                return;
            }
            
            // 檢查 vWork Connector 連接狀態
            if (typeof VWorkConnector === 'undefined') {
                App.showAlert('vWork Connector 未載入。請確保已引入 vwork-connector.js', 'danger');
                return;
            }
            
            try {
                App.showLoading('正在連接卡機...');
                const isConnected = await VWorkConnector.checkConnection();
                if (!isConnected) {
                    App.hideLoading();
                    App.showAlert('無法連接 vWork Connector。請確保 vWork Connector.exe 已啟動。', 'danger');
                    return;
                }
                
                // 發起卡機支付
                App.showLoading('請在卡機上完成付款...');
                const paymentAmountCents = Math.round(payAmount * 100); // 轉換為分
                cardPaymentResult = await VWorkConnector.initiatePayment(terminalId, {
                    amount: paymentAmountCents,
                    currency: 'HKD',
                    orderId: `POS-${Date.now()}`,
                    paymentType: 'card'
                });
                App.hideLoading();
                
                if (!cardPaymentResult || !cardPaymentResult.success) {
                    const errorMsg = cardPaymentResult?.errorMessage || '卡機付款失敗';
                    App.showAlert(`卡機付款失敗：${errorMsg}`, 'danger');
                    return;
                }
                
                console.log('卡機付款成功:', cardPaymentResult);
            } catch (error) {
                App.hideLoading();
                console.error('卡機付款錯誤:', error);
                App.showAlert(`卡機付款錯誤：${error.message || '未知錯誤'}`, 'danger');
                return;
            }
        }
        
        // 創建訂單
        const orderData = {
            source_type: 'pos',
            customer_id: customerId,
            store_id: posStoreId || null,
            order_date: new Date().toISOString().split('T')[0],
            status: 'completed',
            referral_code: document.getElementById('referralCode').value.trim() || null,
            coupon_id: currentCoupon ? currentCoupon.id : null,
            coupon_discount: couponDiscount,
            points_used: posPointsUsed,
            points_discount: posPointsDiscount,
            order_discount: posOrderDiscount,
            order_discount_amount: posOrderDiscount > 0 ? subtotal * posOrderDiscount / 100 : 0,
            total_amount: total,
            label_ids: posSelectedLabelIds,
            shipping_method_id: shippingMethodId,
            salesperson_id: currentUser ? currentUser.id : null, // 默認使用當前登錄用戶作為銷售員
            // 如果沒有選擇客戶，但保存了訂單信息，使用訂單信息
            contact_name: customerId ? null : contactName,
            contact_phone: customerId ? null : (window.posOrderInfo?.phone || null),
            contact_email: customerId ? null : (window.posOrderInfo?.email || null),
            contact_address: customerId ? null : (window.posOrderInfo?.address || null),
            order_items: cart.map(item => {
                const orderItem = {
                product_id: item.product_id,
                quantity: item.quantity,
                    unit_price: item.unit_price,
                    notes: '',
                    product_attributes: item.product_attributes && item.product_attributes.length > 0 ? item.product_attributes : null
                };
                return orderItem;
            }),
            extra_fields: {
                payment_records: [],
                shipping_records: [],
                shipping_notes: []
            }
        };

        if (window.posOrderInfo?.dining_table_id || window.posOrderInfo?.dining_table_code) {
            orderData.extra_fields.dining_table_id = window.posOrderInfo?.dining_table_id || null;
            orderData.extra_fields.dining_table_code = window.posOrderInfo?.dining_table_code || null;
            orderData.extra_fields.dining_area_id = window.posOrderInfo?.dining_area_id || null;
            orderData.extra_fields.dining_area_name = window.posOrderInfo?.dining_area_name || null;
        }

        // 生成付款記錄（單次付款，金額由使用者輸入）
            const paymentRecord = {
            payment_date: new Date().toISOString().split('T')[0],
                payment_method: currentPaymentMethod.code,
                payment_method_id: currentPaymentMethod.id,
            amount: payAmount,
                invoice_number: '', // 自動生成
                reference_number: cardPaymentResult ? cardPaymentResult.transactionId : '',
            notes: cardPaymentResult ? `卡機付款 - 批准碼: ${cardPaymentResult.approvalCode || 'N/A'}` : ''
            };
            // 如果有卡機付款結果，保存卡片信息
            if (cardPaymentResult) {
                paymentRecord.card_info = cardPaymentResult.cardInfo || {};
                paymentRecord.transaction_id = cardPaymentResult.transactionId || '';
                paymentRecord.approval_code = cardPaymentResult.approvalCode || '';
            }
            orderData.extra_fields.payment_records.push(paymentRecord);

        // 若需要送貨：把運費寫入 shipping_records/shipping_notes（後端會加到 total_amount）
        if (isPosSelectedShippingRequiresShipping() && (posShippingFee || 0) > 0) {
            const shipRow = {
                logistics_company_id: posBestLogisticsCompanyId || '',
                shipping_fee: Number(posShippingFee || 0) || 0
            };
            orderData.extra_fields.shipping_records = [shipRow];
            orderData.extra_fields.shipping_notes = [shipRow];
        }
        
        // 调试：检查 orderData 格式
        console.log('POS Order Data:', JSON.stringify(orderData, null, 2));
        
        try {
            let order;
            const isEditing = posOrderId !== null;
            
            if (isEditing) {
                // 編輯現有訂單 - 使用 PUT
                App.showLoading('正在更新訂單...');
                order = await App.apiRequest(`/orders/${posOrderId}`, {
                    method: 'PUT',
                    body: JSON.stringify(orderData)
                });
            } else {
                // 創建新訂單 - 使用 POST
                App.showLoading('正在創建訂單...');
                order = await App.apiRequest('/orders', {
                    method: 'POST',
                    body: JSON.stringify(orderData)
                });
            }
            
            App.hideLoading();
            posOrderId = order.id;
            
            // 檢查配送方式是否需要送貨
            let deliveryMessage = '';
            if (shippingMethodId) {
                const selectedShippingMethod = shippingMethods.find(m => m.id === shippingMethodId);
                if (selectedShippingMethod && selectedShippingMethod.requires_shipping) {
                    deliveryMessage = '，請等待貨品送到';
                } else {
                    deliveryMessage = '，請在店內取得貨品';
                }
            } else {
                deliveryMessage = '，請在店內取得貨品';
            }
            
            // 顯示美化的訂單完成對話框
            const diningCode = window.posOrderInfo?.dining_table_code || '';
            const diningText = diningCode ? `（餐桌 ${diningCode}）` : '';
            const actionText = isEditing ? '訂單已更新！' : '訂單完成！';
            showOrderCompleteDialog(actionText + '訂單號：' + order.order_number + diningText + deliveryMessage, order.id);
            
            // 清除編輯狀態 UI
            document.getElementById('posEditingOrderInfo').style.display = 'none';
            document.getElementById('posEditingOrderNumber').textContent = '';
            const orderIdInput = document.getElementById('productSearch');
            orderIdInput.value = '';
            orderIdInput.readOnly = false;
            
            // 清空購物車並返回第一步
            clearCart();
            goBackToCart();
        } catch (error) {
            App.hideLoading();
            App.showAlert(I18n.t('pos.paymentError') + ': ' + error.message, 'danger');
        }
    }

    async function saveQuickCustomer() {
        const name = document.getElementById('quickCustomerName').value;
        const lastName = document.getElementById('quickCustomerLastName').value.trim();
        // 獲取 Select2 的值
        const phoneCodeSelect = document.getElementById('quickCustomerPhoneCode');
        const phoneCode = (typeof $ !== 'undefined' && $(phoneCodeSelect).hasClass('select2-hidden-accessible')) 
            ? $(phoneCodeSelect).val() 
            : phoneCodeSelect.value;
        const phoneNumber = document.getElementById('quickCustomerPhone').value.trim();
        const phone = phoneNumber ? `${phoneCode || ''} ${phoneNumber}`.trim() : '';
        const email = document.getElementById('quickCustomerEmail').value.trim();
        const birthDate = document.getElementById('quickCustomerBirthDate').value;
        const genderRadio = document.querySelector('input[name="quickCustomerGender"]:checked');
        const gender = genderRadio ? genderRadio.value : null;
        
        // 獲取地址相關字段
        const countryCodeSelect = document.getElementById('quickCustomerCountryCode');
        const countryCode = (typeof $ !== 'undefined' && $(countryCodeSelect).hasClass('select2-hidden-accessible')) 
            ? $(countryCodeSelect).val() 
            : (countryCodeSelect ? countryCodeSelect.value : '');
        
        const regionCodeSelect = document.getElementById('quickCustomerRegionCode');
        const regionCode = (typeof $ !== 'undefined' && $(regionCodeSelect).hasClass('select2-hidden-accessible')) 
            ? $(regionCodeSelect).val() 
            : (regionCodeSelect ? regionCodeSelect.value : '');
        
        const addressLine1 = (document.getElementById('quickCustomerAddress')?.value || '').trim();
        
        if (!name) {
            App.showAlert(I18n.t('pos.enterCustomerName'), 'warning');
            return;
        }
        
        // 獲取系統預設的會員等級
        let defaultMemberLevelId = null;
        try {
            const memberLevels = await App.apiRequest('/member-levels?limit=1000');
            if (memberLevels.data && memberLevels.data.length > 0) {
                const defaultLevel = memberLevels.data.find(level => level.is_default === true);
                if (defaultLevel) {
                    defaultMemberLevelId = defaultLevel.id;
                }
            }
        } catch (error) {
            console.warn('獲取預設會員等級失敗:', error);
        }
        
        try {
            const customer = await App.apiRequest('/customers', {
                method: 'POST',
                body: JSON.stringify({
                    name: name,
                    last_name: lastName || null,
                    phone: phone || null,
                    phone_country_code: phoneCode || null,
                    birth_date: birthDate || null,
                    gender: gender || null,
                    email: email || null,
                    member_level_id: defaultMemberLevelId,
                    status: 'active'
                })
            });
            
            // 如果有地址信息，創建客戶地址（使用子表）
            if (addressLine1 && countryCode) {
                try {
                    // 獲取國家名稱
                    let countryName = '';
                    if (countryCode) {
                        const lang = (typeof I18n !== 'undefined' && I18n.currentLang) ? I18n.currentLang : 'zh';
                        const countriesRes = await App.apiRequest(`/api/v1/countries?search=${encodeURIComponent(countryCode)}&limit=5&lang=${encodeURIComponent(lang)}`);
                        const country = (countriesRes.data || []).find(c => c.code === countryCode);
                        countryName = country ? country.name : countryCode;
                    }
                    
                    // 獲取地區名稱
                    let regionName = '';
                    if (regionCode && countryCode) {
                        const lang = (typeof I18n !== 'undefined' && I18n.currentLang) ? I18n.currentLang : 'zh';
                        const regionsRes = await App.apiRequest(`/api/v1/country-regions?country_code=${encodeURIComponent(countryCode)}&lang=${encodeURIComponent(lang)}`);
                        const region = (regionsRes.data || []).find(r => r.code === regionCode);
                        regionName = region ? region.name : regionCode;
                    }
                    
                    await App.apiRequest(`/api/v1/customers/${customer.id}/addresses`, {
                        method: 'POST',
                        body: JSON.stringify({
                            country_code: countryCode,
                            country_name: countryName,
                            region_code: regionCode || null,
                            region_name: regionName || null,
                            address_line1: addressLine1,
                            address_line2: null,
                            is_default: true
                        })
                    });
                } catch (addrError) {
                    console.warn('創建客戶地址失敗:', addrError);
                    // 地址創建失敗不影響客戶創建，只記錄警告
                }
            }
            
            // 格式化客戶名稱顯示（中文姓在前，英文姓在後）
            const displayName = formatCustomerDisplayName(customer.name, customer.last_name);
            
            // 添加到 Select2 並選擇
            const newOption = new Option(displayName + (customer.phone ? ' (' + customer.phone + ')' : ''), customer.id, true, true);
            $('#customerSelect').append(newOption).trigger('change');
            
            // 關閉模態框
            bootstrap.Modal.getInstance(document.getElementById('quickCustomerModal')).hide();
            document.getElementById('quickCustomerForm').reset();
            
            // 重置國家和地區 Select2
            if (typeof $ !== 'undefined') {
                const countrySelect = $('#quickCustomerCountryCode');
                const regionSelect = $('#quickCustomerRegionCode');
                if (countrySelect.length && countrySelect.hasClass('select2-hidden-accessible')) {
                    countrySelect.val(null).trigger('change');
                }
                if (regionSelect.length) {
                    if (regionSelect.hasClass('select2-hidden-accessible')) {
                        regionSelect.val(null).trigger('change');
                        regionSelect.select2('destroy');
                    }
                    regionSelect.prop('disabled', true);
                }
            }
            
            App.showAlert(I18n.t('pos.addCustomerSuccess'), 'success');
        } catch (error) {
            App.showAlert(I18n.t('pos.addCustomerError') + ': ' + error.message, 'danger');
        }
    }

    // 格式化客戶顯示名稱（中文姓在前，英文姓在後）
    function formatCustomerDisplayName(name, lastName) {
        if (!lastName) return name;
        
        // 判斷是否為中文（簡單判斷：檢查是否包含中文字符）
        const isChinese = /[\u4e00-\u9fa5]/.test(lastName);
        
        if (isChinese) {
            // 中文姓加在前面
            return lastName + name;
        } else {
            // 英文姓加在後面
            return name + ' ' + lastName;
        }
    }

    // 載入 POS 產品標籤
    async function loadPosProductLabels() {
        try {
            const response = await App.apiRequest('/product-labels?status=active&limit=1000');
            posProductLabels = (response && response.data) ? response.data : (Array.isArray(response) ? response : []);
            renderPosProductLabels();
        } catch (error) {
            console.error('Failed to load product labels:', error);
            posProductLabels = [];
            renderPosProductLabels();
        }
    }

    function renderPosProductLabels() {
        const container = document.getElementById('posProductLabelsList');
        if (!container) return;

        if (!posProductLabels || posProductLabels.length === 0) {
            const noLabelsText = (typeof I18n !== 'undefined' && I18n.t) ? I18n.t('pos.noProductLabels') : '暫無標籤';
            container.innerHTML = `<span class="text-muted small">${noLabelsText}</span>`;
            return;
        }

        const chips = posProductLabels.map(label => {
            const id = String(label.id || '');
            const name = String(label.name || '');
            const color = (label.color || '#64748b').toString();
            const isActive = posSelectedProductLabelIds.includes(id);
            const opacity = isActive ? '1' : '0.6';
            return `
                <button type="button" class="btn btn-sm px-2 py-1 text-white" data-label-id="${id}" onclick="togglePosProductLabel('${id}')"
                        style="background-color:${color}; opacity:${opacity}; border:none; border-radius:999px;">
                    ${name}
                </button>
            `;
        }).join('');

        container.innerHTML = chips;
    }

    function togglePosProductLabel(labelId) {
        const idx = posSelectedProductLabelIds.indexOf(labelId);
        if (idx >= 0) {
            posSelectedProductLabelIds.splice(idx, 1);
        } else {
            posSelectedProductLabelIds.push(labelId);
        }
        renderPosProductLabels();
        searchProducts();
    }

            console.error('Failed to load order labels:', error);
            posAvailableLabels = [];
        }
    }

    // 渲染 POS 選中的標籤
    function renderPosOrderLabels() {
        const container = document.getElementById('posOrderLabelsContainer');
        if (!container) return;
        
        if (posSelectedLabelIds.length === 0) {
            container.innerHTML = `<span class="text-muted small" data-i18n="pos.noLabels">${(typeof I18n !== 'undefined' && I18n.t) ? I18n.t('pos.noLabels') : 'No labels'}</span>`;
            return;
        }
        
        const html = posSelectedLabelIds.map(labelId => {
            const label = posAvailableLabels.find(l => l.id === labelId);
            if (!label) return '';
            return `
                <span class="badge" style="background-color: ${label.color}; cursor: pointer; font-size: 0.75rem;" 
                      onclick="removePosLabel('${labelId}')" title="點擊移除">
                    ${label.name} <i class="bi bi-x"></i>
                </span>
            `;
        }).join('');
        
        // 若選中的 label id 都不存在（例如標籤被刪除/停用），仍要顯示空態
        if (!html || !html.trim()) {
            container.innerHTML = `<span class="text-muted small" data-i18n="pos.noLabels">${(typeof I18n !== 'undefined' && I18n.t) ? I18n.t('pos.noLabels') : 'No labels'}</span>`;
            return;
        }
        
        container.innerHTML = html;
    }
