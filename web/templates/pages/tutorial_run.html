{{ define "pages/tutorial_run" }}
<style>
  html, body { height: 100%; }
  body { margin: 0; }
  .container-fluid { padding: 0 !important; }
  .tutorial-root { position: fixed; inset: 0; background: #000; }
  .tutorial-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #fff; }
  .tutorial-overlay {
    position: absolute;
    left: 12px;
    top: 12px;
    z-index: 10000;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(0,0,0,0.72);
    color: #fff;
    font-size: 14px;
    line-height: 1.3;
    max-width: min(520px, calc(100vw - 24px));
    user-select: none;
    pointer-events: none;
  }
  .tutorial-overlay .title { font-weight: 600; margin-bottom: 4px; }
  .tutorial-overlay .meta { opacity: 0.85; font-size: 12px; }
  {{ if ne .UiOverlay "true" }}
  .tutorial-overlay { display: none; }
  {{ end }}
</style>

<div id="tutorialRoot" class="tutorial-root">
  <div id="tutorialOverlay" class="tutorial-overlay">
    <div class="title">vWork Tutorial Runner</div>
    <div id="tutorialStatus">初始化中…</div>
    <div class="meta">scenario: {{.Scenario}}</div>
  </div>
  <iframe id="tutorialFrame" class="tutorial-frame" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>
</div>

<script src="/static/js/tutorial-runner.js?v={{.CacheBust}}"></script>
<script>
  window.vworkTutorialRunner.start({
    scenario: "{{ .Scenario }}",
    cbPort: "{{ .CallbackPort }}",
    token: "{{ .CallbackToken }}",
    email: "{{ .Email }}",
    password: "{{ .Password }}",
    frameId: "tutorialFrame",
    statusId: "tutorialStatus",
    autostart: "{{ .AutoStart }}",
    autostartDelayMs: "{{ .AutoStartDelayMs }}",
    guide: "{{ .Guide }}",
    startOverlay: "{{ .StartOverlay }}",
    stepDelayMs: "{{ .StepDelayMs }}"
  });
</script>
{{ end }}
