    async function saveQuickSupplier() {
        const name = document.getElementById('quickSupplierName').value.trim();
        const lastName = document.getElementById('quickSupplierLastName').value.trim();
        const email = document.getElementById('quickSupplierEmail').value.trim();
        const addressText = document.getElementById('quickSupplierAddress').value.trim();

        const phoneCodeSelect = document.getElementById('quickSupplierPhoneCode');
        const phoneCode = (typeof $ !== 'undefined' && $(phoneCodeSelect).hasClass('select2-hidden-accessible'))
            ? $(phoneCodeSelect).val()
            : phoneCodeSelect.value;
        const phoneNumber = document.getElementById('quickSupplierPhone').value.trim();
        const phone = phoneNumber ? `${phoneCode || ''} ${phoneNumber}`.trim() : '';
        
        // 獲取地址相關字段
        const countryCodeSelect = document.getElementById('quickSupplierCountryCode');
        const countryCode = (typeof $ !== 'undefined' && $(countryCodeSelect).hasClass('select2-hidden-accessible')) 
            ? $(countryCodeSelect).val() 
            : (countryCodeSelect ? countryCodeSelect.value : '');
        
        const regionCodeSelect = document.getElementById('quickSupplierRegionCode');
        const regionCode = (typeof $ !== 'undefined' && $(regionCodeSelect).hasClass('select2-hidden-accessible')) 
            ? $(regionCodeSelect).val() 
            : (regionCodeSelect ? regionCodeSelect.value : '');

        if (!name) {
            App.showAlert(t('purchaseOrdersNew.alerts.enterSupplierName', '請輸入供應商名稱'), 'warning');
            return;
        }

        // 取得並預留供應商編號
        let supplierCode = '';
        try {
            const next = await App.apiRequest('/api/v1/reserved-numbers/next?field_name=code&page_name=suppliers');
            supplierCode = next?.next_number || '';
            if (supplierCode) {
                await App.apiRequest('/api/v1/reserved-numbers', {
                    method: 'POST',
                    body: JSON.stringify({ field_name: 'code', field_value: supplierCode, page_name: 'suppliers' })
                });
            }
        } catch (e) {
            console.warn('取得/預留供應商編號失敗', e);
        }

        try {
            // 構建地址字符串（國家、地區、地址）
            let fullAddress = '';
            if (countryCode || regionCode || addressText) {
                const addressParts = [];
                if (countryCode) {
                    const lang = (typeof I18n !== 'undefined' && I18n.currentLang) ? I18n.currentLang : 'zh';
                    try {
                        const countriesRes = await App.apiRequest(`/api/v1/countries?search=${encodeURIComponent(countryCode)}&limit=5&lang=${encodeURIComponent(lang)}`);
                        const country = (countriesRes.data || []).find(c => c.code === countryCode);
                        addressParts.push(country ? country.name : countryCode);
                    } catch (e) {
                        addressParts.push(countryCode);
                    }
                }
                if (regionCode && countryCode) {
                    const lang = (typeof I18n !== 'undefined' && I18n.currentLang) ? I18n.currentLang : 'zh';
                    try {
                        const regionsRes = await App.apiRequest(`/api/v1/country-regions?country_code=${encodeURIComponent(countryCode)}&lang=${encodeURIComponent(lang)}`);
                        const region = (regionsRes.data || []).find(r => r.code === regionCode);
                        addressParts.push(region ? region.name : regionCode);
                    } catch (e) {
                        addressParts.push(regionCode);
                    }
                }
                if (addressText) {
                    addressParts.push(addressText);
                }
                fullAddress = addressParts.join(', ');
            }
            
            const supplier = await App.apiRequest('/suppliers', {
                method: 'POST',
                body: JSON.stringify({
                    code: supplierCode || undefined,
                    name,
                    last_name: lastName || null,
                    email: email || null,
                    phone: phone || null,
                    phone_country_code: phoneCode || null,
                    address: fullAddress || null,
                    status: 'active'
                })
            });

            const displayName = formatSupplierDisplayName(supplier.name, supplier.last_name);
            const text = displayName + (supplier.phone ? ' (' + supplier.phone + ')' : '');
            const option = new Option(text, supplier.id, true, true);
            $('#supplierId').append(option).trigger('change');

            // 快速新增後：Select2 的 change 不一定會觸發 select2:select，直接主動帶入聯絡資料
            try { await loadSupplierInfo(supplier.id); } catch (e) { console.warn('loadSupplierInfo failed after quick add:', e); }

            bootstrap.Modal.getInstance(document.getElementById('quickSupplierModal')).hide();
            document.getElementById('quickSupplierForm').reset();
            
            // 重置國家和地區 Select2
            if (typeof $ !== 'undefined') {
                const countrySelect = $('#quickSupplierCountryCode');
                const regionSelect = $('#quickSupplierRegionCode');
                if (countrySelect.length && countrySelect.hasClass('select2-hidden-accessible')) {
                    countrySelect.val(null).trigger('change');
                }
                if (regionSelect.length) {
                    if (regionSelect.hasClass('select2-hidden-accessible')) {
                        regionSelect.val(null).trigger('change');
                        regionSelect.select2('destroy');
                    }
                    regionSelect.prop('disabled', true);
                }
            }
            
            App.showAlert(t('purchaseOrdersNew.alerts.supplierCreated', '供應商添加成功'), 'success');
        } catch (e) {
            App.showAlert(tf('purchaseOrdersNew.alerts.createSupplierFailed', { error: e.message }, '添加供應商失敗: {error}'), 'danger');
        }
    }

    // 添加支出記錄（連接到支出表）
    async function addExpenseRecord() {
        // 檢查是否至少有一件產品
        const hasProduct = purchaseItems.length > 0 && purchaseItems.some(item => item.product_id && item.product_id !== '');
        if (!hasProduct) {
            App.showAlert(t('purchaseOrdersNew.alerts.addProductFirst', '請先添加至少一件產品'), 'warning');
            return;
        }
        
        const today = new Date().toISOString().split('T')[0];
        const expenseNo = await reserveNextExpenseNumber();
        
        // 獲取系統預設的「支出」付款方式
        const defaultMethod = paymentMethods.find(m => m.is_default_expense === true || m.is_default_expense === 'true' || m.is_default_expense === 1)
            || paymentMethods.find(m => m.is_default === true || m.is_default === 'true' || m.is_default === 1);
        
        // 獲取系統預設的付款賬戶
        const defaultAccount = bankAccounts.find(acc => acc.is_default_payment === true || acc.is_default_payment === 'true' || acc.is_default_payment === 1);
        
        // 如果默认付款方式是银行转账，设置默认付款账户
        let defaultBankAccountId = '';
        if (defaultMethod) {
            const isBankTransfer = defaultMethod.code === 'bank_transfer' || defaultMethod.code === 'bank' || defaultMethod.name.includes('銀行') || defaultMethod.name.includes('转账') || defaultMethod.name.includes('轉賬');
            if (isBankTransfer && defaultAccount) {
                defaultBankAccountId = defaultAccount.id;
            }
        }
        
        expenseRecords.push({
            expense_id: null, // 新建支出記錄，還沒有 expense_id
            expense_date: today,
            payment_method_id: defaultMethod ? defaultMethod.id : '',
            payment_method: defaultMethod ? defaultMethod.code : '',
            bank_account_id: defaultBankAccountId,
            amount: 0,
            invoice_number: expenseNo,
            reference_number: '',
            notes: '',
            category: 'purchase', // 默認類別為採購
            expense_type: 'purchase'
        });
        renderExpenseRecords();
        document.dispatchEvent(new CustomEvent('expenseRecordsChanged'));
    }

    async function reserveNextExpenseNumber() {
        try {
            const response = await App.apiRequest('/api/v1/reserved-numbers/next?field_name=expense_number&page_name=expenses');
            const nextNumber = response.next_number || response.number;
            if (!nextNumber) throw new Error('no next_number');
            try {
                await App.apiRequest('/api/v1/reserved-numbers', {
                    method: 'POST',
                    body: JSON.stringify({
                        field_name: 'expense_number',
                        field_value: nextNumber,
                        page_name: 'expenses'
                    })
                });
            } catch (e) {}
            return nextNumber;
        } catch (e) {
            const today = new Date();
            const dateStr = today.toISOString().slice(0,10).replace(/-/g,'');
            if (!window.expenseNumberCounter) window.expenseNumberCounter = 1;
            const seq = String(window.expenseNumberCounter || 1).padStart(3,'0');
            window.expenseNumberCounter = (window.expenseNumberCounter || 1) + 1;
            return `EXP-${dateStr}-${seq}`;
        }
    }

    // 移除支出記錄
    function removeExpenseRecord(index) {
        expenseRecords.splice(index, 1);
        renderExpenseRecords();
        document.dispatchEvent(new CustomEvent('expenseRecordsChanged'));
    }

    // 更新支出記錄
    function updateExpenseRecord(index, field, value) {
        const record = expenseRecords[index];
        if (!record) return;
        
        if (field === 'amount') {
            record[field] = parseFloat(value) || 0;
        } else if (field === 'payment_method_id') {
            record[field] = value;
            const method = paymentMethods.find(m => m.id === value);
            record.payment_method = method ? method.code : '';
        } else {
            record[field] = value;
        }
        renderExpenseRecords();
        document.dispatchEvent(new CustomEvent('expenseRecordsChanged'));
    }

    // 渲染支出記錄
    function renderExpenseRecords() {
        const tbody = document.getElementById('expenseRecordsTable');
        if (!tbody) return;

        if (expenseRecords.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">暫無支出記錄，請點擊「添加支出記錄」</td></tr>';
            document.getElementById('totalPaidAmount').textContent = '$0.00';
            const totalText = document.getElementById('totalAmount')?.textContent || '$0';
            const totalVal = parseFloat(totalText.replace(/[^0-9.-]/g,'')) || 0;
            const dueSpan = document.getElementById('totalDueAmount');
            if (dueSpan) dueSpan.textContent = `需付：$${totalVal.toFixed(2)}`;
            return;
        }

        tbody.innerHTML = expenseRecords.map((record, index) => {
            const paymentMethodId = record.payment_method_id || '';
            const paymentMethod = paymentMethods.find(m => m.id === paymentMethodId);
            const isBankTransfer = paymentMethod && (paymentMethod.code === 'bank_transfer' || paymentMethod.code === 'bank' || paymentMethod.name.includes('銀行') || paymentMethod.name.includes('转账') || paymentMethod.name.includes('轉賬'));
            const bankAccountId = record.bank_account_id || '';
            const showBankAccount = isBankTransfer;
            
            return `
                <tr>
                    <td><input type="text" class="form-control form-control-sm" value="${record.invoice_number || ''}" placeholder="支出單號碼" readonly></td>
                    <td><input type="date" class="form-control form-control-sm" value="${record.expense_date || record.payment_date || ''}" onchange="updateExpenseRecord(${index}, 'expense_date', this.value)"></td>
                    <td>
                        <select class="form-select form-select-sm expense-payment-method-select" data-index="${index}" style="width: 100%;">
                            <option value="">${t('fields.請選擇', '請選擇')}</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm expense-bank-account-select" data-index="${index}" style="width: 100%; ${showBankAccount ? '' : 'display:none;'}">
                            <option value="">${t('fields.請選擇付款賬戶', '請選擇付款賬戶')}</option>
                        </select>
                    </td>
                    <td><input type="number" class="form-control form-control-sm" value="${record.amount || 0}" min="0" step="0.01" onchange="updateExpenseRecord(${index}, 'amount', this.value)"></td>
                    <td><input type="text" class="form-control form-control-sm" value="${record.reference_number || ''}" onchange="updateExpenseRecord(${index}, 'reference_number', this.value)" placeholder="參考號碼"></td>
                    <td><input type="text" class="form-control form-control-sm" value="${record.notes || ''}" onchange="updateExpenseRecord(${index}, 'notes', this.value)" placeholder="備註"></td>
                    <td class="text-nowrap">
                        <button type="button" class="btn btn-sm btn-outline-secondary me-1" title="PDF" onclick="generateExpensePDF(${index})">
                            <i class="bi bi-file-earmark-pdf"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeExpenseRecord(${index})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        }).join('');

        const total = expenseRecords.reduce((sum, r) => sum + (parseFloat(r.amount) || 0), 0);
        document.getElementById('totalPaidAmount').textContent = '$' + total.toFixed(2);
        const totalText = document.getElementById('totalAmount')?.textContent || '$0';
        const totalVal = parseFloat(totalText.replace(/[^0-9.-]/g,'')) || 0;
        const due = Math.max(totalVal - total, 0);
        const dueSpan = document.getElementById('totalDueAmount');
        if (dueSpan) dueSpan.textContent = `需付：$${due.toFixed(2)}`;
        
        // 初始化 Select2
        setTimeout(() => {
            expenseRecords.forEach((record, index) => {
                // 初始化付款方式 Select2
                const paymentSelect = $(`.expense-payment-method-select[data-index="${index}"]`);
                if (paymentSelect.length && !paymentSelect.hasClass('select2-hidden-accessible')) {
                    const paymentMethodId = record.payment_method_id || '';
                    paymentSelect.select2({
                        theme: 'bootstrap-5',
                        placeholder: t('fields.請選擇付款方式...', '請選擇付款方式...'),
                        allowClear: true,
                        data: paymentMethods.map(m => ({ id: m.id, text: m.name }))
                    });
                    
                    // 如果有默認值，設置它
                    if (paymentMethodId) {
                        paymentSelect.val(paymentMethodId).trigger('change');
                    }
                    
                    paymentSelect.on('change', function() {
                        updateExpenseRecord(index, 'payment_method_id', this.value);
                        const method = paymentMethods.find(m => m.id === this.value);
                        if (method) {
                            updateExpenseRecord(index, 'payment_method', method.code);
                        }
                        // 檢查是否需要顯示銀行賬戶選擇器
                        const isBankTransfer = method && (method.code === 'bank_transfer' || method.code === 'bank' || method.name.includes('銀行') || method.name.includes('转账') || method.name.includes('轉賬'));
                        const bankAccountSelect = $(`.expense-bank-account-select[data-index="${index}"]`);
                        if (isBankTransfer) {
                            bankAccountSelect.show();
                            // 如果切换到银行转账且没有设置付款账户，设置默认账户
                            const currentBankAccountId = record.bank_account_id || '';
                            if (!currentBankAccountId) {
                                const defaultAccount = bankAccounts.find(acc => acc.is_default_paying === true || acc.is_default_paying === 'true' || acc.is_default_paying === 1);
                                if (defaultAccount) {
                                    const defaultBankAccountId = defaultAccount.id;
                                    updateExpenseRecord(index, 'bank_account_id', defaultBankAccountId);
                                    if (bankAccountSelect.hasClass('select2-hidden-accessible')) {
                                        bankAccountSelect.val(defaultBankAccountId).trigger('change');
                                    }
                                }
                            }
                        } else {
                            bankAccountSelect.hide();
                            if (bankAccountSelect.data('select2')) {
                                bankAccountSelect.val('').trigger('change');
                            }
                            updateExpenseRecord(index, 'bank_account_id', '');
                        }
                        renderExpenseRecords();
                    });
                }
                
                // 初始化銀行賬戶 Select2
                const bankAccountSelect = $(`.expense-bank-account-select[data-index="${index}"]`);
                if (bankAccountSelect.length && !bankAccountSelect.hasClass('select2-hidden-accessible')) {
                    // 如果沒有設置付款賬戶，使用系統預設
                    let defaultBankAccountId = record.bank_account_id || '';
                    if (!defaultBankAccountId) {
                        const defaultAccount = bankAccounts.find(acc => acc.is_default_paying === true || acc.is_default_paying === 'true' || acc.is_default_paying === 1);
                        if (defaultAccount) {
                            defaultBankAccountId = defaultAccount.id;
                            updateExpenseRecord(index, 'bank_account_id', defaultBankAccountId);
                        }
                    }
                    
                    bankAccountSelect.select2({
                        theme: 'bootstrap-5',
                        placeholder: t('fields.請選擇付款賬戶...', '請選擇付款賬戶...'),
                        allowClear: true,
                        data: bankAccounts.map(acc => ({ 
                            id: acc.id, 
                            text: `${acc.name} (${acc.bank_name} - ${acc.account_number})` 
                        }))
                    }).val(defaultBankAccountId || '').trigger('change');
                    bankAccountSelect.on('change', function() {
                        updateExpenseRecord(index, 'bank_account_id', this.value);
                    });
                }
            });
        }, 100);
    }

    function addReceivingNoteItem(noteIndex) {
        if (!receivingNotes[noteIndex].items) {
            receivingNotes[noteIndex].items = [];
        }
        // 獲取第一個有可用數量的產品
        let selectedProduct = null;
        let availableQuantity = 0;
        
        for (const purchaseItem of purchaseItems) {
            // 計算該產品在所有收貨單中已使用的數量
            let usedQuantity = 0;
            receivingNotes.forEach((n, ni) => {
                if (n.items) {
                    n.items.forEach(i => {
                        if (i.product_id === purchaseItem.product_id) {
                            usedQuantity += i.quantity || 0;
                        }
                    });
                }
            });
            const available = purchaseItem.quantity - usedQuantity;
            if (available > 0) {
                selectedProduct = purchaseItem;
                availableQuantity = available;
                break;
            }
        }
        
        // 如果沒有可用產品，使用第一個產品（即使數量為0）
        if (!selectedProduct && purchaseItems.length > 0) {
            selectedProduct = purchaseItems[0];
            availableQuantity = 0;
        }
        
        if (selectedProduct) {
            receivingNotes[noteIndex].items.push({
                product_id: selectedProduct.product_id || '',
                quantity: Math.max(0, availableQuantity),
                product_attributes: selectedProduct.product_attributes || null
            });
            // 重新渲染整個收貨單列表（參考發貨單的實現，避免性能問題）
            renderReceivingNotes();
            document.dispatchEvent(new CustomEvent('receivingRecordsChanged'));
        } else {
            App.showAlert(t('purchaseOrdersNew.alerts.noAvailableProducts', '沒有可用的產品'), 'warning');
        }
    }
    
    // 只渲染單個收貨單的產品列表（避免重新渲染整個收貨單列表）
    function renderReceivingNoteItems(noteIndex) {
        const note = receivingNotes[noteIndex];
        if (!note) return;
        
        const tbody = document.getElementById(`receivingNoteItems_${noteIndex}`);
        if (!tbody) {
            // 如果 tbody 不存在，重新渲染整個收貨單列表
            renderReceivingNotes();
            return;
        }
        
        if (!note.items || note.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">暫無產品，請點擊「添加產品」</td></tr>';
            return;
        }
        
        tbody.innerHTML = (note.items || []).map((item, itemIndex) => {
            // 計算該產品在採購單中的總數量
            const purchaseItem = purchaseItems.find(pi => pi.product_id === item.product_id);
            const purchaseQuantity = purchaseItem ? purchaseItem.quantity : 0;
            // 計算該產品在所有收貨單中已使用的數量
            let usedQuantity = 0;
            receivingNotes.forEach((n, ni) => {
                if (n.items) {
                    n.items.forEach((i, ii) => {
                        if (i.product_id === item.product_id && !(ni === noteIndex && ii === itemIndex)) {
                            usedQuantity += i.quantity || 0;
                        }
                    });
                }
            });
            const availableQuantity = purchaseQuantity - usedQuantity;
            const maxQuantity = Math.max(0, availableQuantity);
            
            // 獲取採購項目的產品屬性（與發貨單顯示方式一致）
            const productAttributes = purchaseItem ? purchaseItem.product_attributes : (item.product_attributes || null);
            let attributesDisplay = '';
            if (productAttributes) {
                // 處理不同格式的產品屬性（與發貨單一致）
                let attrArray = [];
                if (Array.isArray(productAttributes)) {
                    // 如果是數組格式 [{attribute_id: '...', value: '...'}]
                    attrArray = productAttributes.map(attr => {
                        if (attr.attribute_id && attr.value) {
                            const attrDef = allAttributes.find(a => a.id === attr.attribute_id);
                            return attrDef ? `${attrDef.name}: ${attr.value}` : `${attr.attribute_id}: ${attr.value}`;
                        }
                        return '';
                    }).filter(t => t);
                } else if (typeof productAttributes === 'object') {
                    // 如果是對象格式 {attribute_id: 'value'}
                    attrArray = Object.entries(productAttributes).map(([key, value]) => {
                        const attrDef = allAttributes.find(a => a.id === key);
                        return attrDef ? `${attrDef.name}: ${value}` : `${key}: ${value}`;
                    });
                }
                if (attrArray.length > 0) {
                    attributesDisplay = `<div class="small text-muted mt-1" style="margin-left: 10px;">${attrArray.join(', ')}</div>`;
                }
            }
            
            return `
            <tr>
                <td>
                    <select class="form-select form-select-sm receiving-product-select" data-note-index="${noteIndex}" data-item-index="${itemIndex}" onchange="updateReceivingNoteItem(${noteIndex}, ${itemIndex}, 'product_id', this.value)">
                        <option value="">請選擇產品</option>
                        ${purchaseItems.map(pi => {
                            const prod = products.find(p => p.id === pi.product_id);
                            if (!prod) return '';
                            // 計算該產品在所有收貨單中已使用的數量
                            let totalUsed = 0;
                            receivingNotes.forEach((n, ni) => {
                                if (n.items) {
                                    n.items.forEach((i, ii) => {
                                        if (i.product_id === pi.product_id && !(ni === noteIndex && ii === itemIndex)) {
                                            totalUsed += i.quantity || 0;
                                        }
                                    });
                                }
                            });
                            const available = pi.quantity - totalUsed;
                            const isSelected = item.product_id === pi.product_id;
                            const isAvailable = available > 0 || isSelected;
                            return `<option value="${pi.product_id}" ${isSelected ? 'selected' : ''} ${!isAvailable ? 'disabled' : ''}>${prod.name} (採購: ${pi.quantity}, 可用: ${Math.max(0, available)})</option>`;
                        }).join('')}
                    </select>
                    ${attributesDisplay}
                </td>
                <td>
                    <input type="number" class="form-control form-control-sm" value="${item.quantity || 0}" min="0" max="${maxQuantity}" step="1" onchange="updateReceivingNoteItem(${noteIndex}, ${itemIndex}, 'quantity', this.value)" data-max-quantity="${maxQuantity}">
                    ${maxQuantity < purchaseQuantity ? `<small class="text-muted d-block">最多可收貨: ${maxQuantity}</small>` : ''}
                </td>
                <td>
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeReceivingNoteItem(${noteIndex}, ${itemIndex})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
            `;
        }).join('');
        
        // 初始化新添加的產品 Select2（只初始化當前收貨單的）
        setTimeout(() => {
            $(`.receiving-product-select[data-note-index="${noteIndex}"]`).each(function() {
                const $select = $(this);
                const itemIndex = $select.data('item-index');
                
                // 如果已經初始化過，先銷毀
                if ($select.hasClass('select2-hidden-accessible')) {
                    $select.select2('destroy');
                }
                
                // 重新初始化 Select2
                $select.select2({
                    theme: 'bootstrap-5',
                    placeholder: t('fields.請選擇產品', '請選擇產品'),
                    allowClear: true,
                    width: '100%'
                }).on('change', function() {
                    updateReceivingNoteItem(noteIndex, itemIndex, 'product_id', $(this).val());
                });
                
                // 設置當前值
                const currentValue = receivingNotes[noteIndex].items[itemIndex]?.product_id;
                if (currentValue) {
                    $select.val(currentValue).trigger('change');
                }
            });
        }, 50);
    }

    function removeReceivingNoteItem(noteIndex, itemIndex) {
        if (!receivingNotes[noteIndex] || !receivingNotes[noteIndex].items) {
            console.error('removeReceivingNoteItem: Invalid noteIndex or items array');
            return;
        }
        if (itemIndex < 0 || itemIndex >= receivingNotes[noteIndex].items.length) {
            console.error('removeReceivingNoteItem: Invalid itemIndex');
            return;
        }
        receivingNotes[noteIndex].items.splice(itemIndex, 1);
        // 重新渲染整個收貨單列表（參考發貨單的實現，避免性能問題）
        renderReceivingNotes();
        document.dispatchEvent(new CustomEvent('receivingRecordsChanged'));
    }

    function updateReceivingNote(noteIndex, field, value) {
        receivingNotes[noteIndex][field] = value;
        // 避免「輸入日期時 select2 一直閃」：
        // 日期/文字欄位變更不需要重建整個 receiving notes DOM（重建會 destroy/re-init select2，造成閃爍）
        document.dispatchEvent(new CustomEvent('receivingRecordsChanged'));
    }

    function updateReceivingNoteItem(noteIndex, itemIndex, field, value) {
        const item = receivingNotes[noteIndex].items[itemIndex];
        
        if (field === 'product_id') {
            item.product_id = value;
            // 計算可用數量並自動設置
            const purchaseItem = purchaseItems.find(pi => pi.product_id === value);
            if (purchaseItem) {
                // 從採購項目複製產品屬性
                item.product_attributes = purchaseItem.product_attributes || null;
                // 計算該產品在所有收貨單中已使用的數量（不包括當前項）
                let usedQuantity = 0;
                receivingNotes.forEach((n, ni) => {
                    if (n.items) {
                        n.items.forEach((i, ii) => {
                            if (i.product_id === value && !(ni === noteIndex && ii === itemIndex)) {
                                usedQuantity += i.quantity || 0;
                            }
                        });
                    }
                });
                const availableQuantity = purchaseItem.quantity - usedQuantity;
                // 自動設置為可用數量
                item.quantity = Math.max(0, availableQuantity);
            } else {
                item.quantity = 0;
                item.product_attributes = null;
            }
        } else if (field === 'quantity') {
            const quantity = parseInt(value) || 0;
            // 獲取該產品在採購單中的數量
            const purchaseItem = purchaseItems.find(pi => pi.product_id === item.product_id);
            if (purchaseItem) {
                // 計算該產品在所有收貨單中已使用的數量（不包括當前項）
                let usedQuantity = 0;
                receivingNotes.forEach((n, ni) => {
                    if (n.items) {
                        n.items.forEach((i, ii) => {
                            if (i.product_id === item.product_id && !(ni === noteIndex && ii === itemIndex)) {
                                usedQuantity += i.quantity || 0;
                            }
                        });
                    }
                });
                const availableQuantity = purchaseItem.quantity - usedQuantity;
                // 限制數量不超過可用數量
                item.quantity = Math.min(quantity, Math.max(0, availableQuantity));
            } else {
                item.quantity = 0;
            }
        } else {
            item[field] = value;
        }
        // 重新渲染整個收貨單列表（參考發貨單的實現，避免性能問題）
        renderReceivingNotes();
        document.dispatchEvent(new CustomEvent('receivingRecordsChanged'));
    }

        setTimeout(() => {

                    $(this).select2('destroy');

            });

                if (!select.length) return;

                // 如果沒有設置倉庫，使用系統預設（只更新資料，不重渲染）
                let defaultWarehouseId = note.warehouse_id || '';
                if (!defaultWarehouseId) {
                    const defaultWarehouse = warehouses.find(w => w.is_default === true || w.is_default === 'true' || w.is_default === 1);
                    if (defaultWarehouse) {
                        defaultWarehouseId = defaultWarehouse.id;
                        receivingNotes[noteIndex].warehouse_id = defaultWarehouseId;
                    }
                }

                // 使用 AJAX 載入倉庫列表
                select.select2({
                    theme: 'bootstrap-5',
                    placeholder: t('fields.請選擇倉庫', '請選擇倉庫'),
                    allowClear: true,
                    ajax: {
                        url: '/api/v1/warehouses',
                        dataType: 'json',
                        delay: 250,
                        data: function(params) {
                            return {
                                search: params.term,
                                limit: 50
                            };
                        },
                        processResults: function(data) {
                            return {
                                results: (data.data || []).map(w => ({ id: w.id, text: w.name }))
                            };
                        },
                        cache: true
                    },
                    minimumInputLength: 0,
                    width: '100%'
                });
                
                // 如果有默認值，設置選中項
                if (defaultWarehouseId) {
                    const defaultWarehouse = warehouses.find(w => w.id === defaultWarehouseId);

                // 綁定用戶變更（先解除舊監聯，避免重複）

                    if (icon) icon.classList.replace('bi-chevron-up', 'bi-chevron-down');
                });
            }
        });

    // ============================================
    // 取消採購功能（類似訂單退款單）
    // ============================================
    
    async function addCancellationNote() {
        if (!purchaseItems || purchaseItems.length === 0) {
            App.showAlert(t('purchaseOrdersNew.alerts.addProductBeforeCreateCancellationNote', '請先添加至少一件商品再建立取消採購單'), 'warning');
            return;
        }
        
        const today = new Date().toISOString().split('T')[0];
        
        // 自動生成取消採購單號
        let cancellationNumber = '';
        try {
            const response = await App.apiRequest('/api/v1/reserved-numbers/next?field_name=cancellation_number&page_name=purchase-orders');
            cancellationNumber = response.next_number || response.number || '';
            
            if (cancellationNumber) {
                await App.apiRequest('/api/v1/reserved-numbers', {
                    method: 'POST',
                    body: JSON.stringify({
                        field_name: 'cancellation_number',
                        field_value: cancellationNumber,
                        page_name: 'purchase-orders'
                    })
                });
            }
        } catch (error) {
            console.warn('生成取消採購單號失敗:', error);
        }
        
        // 獲取採購單總金額
        const totalAmountEl = document.getElementById('totalAmount');
        let cancellationTotalAmount = 0;
        if (totalAmountEl) {
            const totalText = totalAmountEl.textContent || totalAmountEl.innerText || '$0.00';
            cancellationTotalAmount = parseFloat(totalText.replace('$', '').replace(',', '')) || 0;
        }
        
        cancellationNotes.push({
            id: null,
            cancellation_number: cancellationNumber,
            cancellation_date: today,
            return_money: true, // 拿回採購錢 yes/no（默認 yes）
            return_products: false, // 退回貨物 yes/no（默認 no）
            warehouse_id: '', // 退出倉庫ID（無默認值）
            cancellation_total_amount: cancellationTotalAmount, // 取消總額（預填採購單總額）
            notes: '',
            items: [] // 取消的產品
        });
        renderCancellationNotes();
    }

    function removeCancellationNote(index) {
        cancellationNotes.splice(index, 1);
        renderCancellationNotes();
    }

    function addCancellationNoteItem(noteIndex) {
        if (!cancellationNotes[noteIndex].items) {
            cancellationNotes[noteIndex].items = [];
        }
        
        // 獲取採購單中第一個產品的可用數量
        const firstPurchaseItem = purchaseItems[0];
        if (!firstPurchaseItem) {
            App.showAlert(t('purchaseOrdersNew.alerts.purchaseOrderHasNoProducts', '採購單中沒有產品'), 'warning');
            return;
        }
        
        const purchaseItem = purchaseItems.find(pi => pi.product_id === firstPurchaseItem.product_id);
        const purchaseQuantity = purchaseItem ? purchaseItem.quantity : 0;
        
        // 計算該產品在所有取消採購單中已取消的數量
        let cancelledQuantity = 0;
        cancellationNotes.forEach((n, ni) => {
            if (n.items) {
                n.items.forEach(i => {
                    if (i.product_id === firstPurchaseItem.product_id) {
                        cancelledQuantity += i.quantity || 0;
                    }
                });
            }
        });
        const availableQuantity = purchaseQuantity - cancelledQuantity;
        
        cancellationNotes[noteIndex].items.push({
            product_id: firstPurchaseItem.product_id,
            quantity: Math.max(0, availableQuantity),
            unit_price: firstPurchaseItem.unit_price || 0
        });
        updateCancellationTotalAmountFromItems(noteIndex);
        renderCancellationNotes();
    }

    function removeCancellationNoteItem(noteIndex, itemIndex) {
        if (cancellationNotes[noteIndex].items) {
            cancellationNotes[noteIndex].items.splice(itemIndex, 1);
            updateCancellationTotalAmountFromItems(noteIndex);
            renderCancellationNotes();
        }
    }

    function updateCancellationNote(noteIndex, field, value) {
        if (cancellationNotes[noteIndex]) {
            cancellationNotes[noteIndex][field] = value;
            if (field === 'return_products') {
                // 如果取消退回貨物，清除倉庫ID
                if (!value) {
                    cancellationNotes[noteIndex].warehouse_id = '';
                }
                renderCancellationNotes();
            } else if (field === 'return_money') {
                renderCancellationNotes();
            }
        }
    }

    // 檢查取消採購單的庫存
    async function checkCancellationStock(noteIndex) {
        const note = cancellationNotes[noteIndex];
        if (!note || !note.return_products || !note.warehouse_id) {
            return true; // 沒有選擇退回貨物或沒有選擇倉庫，不需要檢查
        }
        
        const items = note.items || [];
        if (items.length === 0) {
            return true; // 沒有產品，不需要檢查
        }
        
        let hasInsufficientStock = false;
        const insufficientProducts = [];
        
        for (const item of items) {
            if (!item.product_id || !item.quantity) continue;
            
            try {
                const stockRes = await App.apiRequest(`/product-warehouse-stocks?product_id=${item.product_id}&warehouse_id=${note.warehouse_id}`);
                const stocks = stockRes.data || [];
                const stock = stocks.find(s => {
                    const sWarehouseId = s.warehouse_id || (s.warehouse && s.warehouse.id);
                    return String(sWarehouseId) === String(note.warehouse_id);
                });
                const availableStock = stock ? (stock.quantity || 0) : 0;
                const requiredQuantity = parseFloat(item.quantity) || 0;
                
                if (availableStock < requiredQuantity) {
                    hasInsufficientStock = true;
                    const product = products.find(p => p.id === item.product_id);
                    insufficientProducts.push({
                        name: product ? product.name : item.product_id,
                        required: requiredQuantity,
                        available: availableStock
                    });
                }
            } catch (error) {
                console.error('Failed to check stock:', error);
            }
        }
        
        if (hasInsufficientStock) {
            const message = `以下產品在該倉庫庫存不足：\n\n${insufficientProducts.map(p => `- ${p.name}：需要 ${p.required}，可用 ${p.available}`).join('\n')}\n\n無法進行退貨。`;
            App.showAlert(message, 'warning');
            return false;
        }
        
        return true;
    }

    function updateCancellationNoteItem(noteIndex, itemIndex, field, value) {
        const item = cancellationNotes[noteIndex].items[itemIndex];
        if (field === 'product_id') {
            item.product_id = value;
            const purchaseItem = purchaseItems.find(pi => pi.product_id === value);
            if (purchaseItem) item.unit_price = purchaseItem.unit_price || 0;
            updateCancellationTotalAmountFromItems(noteIndex);
            // 如果已選擇倉庫，檢查庫存
            if (cancellationNotes[noteIndex].warehouse_id) {
                checkCancellationStock(noteIndex).then(hasStock => {
                    if (!hasStock) {
                        // 庫存不足，清除產品選擇
                        item.product_id = '';
                        renderCancellationNotes();
                    }
                });
            }
        } else if (field === 'quantity') {
            const quantity = parseFloat(value) || 0;
            item.quantity = quantity;
            
            // 限制數量不能超過採購數量
            const purchaseItem = purchaseItems.find(pi => pi.product_id === item.product_id);
            if (purchaseItem) {
                const orderQuantity = purchaseItem.quantity;
                let cancelledQuantity = 0;
                cancellationNotes.forEach((n, ni) => {
                    if (n.items) {
                        n.items.forEach((i, ii) => {
                            if (i.product_id === item.product_id && !(ni === noteIndex && ii === itemIndex)) {
                                cancelledQuantity += i.quantity || 0;
                            }
                        });
                    }
                });
                const availableQuantity = orderQuantity - cancelledQuantity;
                item.quantity = Math.min(quantity, Math.max(0, availableQuantity));
            }
            updateCancellationTotalAmountFromItems(noteIndex);
            // 如果已選擇倉庫，檢查庫存
            if (cancellationNotes[noteIndex].warehouse_id) {
                checkCancellationStock(noteIndex).then(hasStock => {
                    if (!hasStock) {
                        // 庫存不足，重置數量
                        item.quantity = 0;
                        renderCancellationNotes();
                    }
                });
            }
        }
        renderCancellationNotes();
    }

    function calculateCancellationTotalAmount(noteIndex) {
        const note = cancellationNotes[noteIndex];
        if (!note || !note.items) {
            return 0;
        }
        let total = 0;
        note.items.forEach(item => {
            const quantity = parseFloat(item.quantity) || 0;
            const unitPrice = parseFloat(item.unit_price) || 0;
            total += quantity * unitPrice;
        });
        return total;
    }

    function updateCancellationTotalAmountFromItems(noteIndex) {
        const total = calculateCancellationTotalAmount(noteIndex);
        cancellationNotes[noteIndex].cancellation_total_amount = total;
        renderCancellationNotes();
    }

    function renderCancellationNotes() {
        const container = document.getElementById('cancellationNotesContainer');
        if (!container) return;

        if (cancellationNotes.length === 0) {
            container.innerHTML = `<p class="text-muted text-center">${t('purchaseOrdersNew.noCancellationHint', '暫無取消採購單，請點擊「添加取消採購單」')}</p>`;
            return;
        }

        container.innerHTML = cancellationNotes.map((note, noteIndex) => {
            const cancellationNumberDisplay = note.cancellation_number || '';
            const collapseId = `cancellationNoteCollapse_${noteIndex}`;
            
            // 獲取取消總額（如果沒有則使用0）
            const totalCancellation = note.cancellation_total_amount || 0;
            
            return `
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center" style="cursor: pointer;" data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="true" aria-controls="${collapseId}">
                        <h5 class="mb-0">
                            <i class="bi bi-chevron-up"></i> 取消採購單 ${cancellationNumberDisplay}
                        </h5>
                        <div onclick="event.stopPropagation();">
                            <button type="button" class="btn btn-sm btn-outline-danger" onclick="event.stopPropagation(); event.preventDefault(); removeCancellationNote(${noteIndex}); return false;">
                                <i class="bi bi-trash"></i> 刪除
                            </button>
                        </div>
                    </div>
                    <div class="collapse show" id="${collapseId}">
                        <div class="card-body">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">取消日期</label>
                                    <input type="date" class="form-control form-control-sm" value="${note.cancellation_date || ''}" onchange="updateCancellationNote(${noteIndex}, 'cancellation_date', this.value)">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">取消總額</label>
                                    <input type="number" class="form-control form-control-sm" value="${totalCancellation}" min="0" step="0.01" onchange="updateCancellationNote(${noteIndex}, 'cancellation_total_amount', this.value)">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="returnMoney_${noteIndex}" ${note.return_money ? 'checked' : ''} onchange="updateCancellationNote(${noteIndex}, 'return_money', this.checked)">
                                        <label class="form-check-label" for="returnMoney_${noteIndex}">
                                            拿回採購錢
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="returnProducts_${noteIndex}" ${note.return_products ? 'checked' : ''} onchange="updateCancellationNote(${noteIndex}, 'return_products', this.checked)">
                                        <label class="form-check-label" for="returnProducts_${noteIndex}">
                                            退回貨物
                                        </label>
                                    </div>
                                </div>
                            </div>
                            ${note.return_products ? `
                            <div class="row mb-3">
                                <div class="col-md-12">
                                    <label class="form-label">退出倉庫 <span class="text-danger">*</span></label>
                                    <select class="form-select form-select-sm cancellation-warehouse-select" id="cancellationWarehouse_${noteIndex}" data-note-index="${noteIndex}" style="width: 100%;">
                                        <option value="">請選擇倉庫</option>
                                    </select>
                                </div>
                            </div>
                            ` : ''}
                            <div class="mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h6 class="mb-0">取消產品明細</h6>
                                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="addCancellationNoteItem(${noteIndex})">
                                        <i class="bi bi-plus-circle"></i> 添加產品
                                    </button>
                                </div>
                                <div class="table-responsive">
                                    <table class="table table-sm table-bordered">
                                        <thead>
                                            <tr>
                                                <th>產品</th>
                                                <th>數量</th>
                                                <th>單價</th>
                                                <th>小計</th>
                                                <th>操作</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${(note.items || []).map((item, itemIndex) => {
                                                const purchaseItem = purchaseItems.find(pi => pi.product_id === item.product_id);
                                                const purchaseQuantity = purchaseItem ? purchaseItem.quantity : 0;
                                                
                                                // 計算可用數量
                                                let cancelledQuantity = 0;
                                                cancellationNotes.forEach((n, ni) => {
                                                    if (n.items) {
                                                        n.items.forEach((i, ii) => {
                                                            if (i.product_id === item.product_id && !(ni === noteIndex && ii === itemIndex)) {
                                                                cancelledQuantity += i.quantity || 0;
                                                            }
                                                        });
                                                    }
                                                });
                                                const availableQuantity = purchaseQuantity - cancelledQuantity;
                                                const maxQuantity = Math.max(0, availableQuantity);
                                                
                                                const product = products.find(p => p.id === item.product_id);
                                                const subtotal = (item.quantity || 0) * (item.unit_price || 0);
                                                
                                                return `
                                                    <tr>
                                                        <td>
                                                            <select class="form-select form-select-sm" onchange="updateCancellationNoteItem(${noteIndex}, ${itemIndex}, 'product_id', this.value)">
                                                                <option value="">請選擇產品</option>
                                                                ${purchaseItems.map(pi => {
                                                                    const prod = products.find(p => p.id === pi.product_id);
                                                                    if (!prod) return '';
                                                                    let totalCancelled = 0;
                                                                    cancellationNotes.forEach((n, ni) => {
                                                                        if (n.items) {
                                                                            n.items.forEach((i, ii) => {
                                                                                if (i.product_id === pi.product_id && !(ni === noteIndex && ii === itemIndex)) {
                                                                                    totalCancelled += i.quantity || 0;
                                                                                }
                                                                            });
                                                                        }
                                                                    });
                                                                    const available = pi.quantity - totalCancelled;
                                                                    const isSelected = item.product_id === pi.product_id;
                                                                    const isAvailable = available > 0 || isSelected;
                                                                    return `<option value="${pi.product_id}" ${isSelected ? 'selected' : ''} ${!isAvailable ? 'disabled' : ''}>${prod.name} (採購: ${pi.quantity}, 可取消: ${Math.max(0, available)})</option>`;
                                                                }).join('')}
                                                            </select>
                                                        </td>
                                                        <td>
                                                            <input type="number" class="form-control form-control-sm" value="${item.quantity || 0}" min="0" max="${maxQuantity}" step="0.01" onchange="updateCancellationNoteItem(${noteIndex}, ${itemIndex}, 'quantity', this.value)">
                                                            ${maxQuantity < purchaseQuantity ? `<small class="text-muted d-block">最多可取消: ${maxQuantity}</small>` : ''}
                                                        </td>
                                                        <td>$${(item.unit_price || 0).toFixed(2)}</td>
                                                        <td>$${subtotal.toFixed(2)}</td>
                                                        <td>
                                                            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeCancellationNoteItem(${noteIndex}, ${itemIndex})">
                                                                <i class="bi bi-trash"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-12">
                                    <label class="form-label">備註</label>
                                    <textarea class="form-control form-control-sm" rows="3" onchange="updateCancellationNote(${noteIndex}, 'notes', this.value)" placeholder="請輸入備註">${note.notes || ''}</textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // 初始化折疊框圖標切換
        cancellationNotes.forEach((note, noteIndex) => {
            const collapseId = `cancellationNoteCollapse_${noteIndex}`;
            const collapse = document.getElementById(collapseId);
            if (collapse) {
                collapse.addEventListener('show.bs.collapse', function() {
                    const icon = collapse.previousElementSibling.querySelector('i');
                    if (icon) icon.classList.replace('bi-chevron-down', 'bi-chevron-up');
                });
                collapse.addEventListener('hide.bs.collapse', function() {
                    const icon = collapse.previousElementSibling.querySelector('i');
                    if (icon) icon.classList.replace('bi-chevron-up', 'bi-chevron-down');
                });
            }
        });

        // 初始化取消採購單倉庫 Select2（先銷毀所有已存在的 Select2，避免重複初始化）
        setTimeout(() => {
            $('.cancellation-warehouse-select').each(function() {
                if ($(this).data('select2')) {
                    $(this).select2('destroy');
                }
            });
            
            cancellationNotes.forEach((note, noteIndex) => {
                if (!note.return_products) return;
                
                const select = $(`#cancellationWarehouse_${noteIndex}`);
                if (!select.length) return;
                
                select.select2({
                    theme: 'bootstrap-5',
                    placeholder: t('fields.請選擇倉庫', '請選擇倉庫'),
                    allowClear: true,
                    width: '100%',
                    dropdownParent: select.parent(),
                    ajax: {
                        url: '/warehouses',
                        dataType: 'json',
                        delay: 250,
                        headers: {
                            'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                            'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                        },
                        data: function(params) {
                            return {
                                search: params.term || '',
                                limit: 50,
                                page: params.page || 1
                            };
                        },
                        processResults: function(data, params) {
                            params.page = params.page || 1;
                            const items = (data && data.data) ? data.data : [];
                            return {
                                results: items.map(w => ({ id: w.id, text: w.name || w.code || w.id })),
                                pagination: { more: items.length === 50 }
                            };
                        },
                        cache: true
                    },
                    minimumInputLength: 0
                });

                // 初始化後回填現有值（編輯模式/重渲染），並只通知 select2 更新顯示
                const existingWarehouseId = note.warehouse_id ? String(note.warehouse_id) : '';
                if (existingWarehouseId) {
                    // 確保選項存在（避免顯示空白）
                    if (select.find(`option[value="${existingWarehouseId}"]`).length === 0) {
                        // 先塞一個暫時文字，然後再即時查倉庫名稱替換
                        const opt = new Option('載入中...', existingWarehouseId, true, true);
                        select.append(opt);
                        App.apiRequest(`/warehouses/${existingWarehouseId}`).then(w => {
                            const text = (w && (w.name || w.code)) ? (w.name || w.code) : existingWarehouseId;
                            select.find(`option[value="${existingWarehouseId}"]`).text(text);
                            select.trigger('change.select2');
                        }).catch(() => {
                            select.find(`option[value="${existingWarehouseId}"]`).text(existingWarehouseId);
                            select.trigger('change.select2');
                        });
                    }
                    select.val(existingWarehouseId);
                    select.trigger('change.select2');
                } else {
                    select.val('');
                    select.trigger('change.select2');
                }
                
                // ⚠️ 不要用 off('change')：會把 select2 自己的 change.select2 handler 也移除，導致選了但顯示不更新
                select.off('change.cancellationWarehouse').on('change.cancellationWarehouse', async function() {
                    const warehouseId = this.value;
                    if (!warehouseId) {
                        cancellationNotes[noteIndex].warehouse_id = '';
                        return;
                    }
                    
                    // 檢查庫存
                    const items = note.items || [];
                    if (items.length > 0) {
                        let hasInsufficientStock = false;
                        const insufficientProducts = [];
                        
                        for (const item of items) {
                            if (!item.product_id || !item.quantity) continue;
                            
                            try {
                                const stockRes = await App.apiRequest(`/product-warehouse-stocks?product_id=${item.product_id}&warehouse_id=${warehouseId}`);
                                const stocks = stockRes.data || [];
                                // 確保warehouse_id類型一致（可能是字符串或UUID對象）
                                const stock = stocks.find(s => {
                                    const sWarehouseId = s.warehouse_id || (s.warehouse && s.warehouse.id);
                                    return String(sWarehouseId) === String(warehouseId);
                                });
                                const availableStock = stock ? (stock.quantity || 0) : 0;
                                const requiredQuantity = parseFloat(item.quantity) || 0;
                                
                                if (availableStock < requiredQuantity) {
                                    hasInsufficientStock = true;
                                    const product = products.find(p => p.id === item.product_id);
                                    insufficientProducts.push({
                                        name: product ? product.name : item.product_id,
                                        required: requiredQuantity,
                                        available: availableStock
                                    });
                                }
                            } catch (error) {
                                console.error('Failed to check stock:', error);
                            }
                        }
                        
                        if (hasInsufficientStock) {
                            const message = `以下產品在該倉庫庫存不足：\n\n${insufficientProducts.map(p => `- ${p.name}：需要 ${p.required}，可用 ${p.available}`).join('\n')}\n\n無法選擇此倉庫進行退貨。`;
                            App.showAlert(message, 'warning');
                            // 重置選擇
                            select.val('');
                            select.trigger('change.select2');
                            cancellationNotes[noteIndex].warehouse_id = '';
                            return;
                        }
                    }
                    
                    cancellationNotes[noteIndex].warehouse_id = warehouseId;
                });
            });
        }, 100);
    }

    // 載入取消採購記錄（收入記錄和出貨記錄）
    async function loadCancellationIncomeRecords() {
        const purchaseOrderId = document.getElementById('purchaseOrderId').value;
        if (!purchaseOrderId) return;
        
        try {
            const incomes = await App.apiRequest(`/incomes?reference_type=purchase_order_cancellation&reference_id=${purchaseOrderId}`);
            const incomesData = incomes.data || [];
            const tbody = document.getElementById('returnIncomeRecordsTable');
            if (tbody) {
                if (incomesData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">暫無記錄</td></tr>';
                } else {
                    tbody.innerHTML = incomesData.map(inc => {
                        const date = inc.income_date ? new Date(inc.income_date).toISOString().split('T')[0] : '';
                        return `<tr>
                            <td>${date}</td>
                            <td>${inc.description || ''}</td>
                            <td class="text-end">$${(inc.amount || 0).toFixed(2)}</td>
                        </tr>`;
                    }).join('');
                }
            }
        } catch (error) {
            console.warn('載入取消採購收入記錄失敗:', error);
        }
    }

    async function loadCancellationShippingRecords() {
        const purchaseOrderId = document.getElementById('purchaseOrderId').value;
        if (!purchaseOrderId) return;
        
        try {
            // 從 extra_fields 中獲取取消採購的出貨記錄
            const purchaseOrder = await App.apiRequest(`/purchase-orders/${purchaseOrderId}`);
            const shippingNotes = purchaseOrder.extra_fields?.cancellation_shipping_notes || [];
            const tbody = document.getElementById('returnShippingRecordsTable');
            if (tbody) {
                if (shippingNotes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">暫無記錄</td></tr>';
                } else {
                    let allItems = [];
                    shippingNotes.forEach(note => {
                        if (note.items && Array.isArray(note.items)) {
                            note.items.forEach(item => {
                                const product = products.find(p => p.id === item.product_id);
                                const wid = String(note.warehouse_id || '');
                                const wh = (warehouses || []).find(w => w && String(w.id) === wid);
                                const warehouseName = wh ? (wh.name || wh.code || wh.id) : (wid || '-');
                                allItems.push({
                                    date: note.shipping_date || note.shippingDate || '',
                                    productName: product ? product.name : '未知產品',
                                    quantity: item.quantity || 0,
                                    warehouseName
                                });
                            });
                        }
                    });
                    if (allItems.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">暫無記錄</td></tr>';
                    } else {
                        tbody.innerHTML = allItems.map(item => `<tr>
                            <td>${item.date}</td>
                            <td>${item.productName}</td>
                            <td class="text-end">${item.quantity}</td>
                            <td>${item.warehouseName || '-'}</td>
                        </tr>`).join('');
                    }
                }
            }
        } catch (error) {
            console.warn('載入取消採購出貨記錄失敗:', error);
        }
    }

    // 在現有的 DOMContentLoaded 中載入數據（需要找到正確的位置）
    // 這個函數會在頁面加載時被調用
</script>
