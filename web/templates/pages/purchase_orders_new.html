    <style>

                    </li>

                <!-- Tab 內容 -->
                <div class="tab-content" id="purchaseOrderTabContent">
                    <!-- 資料 Tab -->
                    <div class="tab-pane fade show active" id="data-pane" role="tabpanel" aria-labelledby="data-tab">

                        <!-- 基本信息 -->

                    <!-- 收貨單 Tab -->

                        <!-- 出貨記錄和收入記錄 -->

                                        <h6 class="mb-0"><i class="bi bi-box-arrow-up"></i> <span data-i18n="purchaseOrdersNew.shippingRecordsTitle">出貨記錄（退回貨物）</span></h6>
                                    </div>
                                    <div class="card-body">
                                        <div class="table-responsive">
                                            <table class="table table-sm table-bordered">
                                                <thead>
                                                    <tr>
                                                        <th data-i18n-field="日期">日期</th>
                                                        <th data-i18n-field="產品">產品</th>
                                                        <th class="text-end" data-i18n-field="數量">數量</th>
                                                        <th data-i18n-field="倉庫">倉庫</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="returnShippingRecordsTable">
                                                    <tr><td colspan="4" class="text-center text-muted" data-i18n="common.noData">暫無記錄</td></tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <h6 class="mb-0"><i class="bi bi-cash-coin"></i> <span data-i18n="purchaseOrdersNew.incomeRecordsTitle">收入記錄（拿回採購錢）</span></h6>
                                    </div>
                                    <div class="card-body">
                                        <div class="table-responsive">
                                            <table class="table table-sm table-bordered">
                                                <thead>
                                                    <tr>
                                                        <th data-i18n-field="日期">日期</th>
                                                        <th data-i18n-field="描述">描述</th>
                                                        <th class="text-end" data-i18n-field="金額">金額</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="returnIncomeRecordsTable">
                                                    <tr><td colspan="3" class="text-center text-muted" data-i18n="common.noData">暫無記錄</td></tr>

                    </div>

                <div class="d-flex gap-2 mt-4 form-buttons-container">
                    <button type="submit" class="btn btn-primary"><span data-i18n="common.save">保存</span></button>

                </div>

<script>
    let purchaseItems = [];
    let products = [];
    let suppliers = [];
    let expenseRecords = []; // 支出記錄（替代支付記錄）
    let couponDiscount = 0;
    let pointsDiscount = 0;
    let orderDiscount = 0; // 全單折扣百分比
    let purchaser = null; // 採購員
    let selectedLabelIds = []; // 選中的標籤 IDs
    let availableLabels = []; // 可用的標籤列表

    // i18n helper：優先使用 I18n.t，失敗時回退到中文（或指定 fallback）
    function t(key, fallback) {
        try {
            if (typeof I18n !== 'undefined' && I18n.t) {
                const val = I18n.t(key);
                if (val && val !== key) return val;
            }
        } catch (e) {}
        return (fallback !== undefined) ? fallback : key;
    }

    // i18n helper：支援簡單參數插值（{name}）
    function tf(key, params, fallback) {
        let s = t(key, fallback);
        if (!params) return s;
        try {
            Object.keys(params).forEach((k) => {
                s = String(s).split(`{${k}}`).join(String(params[k]));
            });
        } catch (e) {}
        return s;
    }
    
    // 統一處理：避免 popup/modal 在 i18n 尚未 ready 時先顯示預設繁體，稍後再跳成英文造成「閃一下」
    async function ensureI18nReadyForPopup(timeoutMs = 3000) {
        if (typeof I18n !== 'undefined' && I18n.whenReady) {
            try { await I18n.whenReady(timeoutMs); } catch (e) { /* ignore */ }
        }
    }
    function applyI18nNow() {
        if (typeof I18n !== 'undefined' && I18n.updatePage) {
            try { I18n.updatePage(); } catch (e) { /* ignore */ }
        }
    }
    
    // 處理取消按鈕
    function handleCancel(event) {
        event.preventDefault();
        const msg = (typeof I18n !== 'undefined' && I18n.t) ? I18n.t('common.unsavedChangesLeave') : '確定要離開嗎？未保存的更改將丟失。';
        if (confirm(msg)) {
            if (typeof Router !== 'undefined' && Router.go) { Router.go('/purchase-orders'); } else { window.location.href = '/purchase-orders'; }
        }
        return false;
    }

    let currentUser = null; // 當前登錄用戶
    let autoUseLastSupplierQuotationPrice = true; // 單據設定：採購單明細單價預設同供應商最後報價

    document.addEventListener('DOMContentLoaded', async function() {
        if (!App.checkAuth()) return;
        const pageLoadStart = Date.now();
        showPageLoading();

        // 載入當前用戶信息
        try {
            currentUser = await App.apiRequest('/user/me');
            console.log('已載入當前用戶:', currentUser?.name);
        } catch (error) {
            console.error('Failed to load current user:', error);
        }

        // 載入單據設定（用於採購單明細單價帶入最後報價）
        try {
            const auto = await App.apiRequest('/document-auto-settings');
            // 預設開啟：auto_use_last_supplier_quotation_price !== false
            autoUseLastSupplierQuotationPrice = auto && auto.auto_use_last_supplier_quotation_price !== false;
        } catch (error) {
            // 若載入失敗，保持預設開啟（與後端預設一致）
            console.warn('Failed to load document auto settings:', error);
            autoUseLastSupplierQuotationPrice = true;
        }

        // 初始化聯絡電話區號 Select2、採購員 Select2
        initContactPhoneCodeSelect2();
        initPurchaserSelect2();
        
        // 判斷是否是編輯模式
        const pathParts = window.location.pathname.split('/').filter(p => p);
        const isEdit = pathParts.length === 3 && pathParts[0] === 'purchase-orders' && pathParts[2] === 'edit';
        
        // 自動設置採購員為當前登錄用戶（僅在新建模式下）
        if (!isEdit && currentUser && currentUser.id) {
            // 等待 Select2 初始化完成後再設置
            setTimeout(() => {
                setPurchaserToCurrentUser();
            }, 100);
        }

        function getSelectedSupplierId() {
            const el = document.getElementById('supplierId');
            if (!el) return '';

        // 載入並預留採購單號
        async function loadReservedPurchaseOrderNumber() {
            try {
                const orderNumberField = document.getElementById('orderNumber');
                if (!orderNumberField) return;
                
                // 如果已經有值（例如從草稿加載），不重新生成
                if (orderNumberField.value && orderNumberField.value.trim() !== '') {
                    console.log('採購單號已存在，跳過生成:', orderNumberField.value);
                    return;
                }
                
                console.log('開始生成採購單號...');
                // 獲取下一個可用採購單號
                const response = await App.apiRequest('/api/v1/reserved-numbers/next?field_name=order_number&page_name=purchase-orders');
                const nextNumber = response.next_number || response.number;
                
                if (nextNumber) {
                    console.log('獲取到採購單號:', nextNumber);
                    orderNumberField.value = nextNumber;
                    
                    // 預留這個採購單號
                    try {
                        await App.apiRequest('/api/v1/reserved-numbers', {
                            method: 'POST',
                            body: JSON.stringify({
                                field_name: 'order_number',
                                field_value: nextNumber,
                                page_name: 'purchase-orders'
                            })
                        });
                        console.log('採購單號已預留:', nextNumber);
                    } catch (reserveError) {
                        console.warn('預留採購單號失敗:', reserveError);
                        // 即使預留失敗，也保留採購單號，因為後端會檢查唯一性
                    }
                } else {
                    console.error('未能獲取採購單號');
                }
            } catch (error) {
                console.error('載入採購單號失敗:', error);
                // 如果獲取失敗，不阻止用戶繼續操作
            }
        }

        document.getElementById('purchaseOrderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 驗證採購聯絡人姓名必填
            const contactName = document.getElementById('contactName').value.trim();
            if (!contactName) {
                App.showAlert(t('purchaseOrdersNew.alerts.contactNameRequired', '請填寫採購聯絡人姓名'), 'warning');
                // 展開聯絡人區塊並聚焦到姓名字段
                const contactCollapse = document.getElementById('contactCollapse');
                if (contactCollapse && !contactCollapse.classList.contains('show')) {
                    const bsCollapse = new bootstrap.Collapse(contactCollapse, { toggle: true });
                    bsCollapse.show();
                }
                document.getElementById('contactName').focus();
                return;
            }
            
            if (purchaseItems.length === 0) {
                App.showAlert(t('purchaseOrdersNew.alerts.addAtLeastOneProduct', '請至少添加一個商品'), 'warning');
                return;
            }

            // 檢查是否有產品需要屬性但未選擇
            const missingAttributes = [];
            for (let i = 0; i < purchaseItems.length; i++) {
                const item = purchaseItems[i];
                if (item.product_id) {
                    try {
                        const fullProduct = await App.apiRequest(`/products/${item.product_id}`);
                        if (fullProduct.product_attribute_values && fullProduct.product_attribute_values.length > 0) {
                            // 載入所有產品屬性定義
                            const attributesResponse = await App.apiRequest('/product-attributes?limit=1000');
                            const allAttributes = attributesResponse.data || [];
                            const attributeMap = {};
                            allAttributes.forEach(attr => {
                                attributeMap[attr.id] = attr;
                            });
                            
                            // 檢查是否有必填屬性
                            const requiredAttributes = [];
                            fullProduct.product_attribute_values.forEach(attrValue => {
                                const attrDef = attributeMap[attrValue.attribute_id];
                                if (attrDef && (attrDef.is_required === true || attrDef.is_required === 'yes' || attrDef.is_required === 'true')) {
                                    requiredAttributes.push(attrDef);
                                }
                            });
                            
                            // 如果產品有必填屬性但未選擇
                            if (requiredAttributes.length > 0 && (!item.product_attributes || item.product_attributes.length === 0)) {
                                missingAttributes.push({
                                    index: i,
                                    productName: fullProduct.name,
                                    requiredAttributes: requiredAttributes.map(a => a.name).join(', ')
                                });
                            } else if (requiredAttributes.length > 0 && item.product_attributes) {
                                // 檢查必填屬性是否都已選擇
                                const selectedAttributeIds = item.product_attributes.map(a => a.attribute_id);
                                const missingRequired = requiredAttributes.filter(req => !selectedAttributeIds.includes(req.id));
                                if (missingRequired.length > 0) {
                                    missingAttributes.push({
                                        index: i,
                                        productName: fullProduct.name,
                                        requiredAttributes: missingRequired.map(a => a.name).join(', ')
                                    });
                                }
                            }
                        }
                    } catch (error) {
                        console.warn(`檢查產品 ${item.product_id} 屬性失敗:`, error);
                    }
                }
            }
            
            if (missingAttributes.length > 0) {
                const message = missingAttributes.map(m => `第${m.index + 1}項產品「${m.productName}」缺少必填屬性：${m.requiredAttributes}`).join('\n');
                App.showAlert(message, 'warning');
                return;
            }
            
            // 驗證支出記錄：支出日期、支付方式、付款賬戶、金額必填
            if (expenseRecords && expenseRecords.length > 0) {

                        App.showAlert(tf('purchaseOrdersNew.alerts.expenseRecordDateRequired', { index: i + 1 }, '支出記錄 {index} 的支出日期不能為空'), 'warning');
                        return;
                    }
                    if (!record.payment_method_id || record.payment_method_id.trim() === '') {
                        App.showAlert(tf('purchaseOrdersNew.alerts.expenseRecordMethodRequired', { index: i + 1 }, '支出記錄 {index} 的支付方式不能為空'), 'warning');
                        return;
                    }
                    // 檢查是否需要付款賬戶（銀行轉賬需要）
                    const paymentMethod = paymentMethods.find(m => m.id === record.payment_method_id);
                    const isBankTransfer = paymentMethod && (paymentMethod.code === 'bank_transfer' || paymentMethod.code === 'bank' || paymentMethod.name.includes('銀行') || paymentMethod.name.includes('转账') || paymentMethod.name.includes('轉賬'));
                    if (isBankTransfer && (!record.bank_account_id || record.bank_account_id.trim() === '')) {
                        App.showAlert(tf('purchaseOrdersNew.alerts.expenseRecordBankAccountRequired', { index: i + 1 }, '支出記錄 {index} 的付款賬戶不能為空'), 'warning');
                        return;
                    }
                    if (!record.amount || parseFloat(record.amount) <= 0) {
                        App.showAlert(tf('purchaseOrdersNew.alerts.expenseRecordAmountMustBePositive', { index: i + 1 }, '支出記錄 {index} 的金額必須大於 0'), 'warning');
                        return;
                    }

            // 驗證取消採購單：如果選擇退回貨物，必須選擇倉庫
            if (cancellationNotes && cancellationNotes.length > 0) {

                    tax_rate: item.tax_rate || 0,

                    expense_records: expenseRecords.map(record => ({

                        expense_date: record.expense_date || record.payment_date || '',
                        payment_method_id: record.payment_method_id || '',
                        payment_method: record.payment_method || '',
                        bank_account_id: record.bank_account_id || '',
                        amount: record.amount || 0,
                        invoice_number: record.invoice_number || '',
                        reference_number: record.reference_number || '',
                        notes: record.notes || '',
                        category: record.category || 'purchase',
                        expense_type: record.expense_type || 'purchase'
                    })),
                extra_fields: {
                    contact_name: document.getElementById('contactName').value.trim() || '',
                    contact_email: document.getElementById('contactEmail').value.trim() || '',
                    contact_phone: (() => {
                        const phoneCodeSelect = document.getElementById('contactPhoneCode');
                        const phoneCode = (typeof $ !== 'undefined' && $(phoneCodeSelect).hasClass('select2-hidden-accessible')) 
                            ? $(phoneCodeSelect).val() 
                            : (phoneCodeSelect?.value || '');
                        const phoneNumber = document.getElementById('contactPhone')?.value.trim() || '';
                        return phoneNumber ? `${phoneCode || ''} ${phoneNumber}`.trim() : '';
                    })(),
                    contact_address: document.getElementById('contactAddress').value.trim() || '',
                    purchaser_id: $('#purchaserId').val() || null,
                    receiving_notes: receivingNotes, // 新結構：每張收貨單包含多個產品
                    receiving_records: receivingRecords, // 向後兼容
                    cancellation_notes: cancellationNotes || [] // 取消採購單
                }
            };

            try {
                if (isEdit && purchaseOrderId) {
                    await App.apiRequest(`${apiPath}/${purchaseOrderId}`, {
                        method: 'PUT',
                        body: JSON.stringify(data)
                    });
                    App.showAlert(t('common.saveSuccess', '保存成功'), 'success');
                } else {
                    await App.apiRequest(apiPath, {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    App.showAlert(t('common.saveSuccess', '保存成功'), 'success');
                }
                setTimeout(() => { if (typeof Router !== 'undefined' && Router.go) { Router.go(listPath); } else { window.location.href = listPath; } }, 1000);
            } catch (error) {
                const errorMsg = error.message || t('common.saveError', '保存失敗');
                App.showAlert(`${t('common.saveError', '保存失敗')}: ${errorMsg}`, 'danger');
            }
        });

        // 初始化欄位設定功能
        if (window.PageFieldSettings) {
            await PageFieldSettings.init({
                pageName: 'purchase_orders_new',
                containerSelector: '#data-pane',
                insertAfterSelector: '#backToListBtn'
            });
        }

        const elapsed = Date.now() - pageLoadStart;
        const delay = elapsed < 100 ? 100 - elapsed : 0;
        setTimeout(hidePageLoading, delay);
    });

    function showPageLoading() {
        const mainContent = document.querySelector('.main-content');
        if (!mainContent) return;
        let overlay = document.getElementById('pageLoadingOverlay');
        if (!overlay) {
            const pos = window.getComputedStyle(mainContent).position;
            if (pos === 'static') mainContent.style.position = 'relative';
            overlay = document.createElement('div');
            overlay.id = 'pageLoadingOverlay';
            overlay.className = 'form-loading-overlay';
            const loadingText = (typeof I18n !== 'undefined' && I18n.t && I18n.t('common.loading') !== 'common.loading')
                ? I18n.t('common.loading')
                : '載入中...';
            const getInitialLang = () => {
                if (typeof I18n !== 'undefined' && I18n.currentLang) return I18n.currentLang;
                try {
                    const saved = localStorage.getItem('u-nai_lang') || localStorage.getItem('language');
                    if (saved) return saved;
                } catch (e) {}
                if (typeof window !== 'undefined' && window.__INITIAL_LANG__) return window.__INITIAL_LANG__;
                return 'zh';
            };
            const initialLang = getInitialLang();
            const fallbackLoadingData =
                (initialLang === 'en')
                    ? 'Loading data...'
                    : (initialLang === 'zh-CN')
                        ? '正在载入数据...'
                        : '正在載入數據...';
            const translatedLoadingData = (typeof I18n !== 'undefined' && I18n.t && (!I18n.currentLang || I18n.currentLang === initialLang))
                ? I18n.t('common.loadingData')
                : null;
            const loadingDataText = (translatedLoadingData && translatedLoadingData !== 'common.loadingData')
                ? translatedLoadingData
                : fallbackLoadingData;
            overlay.innerHTML = `
                <div class="loading-content">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">${loadingText}</span>
                    </div>
                    <p class="mt-3 text-muted">${loadingDataText}</p>
                </div>
            `;
            mainContent.appendChild(overlay);
        }
        overlay.style.display = 'flex';
    }

    function hidePageLoading() {
        const overlay = document.getElementById('pageLoadingOverlay');
        if (overlay) overlay.style.display = 'none';
    }

    // 自動保存草稿（防抖 2 秒）
    let autoSaveDraftTimer = null;
    function autoSaveDraft() {
        if (autoSaveDraftTimer) {
            clearTimeout(autoSaveDraftTimer);
        }
        
        // 檢查是否為編輯模式，編輯模式下不保存草稿
        const pathParts = window.location.pathname.split('/').filter(p => p);
        const isEdit = pathParts.length === 3 && pathParts[0] === 'purchase-orders' && pathParts[2] === 'edit';
        if (isEdit) {
            return; // 編輯模式不保存草稿
        }
        
        // 檢查是否已禁用自動保存（例如正在提交表單時）
        if (typeof window.autoSaveDisabled !== 'undefined' && window.autoSaveDisabled) {
            return; // 如果自動保存已禁用，直接返回
        }
        
        autoSaveDraftTimer = setTimeout(async () => {
            // 再次檢查是否已禁用（可能在設置定時器後被禁用）
            if (typeof window.autoSaveDisabled !== 'undefined' && window.autoSaveDisabled) {
                return;
            }
            
            try {
                const formData = collectPurchaseOrderFormData();
                
                // 檢查是否有任何非空值（只要有輸入就保存）
                const hasData = Object.keys(formData).some(key => {
                    const value = formData[key];
                    if (value === null || value === undefined) return false;
                    if (typeof value === 'string' && value.trim() === '') return false;
                    if (Array.isArray(value) && value.length === 0) return false;
                    if (typeof value === 'object' && Object.keys(value).length === 0) return false;
                    return true;
                });
                
                if (!hasData) {
                    // 沒有數據時，更新指示器（可能已刪除所有草稿）
                    updateDraftIndicator();
                    return;
                }
                
                formData.status = 'draft';
                
                // 使用 'purchase-orders' 作為頁面名稱，與列表頁面保持一致
                // keyField 參數是字段名，值會從 formData 中自動獲取
                // 如果有 currentDraftId，使用它來更新現有草稿；否則創建新草稿
                const isNewDraft = !window.currentDraftId;
                const draftId = draftManager.saveDraft('purchase-orders', formData, 'order_number', window.currentDraftId);
                
                if (draftId) {
                    console.log('草稿已自動保存:', draftId);
                    // 追蹤當前草稿 ID
                    window.currentDraftId = draftId;
                    // 保存後立即更新指示器
                    updateDraftIndicator();
                    
                    // 如果是新草稿，更新 URL 的 draft_id 參數（不刷新頁面）
                    if (isNewDraft) {
                        updateURLWithDraftId(draftId);
                    }
                }
            } catch (error) {
                console.error('自動保存草稿失敗:', error);
            }
        }, 2000);
    }

    // 更新 URL 的 draft_id 參數（不刷新頁面）
    function updateURLWithDraftId(draftId) {
        if (!draftId) return;
        
        const url = new URL(window.location.href);
        url.searchParams.set('draft_id', draftId);
        
        // 使用 replaceState 更新 URL，不刷新頁面
        window.history.replaceState({}, '', url.toString());
    }

    // 載入草稿
    async function loadPurchaseDraft(draftId) {
        const pageName = 'purchase-orders';
        const draft = draftManager.getDraft(pageName, draftId);
        if (!draft) {
            App.showAlert(t('purchaseOrdersNew.alerts.draftNotFound', '草稿不存在'), 'warning');
            return;
        }
        
        // 追蹤當前草稿 ID（用於更新草稿）
        window.currentDraftId = draftId;
        
        // 更新 URL 的 draft_id 參數（不刷新頁面）
        updateURLWithDraftId(draftId);
        
        const data = draft.data;
        
        // 等待 DOM 完全加載
        await new Promise(resolve => setTimeout(resolve, 100));
        
        // 先載入編號（如果有的話），這樣可以防止後續自動生成編號
        if (data.order_number) {
            const orderNumberField = document.getElementById('orderNumber');
            if (orderNumberField) {
                orderNumberField.value = data.order_number;
                // 如果草稿中有編號，預留這個編號（確保不會被其他表單使用）
                App.apiRequest('/api/v1/reserved-numbers', {
                    method: 'POST',
                    body: JSON.stringify({
                        field_name: 'order_number',
                        field_value: data.order_number,
                        page_name: 'purchase-orders'
                    })
                }).catch(err => console.warn('預留採購單號失敗（可能已預留）:', err));
            }
        }
        
        // 載入表單數據
        if (data.order_date) {
            const orderDateField = document.getElementById('orderDate');
            if (orderDateField) orderDateField.value = data.order_date;
        }
        if (data.expected_delivery_date) {
            const expectedDeliveryDateField = document.getElementById('expectedDeliveryDate');
            if (expectedDeliveryDateField) expectedDeliveryDateField.value = data.expected_delivery_date;
        }
        if (data.status) {
            const statusField = document.getElementById('status');
            if (statusField) {
                // 如果狀態是 draft，改為 confirmed（載入草稿時不允許 draft）
                const status = data.status === 'draft' ? 'confirmed' : data.status;
                statusField.value = status;
            }
        } else {
            // 如果沒有狀態，設置為 confirmed
            const statusField = document.getElementById('status');
            if (statusField) statusField.value = 'confirmed';
        }
        if (data.notes) {
            const notesField = document.getElementById('notes');
            if (notesField) notesField.value = data.notes;
        }
        
        // 等待 Select2 初始化完成後再設置供應商值
        if (data.supplier_id) {
            await new Promise(resolve => setTimeout(resolve, 200));
            
            // 確保供應商 Select2 有對應選項（避免未預載供應商資料時無法顯示已選值）
            const exists = $('#supplierId option[value="' + data.supplier_id + '"]').length > 0;
            if (!exists) {
                // 如果選項不存在，通過 API 獲取供應商信息並添加到 Select2
                try {
                    const supplier = await App.apiRequest(`/suppliers/${data.supplier_id}`);
                    if (supplier) {
                        const displayText = supplier.name + (supplier.phone ? ' (' + supplier.phone + ')' : '');
                        const newOption = new Option(displayText, data.supplier_id, true, true);
                        $('#supplierId').append(newOption);
                    }
                } catch (error) {
                    console.warn('載入供應商信息失敗:', error);
                    // 即使獲取失敗，也嘗試設置值（可能供應商已被刪除）
                }
            }
            
            // 確保 Select2 已初始化後再設置值
            if ($('#supplierId').hasClass('select2-hidden-accessible')) {
                $('#supplierId').val(data.supplier_id).trigger('change');
            } else {
                // 如果 Select2 還沒初始化，等待一下再設置
                await new Promise(resolve => setTimeout(resolve, 300));
                $('#supplierId').val(data.supplier_id).trigger('change');
            }
        }
        
        if (data.purchase_items && data.purchase_items.length > 0) {
            purchaseItems = data.purchase_items;
            renderPurchaseItems();
        }
        
        // 載入支出記錄
        if (data.expense_records && Array.isArray(data.expense_records)) {
            expenseRecords = data.expense_records.map(record => ({
                expense_id: record.expense_id || null,
                expense_date: record.expense_date || record.payment_date || '',
                payment_method_id: record.payment_method_id || '',
                payment_method: record.payment_method || '',
                bank_account_id: record.bank_account_id || '',
                amount: record.amount || 0,
                invoice_number: record.invoice_number || '',
                reference_number: record.reference_number || '',
                notes: record.notes || '',
                category: record.category || 'purchase',
                expense_type: record.expense_type || 'purchase'
            }));
            renderExpenseRecords();
        }
        
        // 載入收貨記錄
        if (data.receiving_notes && Array.isArray(data.receiving_notes)) {
            receivingNotes = data.receiving_notes;
            renderReceivingNotes();
        } else if (data.receiving_records && Array.isArray(data.receiving_records)) {
            // 向後兼容
            receivingRecords = data.receiving_records;
            receivingNotes = receivingRecords.map(record => ({
                id: record.id || null,
                receiving_date: record.receiving_date || '',
                warehouse_id: record.warehouse_id || '',
                notes: record.notes || '',
                items: record.items || []
            }));
            renderReceivingNotes();
        }
        
        App.showAlert(t('purchaseOrdersNew.alerts.draftLoaded', '草稿已載入'), 'success');
        updateDraftIndicator();
        
        const modal = bootstrap.Modal.getInstance(document.getElementById('draftListModal'));
        if (modal) modal.hide();
    }

        if (!confirm(t('purchaseOrdersNew.confirms.deleteDraft', '確定要刪除此草稿嗎？'))) return;

    function addPurchaseItem() {

    async function updatePurchaseItem(index, field, value) {
        const item = purchaseItems[index];
        item[field] = field === 'quantity' || field === 'unit_price' || field === 'discount_amount' || field === 'tax_rate' ? parseFloat(value) || 0 : value;
        
        if (field === 'product_id') {
            const product = products.find(p => p.id === value);
            if (product) {
                // 先使用本地產品數據的成本作為臨時值
                item.unit_price = product.cost || 0;
                
                // 檢查產品是否有屬性
                let productAttributes = null;
                let hasProductAttributes = false;
                try {
                    const fullProduct = await App.apiRequest(`/products/${value}`);
                    // 使用完整產品信息中的成本（優先使用完整數據）
                    if (fullProduct.cost !== undefined && fullProduct.cost !== null) {
                        item.unit_price = fullProduct.cost;
                    }
                    hasProductAttributes = fullProduct.product_attribute_values && fullProduct.product_attribute_values.length > 0;
                    
                    if (hasProductAttributes) {
                        // 載入所有產品屬性定義
                        const attributesResponse = await App.apiRequest('/product-attributes?limit=1000');
                        const allAttributes = attributesResponse.data || [];
                        const attributeMap = {};
                        allAttributes.forEach(attr => {
                            attributeMap[attr.id] = attr;
                        });
                        
                        // 檢查是否有必填屬性
                        const requiredAttributes = [];
                        fullProduct.product_attribute_values.forEach(attrValue => {
                            const attrDef = attributeMap[attrValue.attribute_id];
                            if (attrDef && (attrDef.is_required === true || attrDef.is_required === 'yes' || attrDef.is_required === 'true')) {
                                requiredAttributes.push({
                                    ...attrDef,
                                    currentValue: attrValue.value
                                });
                            }
                        });
                        
                        // 如果有屬性值，顯示彈窗
                        if (fullProduct.product_attribute_values.length > 0) {
                            productAttributes = await showProductAttributesModal(fullProduct.product_attribute_values, allAttributes, requiredAttributes, fullProduct.name);
                            if (productAttributes === null) {
                                // 用戶取消，重置產品選擇
                                item.product_id = '';
                                item.unit_price = 0;
                                item.total_amount = 0;
                                item.has_product_attributes = false;
                                renderPurchaseItems();
                                return;
                            }
                        }
                    }
                } catch (error) {
                    console.error('載入產品屬性失敗:', error);
                    hasProductAttributes = false;
                }
                
                // 設置產品屬性標記
                item.has_product_attributes = hasProductAttributes;
                
                if (productAttributes) {
                    item.product_attributes = productAttributes;
                } else {
                    item.product_attributes = null;
                }

                // 單據設定：同供應商 + 同產品，帶入最後一筆報價單價
                if (autoUseLastSupplierQuotationPrice) {
                    const supplierId = getSelectedSupplierId();
                    if (supplierId && value) {
                        try {
                            const resp = await App.apiRequest(`/purchase-orders/last-quotation-price?supplier_id=${encodeURIComponent(supplierId)}&product_id=${encodeURIComponent(value)}`);
                            if (resp && resp.found && resp.unit_price !== undefined && resp.unit_price !== null) {
                                item.unit_price = parseFloat(resp.unit_price) || 0;
                            }
                        } catch (error) {
                            console.warn('載入最後報價單價失敗:', error);
                        }
                    }
                }
            } else {
                // 如果沒有選擇產品，重置屬性標記
                item.has_product_attributes = false;
                item.product_attributes = null;
            }
        }
        
        // 計算小計：數量 * 單價 - 折扣，然後加上稅
        const subtotal = item.quantity * item.unit_price - item.discount_amount;
        const taxAmount = subtotal * (item.tax_rate / 100);
        item.total_amount = subtotal + taxAmount;
        renderPurchaseItems();
        document.dispatchEvent(new CustomEvent('purchaseItemsChanged'));
    }

    function renderPurchaseItems() {
        const tbody = document.getElementById('purchaseItemsTable');
        
        if (purchaseItems.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">暫無商品，請點擊「添加商品」</td></tr>';
            document.getElementById('subtotalAmount').textContent = '$0.00';
            document.getElementById('totalAmount').textContent = '$0.00';
            return;
        }

        tbody.innerHTML = purchaseItems.map((item, index) => {
            const product = products.find(p => p.id === item.product_id);
            const productName = product ? product.name : '請選擇產品';
            
            // 顯示產品屬性（只有當產品有屬性時才顯示）
            let attributesDisplay = '';
            if (item.product_attributes && item.product_attributes.length > 0) {
                const attrTexts = item.product_attributes.map(attr => attr.value);
                attributesDisplay = `<div class="mt-1">
                    <small class="text-muted">屬性: </small>
                    <span class="badge bg-info text-dark" style="cursor: pointer;" onclick="editPurchaseProductAttributes(${index})">${attrTexts.join(', ')}</span>
                </div>`;
            } else if (item.product_id && item.has_product_attributes) {
                // 只有當產品有屬性時才顯示「點擊選擇屬性」
                attributesDisplay = `<div class="mt-1">
                    <small class="text-warning" style="cursor: pointer;" onclick="checkAndEditPurchaseProductAttributes(${index})">點擊選擇屬性</small>
                </div>`;
            }
            
            return `
                <tr data-item-index="${index}">
                    <td>
                        <select class="form-select form-select-sm product-select" id="purchaseProductSelect_${index}" data-index="${index}" style="width: 100%;">
                            <option value="${item.product_id || ''}">${productName}</option>
                        </select>
                        ${attributesDisplay}
                    </td>
                    <td>
                        <input type="number" class="form-control form-control-sm" value="${item.quantity}" min="1" step="1" onchange="updatePurchaseItem(${index}, 'quantity', this.value)">
                    </td>
                    <td>
                        <input type="number" class="form-control form-control-sm" value="${item.unit_price}" min="0" step="0.01" onchange="updatePurchaseItem(${index}, 'unit_price', this.value)">
                    </td>
                    <td>
                        <input type="number" class="form-control form-control-sm" value="${item.discount_amount}" min="0" step="0.01" onchange="updatePurchaseItem(${index}, 'discount_amount', this.value)">
                    </td>
                    <td>
                        <input type="number" class="form-control form-control-sm" value="${item.tax_rate}" min="0" max="100" step="0.01" onchange="updatePurchaseItem(${index}, 'tax_rate', this.value)">
                    </td>
                    <td>$${item.total_amount.toFixed(2)}</td>
                    <td>
                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removePurchaseItem(${index})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        }).join('');

        const subtotal = calculateSubtotal();
        const orderDiscountAmount = orderDiscount > 0 ? subtotal * orderDiscount / 100 : 0;
        const total = subtotal - couponDiscount - pointsDiscount - orderDiscountAmount;
        
        // 更新小计
        const subtotalEl = document.getElementById('subtotalAmount');
        if (subtotalEl) subtotalEl.textContent = '$' + subtotal.toFixed(2);
        
        // 更新总计
        document.getElementById('totalAmount').textContent = '$' + Math.max(0, total).toFixed(2);
        
        // 更新需付金額
        renderExpenseRecords();
        
        // 初始化產品 Select2
        setTimeout(() => {
            purchaseItems.forEach((item, index) => {
                initPurchaseProductSelect2(index, item.product_id);
            });
        }, 100);
    }

    // 初始化採購產品 Select2
    function initPurchaseProductSelect2(index, currentProductId = '') {
        // 如果已經初始化過，先銷毀
        if ($(`#purchaseProductSelect_${index}`).hasClass('select2-hidden-accessible')) {
            $(`#purchaseProductSelect_${index}`).off('select2:select'); // 移除舊的事件監聽器
            $(`#purchaseProductSelect_${index}`).select2('destroy');
        }
        
        $(`#purchaseProductSelect_${index}`).select2({
            theme: 'bootstrap-5',
            placeholder: t('purchaseOrdersNew.productPlaceholder', '搜索或選擇產品...'),
            allowClear: true,
            ajax: {
                url: '/api/v1/products',
                dataType: 'json',
                delay: 250,
                headers: {
                    'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                    'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                },
                data: function (params) {
                    return {
                        search: params.term || '',
                        status: 'active',
                        limit: 50,
                        page: params.page || 1
                    };
                },
                processResults: function (data, params) {
                    params.page = params.page || 1;
                    return {
                        results: (data.data || []).map(function(product) {
                            // 顯示成本而不是價格
                            return {
                                id: product.id,
                                text: product.name + ' (成本: $' + (product.cost || 0) + ')'
                            };
                        }),
                        pagination: {
                            more: (data.data || []).length === 50
                        }
                    };
                },
                cache: true
            },
            minimumInputLength: 0
        }).on('select2:select', function (e) {
            const productId = e.params.data.id;
            const idx = $(this).data('index');
            // 防止重複觸發
            if (purchaseItems[idx] && purchaseItems[idx].product_id === productId) {
                return;
            }
            updatePurchaseItem(idx, 'product_id', productId);
        });
        
        // 如果有當前產品 ID，設置選中（但不觸發 change 事件，避免重複調用 updatePurchaseItem）
        if (currentProductId) {
            // 先嘗試從本地 products 數組獲取
            const product = products.find(p => p.id === currentProductId);
            if (product) {
                const option = new Option(product.name + ' (成本: $' + (product.cost || 0) + ')', product.id, true, true);
                $(`#purchaseProductSelect_${index}`).append(option);
                // 使用 change.select2 來避免觸發 select2:select 事件
                $(`#purchaseProductSelect_${index}`).val(currentProductId).trigger('change.select2');
            } else {
                // 如果本地沒有，通過 API 獲取完整產品信息
                App.apiRequest(`/products/${currentProductId}`).then(fullProduct => {
                    if (fullProduct) {
                        const option = new Option(fullProduct.name + ' (成本: $' + (fullProduct.cost || 0) + ')', fullProduct.id, true, true);
                        $(`#purchaseProductSelect_${index}`).append(option);
                        // 使用 change.select2 來避免觸發 select2:select 事件
                        $(`#purchaseProductSelect_${index}`).val(currentProductId).trigger('change.select2');
                    }
                }).catch(err => {
                    console.warn('載入產品信息失敗:', err);
                });
            }
        }
    }

    function calculateSubtotal() {
        return purchaseItems.reduce((sum, item) => sum + item.total_amount, 0);

    function calculateTotal() {
        const subtotal = calculateSubtotal();
        const orderDiscountAmount = orderDiscount > 0 ? subtotal * orderDiscount / 100 : 0;
        return subtotal - couponDiscount - pointsDiscount - orderDiscountAmount;
    }

    // 顯示產品屬性選擇彈窗
    async function showProductAttributesModal(productAttributeValues, allAttributes, requiredAttributes, productName = '') {
        return new Promise((resolve) => {
            const attributeMap = {};
            allAttributes.forEach(attr => {
                attributeMap[attr.id] = attr;
            });
            
            // 構建屬性表單 HTML
            let attributesHtml = '';
            productAttributeValues.forEach(attrValue => {
                const attrDef = attributeMap[attrValue.attribute_id];
                if (!attrDef) return;
                
                const isRequired = attrDef.is_required === true || attrDef.is_required === 'yes' || attrDef.is_required === 'true';
                const isDropdown = attrDef.attribute_type === 'select' || attrDef.attribute_type === 'dropdown';
                let options = attrDef.options || [];
                if (typeof options === 'string' && options.trim() !== '') {
                    options = options.split(',').map(opt => opt.trim()).filter(opt => opt !== '');
                }
                
                let valueField = '';
                // 解析產品已選擇的值（可能是逗號分隔的字符串）
                const selectedValues = attrValue.value ? (attrValue.value.includes(',') 
                    ? attrValue.value.split(',').map(v => v.trim()).filter(v => v)
                    : [attrValue.value.trim()]) : [];
                
                if (isDropdown && options.length > 0) {
                    // 只顯示產品已選擇的值作為選項，但用戶只能單選
                    if (selectedValues.length > 0) {
                        let optionHtml = '<option value="">請選擇</option>';
                        let currentSelectedValue = ''; // 當前已選擇的值（如果有的話）
                        
                        // 檢查 item 中是否已經選擇了這個屬性的值
                        if (window.currentEditingItem && window.currentEditingItem.product_attributes) {
                            const existingAttr = window.currentEditingItem.product_attributes.find(a => a.attribute_id === attrDef.id);
                            if (existingAttr) {
                                currentSelectedValue = existingAttr.value;
                            }
                        }
                        
                        selectedValues.forEach(selectedValue => {
                            // 在選項中查找對應的標籤
                            const matchedOption = options.find(opt => {
                                const optValue = typeof opt === 'string' ? opt : (opt.value || opt.label || opt);
                                return String(optValue).trim() === String(selectedValue).trim();
                            });
                            if (matchedOption) {
                                const optValue = typeof matchedOption === 'string' ? matchedOption : (matchedOption.value || matchedOption.label || matchedOption);
                                const optLabel = typeof matchedOption === 'string' ? matchedOption : (matchedOption.label || matchedOption.value || matchedOption);
                                const isSelected = currentSelectedValue && (String(currentSelectedValue).trim() === String(optValue).trim() || String(currentSelectedValue).trim() === String(selectedValue).trim());
                                optionHtml += `<option value="${optValue}" ${isSelected ? 'selected' : ''}>${optLabel}</option>`;
                            } else {
                                // 如果找不到匹配的選項，直接顯示值
                                const isSelected = currentSelectedValue && String(currentSelectedValue).trim() === String(selectedValue).trim();
                                optionHtml += `<option value="${selectedValue}" ${isSelected ? 'selected' : ''}>${selectedValue}</option>`;
                            }
                        });
                        valueField = `<select class="form-select attr-value-input" data-attribute-id="${attrDef.id}" ${isRequired ? 'required' : ''}>${optionHtml}</select>`;
                    } else {
                        // 如果沒有選擇任何值，不顯示這個屬性
                        return;
                    }
                } else {
                    // Input 類型：顯示輸入框
                    // 檢查是否為 read-only（如果產品已有值，則設為 read-only）
                    let currentValue = '';
                    if (window.currentEditingItem && window.currentEditingItem.product_attributes) {
                        const existingAttr = window.currentEditingItem.product_attributes.find(a => a.attribute_id === attrDef.id);
                        if (existingAttr) {
                            currentValue = existingAttr.value;
                        }
                    }
                    if (!currentValue && selectedValues.length > 0) {
                        currentValue = selectedValues.join(', ');
                    }
                    // 只要產品有 default value (selectedValues.length > 0)，input 就變 readonly
                    const isReadonly = selectedValues.length > 0;
                    const readonlyAttr = isReadonly ? 'readonly' : '';
                    const readonlyClass = isReadonly ? 'bg-light' : '';
                    const finalValue = currentValue || (selectedValues.length > 0 ? selectedValues.join(', ') : '');
                    valueField = `<input type="text" class="form-control attr-value-input ${readonlyClass}" data-attribute-id="${attrDef.id}" value="${finalValue.replace(/"/g, '&quot;')}" ${isRequired ? 'required' : ''} ${readonlyAttr} placeholder="輸入屬性值">`;
                }
                
                attributesHtml += `
                    <div class="mb-3">
                        <label class="form-label">
                            ${attrDef.name} ${isRequired ? '<span class="text-danger">*</span>' : ''}
                        </label>
                        ${valueField}
                    </div>
                `;
            });
            
            const modalHtml = `
                <div class="modal fade" id="productAttributesModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">選擇產品屬性${productName ? ` - ${productName}` : ''}</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <form id="productAttributesForm">
                                    ${attributesHtml}
                                </form>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                <button type="button" class="btn btn-primary" onclick="confirmProductAttributes()">確認</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 移除舊的 modal（如果存在）
            const existingModal = document.getElementById('productAttributesModal');
            if (existingModal) existingModal.remove();
            
            // 添加新的 modal
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = new bootstrap.Modal(document.getElementById('productAttributesModal'));
            
            // 初始化 Select2（單選模式）
            modal._element.addEventListener('shown.bs.modal', function() {
                setTimeout(() => {
                    document.querySelectorAll('.attr-value-input').forEach(select => {
                        if (select.tagName === 'SELECT' && typeof $ !== 'undefined' && !$(select).hasClass('select2-hidden-accessible')) {
                            $(select).select2({
                                theme: 'bootstrap-5',
                                placeholder: t('fields.請選擇', '請選擇'),
                                allowClear: false,
                                width: '100%'
                            });
                        }
                    });
                }, 100);
            });
            
            // 定義確認函數
            window.confirmProductAttributes = function() {
                const form = document.getElementById('productAttributesForm');
                if (!form.checkValidity()) {
                    form.reportValidity();
                    return;
                }
                
                const attributes = [];
                document.querySelectorAll('.attr-value-input').forEach(input => {
                    const attributeId = input.getAttribute('data-attribute-id');
                    let value = '';
                    
                    // 單選模式：直接獲取值
                    if (input.tagName === 'SELECT' && typeof $ !== 'undefined' && $(input).hasClass('select2-hidden-accessible')) {
                        // 使用 Select2 的值
                        value = $(input).val() || '';
                        if (Array.isArray(value)) {
                            value = value[0] || '';
                        }
                        value = String(value).trim();
                    } else {
                        value = input.value ? input.value.trim() : '';
                    }
                    
                    if (value) {
                        attributes.push({
                            attribute_id: attributeId,
                            value: value
                        });
                    }
                });
                
                modal.hide();
                resolve(attributes);
            };
            
            // 監聽 modal 關閉事件
            document.getElementById('productAttributesModal').addEventListener('hidden.bs.modal', function() {
                if (window.confirmProductAttributes) {
                    delete window.confirmProductAttributes;
                }
                // 清理 Select2 實例
                document.querySelectorAll('.attr-value-input').forEach(select => {
                    if (select.tagName === 'SELECT' && typeof $ !== 'undefined' && $(select).hasClass('select2-hidden-accessible')) {
                        $(select).select2('destroy');
                    }
                });
                this.remove();
                // 如果用戶直接關閉 modal，返回 null
                if (!document.getElementById('productAttributesModal')) {
                    resolve(null);
                }
            });
            
            modal.show();
        });
    }

    // 編輯產品屬性（採購訂單）
    async function editPurchaseProductAttributes(index) {
        const item = purchaseItems[index];
        if (!item.product_id) return;
        
        try {
            const fullProduct = await App.apiRequest(`/products/${item.product_id}`);
            if (fullProduct.product_attribute_values && fullProduct.product_attribute_values.length > 0) {
                // 載入所有產品屬性定義
                const attributesResponse = await App.apiRequest('/product-attributes?limit=1000');
                const allAttributes = attributesResponse.data || [];
                const attributeMap = {};
                allAttributes.forEach(attr => {
                    attributeMap[attr.id] = attr;
                });
                
                // 檢查是否有必填屬性
                const requiredAttributes = [];
                fullProduct.product_attribute_values.forEach(attrValue => {
                    const attrDef = attributeMap[attrValue.attribute_id];
                    if (attrDef && (attrDef.is_required === true || attrDef.is_required === 'yes' || attrDef.is_required === 'true')) {
                        requiredAttributes.push({
                            ...attrDef,
                            currentValue: attrValue.value
                        });
                    }
                });
                
                // 顯示彈窗
                // 設置當前編輯的 item，以便 popup 知道已選擇的值
                window.currentEditingItem = item;
                const productAttributes = await showProductAttributesModal(fullProduct.product_attribute_values, allAttributes, requiredAttributes, fullProduct.name);
                window.currentEditingItem = null;
                if (productAttributes !== null) {
                    item.product_attributes = productAttributes;
                    renderPurchaseItems();
                }
            } else {
                App.showAlert(t('purchaseOrdersNew.alerts.productHasNoAttributes', '此產品沒有屬性'), 'info');
            }
        } catch (error) {
            console.error('編輯產品屬性失敗:', error);
            App.showAlert(t('purchaseOrdersNew.alerts.loadProductAttributesFailed', '載入產品屬性失敗'), 'danger');
        }
    }
    
    // 檢查並編輯產品屬性（採購訂單）
    async function checkAndEditPurchaseProductAttributes(index) {
        const item = purchaseItems[index];
        if (!item.product_id) return;
        
        try {
            const fullProduct = await App.apiRequest(`/products/${item.product_id}`);
            if (fullProduct.product_attribute_values && fullProduct.product_attribute_values.length > 0) {
                await editPurchaseProductAttributes(index);
            } else {
                App.showAlert(t('purchaseOrdersNew.alerts.productHasNoAttributes', '此產品沒有屬性'), 'info');
            }
        } catch (error) {
            console.error('檢查產品屬性失敗:', error);
            // 直接嘗試編輯
            await editPurchaseProductAttributes(index);
        }
    }

    // 支出記錄相關變量（替代支付記錄）
    let paymentMethods = [];
    let bankAccounts = [];

    // 收貨記錄相關變量
    // 收貨單相關變量（每張收貨單可包含多個產品）
    let receivingNotes = []; // 收貨單數組，每個收貨單包含 items 數組
    let receivingRecords = []; // 向後兼容
    let warehouses = [];
    let allAttributes = []; // 產品屬性定義（用於顯示收貨單產品屬性）
    
    // 取消採購相關變量
    let cancellationNotes = []; // 取消採購單數組（類似退款單）

    // 載入支付方式、銀行賬戶、倉庫和產品
    async function loadPurchaseOrderData() {
        try {
            const [paymentMethodsData, bankAccountsData, warehousesData, productsData] = await Promise.all([
                App.apiRequest('/payment-methods?limit=1000'),
                App.apiRequest('/bank-accounts?limit=1000'),
                App.apiRequest('/warehouses?limit=1000'),
                App.apiRequest('/products?limit=1000')
            ]);
            paymentMethods = paymentMethodsData.data || [];
            bankAccounts = bankAccountsData.data || [];
            warehouses = warehousesData.data || [];
            // 按 is_default DESC 排序，確保默認值在第一個
            warehouses.sort((a, b) => {
                if (a.is_default && !b.is_default) return -1;
                if (!a.is_default && b.is_default) return 1;
                return 0;
            });
            products = productsData.data || [];
            
            // 初始化供應商 Select2
            initSupplierSelect2();
            // 初始化國家選擇器 Select2
            initContactCountrySelect2();
        } catch (error) {
            console.error('Failed to load purchase order data:', error);
        }
    }
    
    // 清空聯絡人資料
    // 格式化供應商顯示名稱（處理姓氏）
    function formatSupplierDisplayName(name, lastName) {
        if (!lastName) return name;
        
        // 判斷是否為中文（簡單判斷：檢查是否包含中文字符）
        const isChinese = /[\u4e00-\u9fa5]/.test(lastName);
        
        if (isChinese) {
            // 中文姓加在前面
            return lastName + name;
        } else {
            // 英文姓加在後面
            return name + ' ' + lastName;
        }
    }

    // 載入供應商信息並填充到聯絡人欄位
    async function loadSupplierInfo(supplierId) {
        if (!supplierId) {
            clearContactInfo();
            return;
        }
        
        try {
            const supplier = await App.apiRequest(`/api/v1/suppliers/${supplierId}`);
            if (supplier) {
                // 填入聯絡資訊（可覆寫）- 自動填充到採購單聯絡人欄位
                if (supplier.name) {
                    const contactNameField = document.getElementById('contactName');
                    if (contactNameField) {
                        contactNameField.value = formatSupplierDisplayName(supplier.name, supplier.last_name);
                    }
                }
                if (supplier.email) {
                    const contactEmailField = document.getElementById('contactEmail');
                    if (contactEmailField) {
                        contactEmailField.value = supplier.email;
                    }
                }
                // 優先使用 supplier.phone_country_code 和 supplier.phone（分開的字段）
                let phoneCountryCode = supplier.phone_country_code || '';
                let phoneNumber = supplier.phone || '';
                
                // 如果 supplier 有 phone_country_code 和 phone（分開的字段），直接使用
                if (phoneCountryCode && phoneNumber) {
                    // 直接使用分開的字段
                } else if (supplier.phone) {
                    // 如果只有 phone 字段（可能是組合的），嘗試解析
                    const match = supplier.phone.match(/^(\+?\d{1,4})\s*(.+)$/);
                    if (match) {
                        phoneCountryCode = match[1].startsWith('+') ? match[1] : '+' + match[1];
                        phoneNumber = match[2];
                    } else {
                        // 嘗試匹配開頭的區號（1-4位數字）
                        const codeMatch = supplier.phone.match(/^(\+?\d{1,4})/);
                        if (codeMatch) {
                            phoneCountryCode = codeMatch[1].startsWith('+') ? codeMatch[1] : '+' + codeMatch[1];
                            phoneNumber = supplier.phone.substring(codeMatch[1].length).trim();
                        } else {
                            // 如果無法解析，phoneNumber 就是整個 phone
                            phoneNumber = supplier.phone;
                        }
                    }
                }
                
                // 如果還是沒有區號，獲取系統預設
                if (!phoneCountryCode) {
                    try {
                        const resp = await App.apiRequest('/api/v1/phone-country-codes');
                        const codes = (resp && resp.data) ? resp.data : [];
                        const defaultCode = codes.find(c => c && (c.is_default === true || c.is_default === 'true' || c.is_default === 1));
                        if (defaultCode) {
                            phoneCountryCode = defaultCode.code;
                        }
                    } catch (error) {
                        console.warn('獲取預設電話區號失敗:', error);
                    }
                }
                
                // 設置電話區號
                const contactPhoneCodeSelect = document.getElementById('contactPhoneCode');
                if (contactPhoneCodeSelect && phoneCountryCode) {
                    if (typeof $ !== 'undefined' && $(contactPhoneCodeSelect).hasClass('select2-hidden-accessible')) {
                        // 確保選項存在
                        if ($(contactPhoneCodeSelect).find(`option[value="${phoneCountryCode}"]`).length === 0) {
                            const newOption = new Option(phoneCountryCode, phoneCountryCode, true, true);
                            $(contactPhoneCodeSelect).append(newOption);
                        }
                        $(contactPhoneCodeSelect).val(phoneCountryCode).trigger('change');
                    } else {
                        contactPhoneCodeSelect.value = phoneCountryCode;
                    }
                }
                
                // 設置電話號碼
                const contactPhoneField = document.getElementById('contactPhone');
                if (contactPhoneField) {
                    contactPhoneField.value = phoneNumber;
                }
                // 優先使用地址管理中的地址（如果供應商有地址管理功能）
                try {
                    // 從 extra_fields 獲取地址信息
                    const extraFields = supplier.extra_fields || {};
                    const addressCountryCode = extraFields.address_country_code || supplier.address_country_code || '';
                    const addressRegionCode = extraFields.address_region_code || supplier.address_region_code || '';
                    const address = supplier.address || '';
                    
                    if (addressCountryCode || addressRegionCode) {
                        // 如果有國家和地區信息，獲取名稱並格式化地址
                        let countryName = '';
                        let regionName = '';
                        
                        // 獲取國家名稱
                        if (addressCountryCode) {
                            try {
                                const countriesResponse = await App.apiRequest(`/api/v1/countries?search=${encodeURIComponent(addressCountryCode)}&limit=250`);
                                const countries = countriesResponse.data || [];
                                const country = countries.find(c => c.code === addressCountryCode);
                                if (country) {
                                    countryName = country.name || '';
                                }
                            } catch (error) {
                                console.warn('獲取國家名稱失敗:', error);
                            }
                        }
                        
                        // 獲取地區名稱
                        if (addressRegionCode && addressCountryCode) {
                            try {
                                const regionsResponse = await App.apiRequest(`/api/v1/country-regions?country_code=${encodeURIComponent(addressCountryCode)}`);
                                const regions = regionsResponse.data || [];
                                const region = regions.find(r => r.code === addressRegionCode);
                                if (region) {
                                    regionName = region.name || '';
                                }
                            } catch (error) {
                                console.warn('獲取地區名稱失敗:', error);
                            }
                        }
                        
                        // 根據語言格式化地址
                        const currentLang = localStorage.getItem('cms_language') || 'zh';
                        const lang = currentLang === 'en' ? 'en' : 'zh';
                        
                        let formattedAddress = '';
                        if (lang === 'en') {
                            // 英文地址格式：地址 + ", " + 地區 + ", " + 國家
                            const parts = [];
                            if (address) {
                                parts.push(address);
                            }
                            if (regionName) {
                                parts.push(regionName);
                            }
                            if (countryName) {
                                parts.push(countryName);
                            }
                            formattedAddress = parts.filter(p => p).join(', ');
                        } else {
                            // 中文地址格式：國家 + " " + 地區 + " " + 地址
                            const parts = [];
                            if (countryName) {
                                parts.push(countryName);
                            }
                            if (regionName) {
                                parts.push(regionName);
                            }
                            if (address) {
                                parts.push(address);
                            }
                            formattedAddress = parts.filter(p => p).join(' ');
                        }
                        
                        const contactAddressField = document.getElementById('contactAddress');
                        if (contactAddressField) {
                            contactAddressField.value = formattedAddress;
                        }
                    } else if (supplier.address) {
                        // 如果沒有地址管理，使用舊的 address 字段
                    const contactAddressField = document.getElementById('contactAddress');
                    if (contactAddressField) {
                        contactAddressField.value = supplier.address;
                        }
                    }
                } catch (error) {
                    console.warn('載入供應商地址失敗:', error);
                    // 如果載入失敗，回退到舊的 address 字段
                    if (supplier.address) {
                        const contactAddressField = document.getElementById('contactAddress');
                        if (contactAddressField) {
                            contactAddressField.value = supplier.address;
                        }
                    }
                }
            }
        } catch (error) {
            console.error('Failed to load supplier info:', error);
        }
    }
    
    // 初始化供應商 Select2
    function initSupplierSelect2() {
        // 獲取 Select2 語言配置
        const getSelect2Language = () => {
            const fallback = {
                noResults: () => '未找到結果',
                searching: () => '搜索中...'
            };
            if (typeof I18n === 'undefined' || !I18n.t) return fallback;
            return {
                noResults: () => {
                    const k = 'common.noResults';
                    const t = I18n.t(k);
                    return (t && t !== k) ? t : fallback.noResults();
                },
                searching: () => {
                    const k = 'common.searching';
                    const t = I18n.t(k);
                    return (t && t !== k) ? t : fallback.searching();
                }
            };
        };
        
        // 獲取 placeholder 文本
        const getPlaceholder = () => {
            if (typeof I18n !== 'undefined' && I18n.t) {
                // 嘗試獲取專用的 placeholder
                const placeholderKey = 'placeholders.purchaseOrders.supplier';
                const placeholderText = I18n.t(placeholderKey);
                if (placeholderText && placeholderText !== placeholderKey) {
                    return placeholderText;
                }
                
                // 嘗試組合「搜索或選擇 + 供應商」
                const searchOrSelectKey = 'common.searchOrSelect';
                const supplierKey = 'fields.supplier';
                const searchOrSelectText = I18n.t(searchOrSelectKey);
                const supplierText = I18n.t(supplierKey);
                
                if (searchOrSelectText && searchOrSelectText !== searchOrSelectKey && 
                    supplierText && supplierText !== supplierKey) {
                    // 處理 {label} 占位符
                    return searchOrSelectText.replace('{label}', supplierText);
                }
                
                // 如果沒有翻譯，使用中文默認值
                if (supplierText && supplierText !== supplierKey) {
                    return `搜索或選擇${supplierText}...`;
                }
            }
            return '搜索或選擇供應商...';
        };
        
        $('#supplierId').select2({
            theme: 'bootstrap-5',
            placeholder: getPlaceholder(),
            language: getSelect2Language(),
            allowClear: true,
            ajax: {
                url: '/api/v1/suppliers',
                dataType: 'json',
                delay: 250,
                headers: {
                    'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || ''),
                    'X-Tenant-Subdomain': localStorage.getItem('tenant_subdomain') || ''
                },
                data: function (params) {
                    return {
                        search: params.term || '',
                        limit: 50,
                        page: params.page || 1
                    };
                },
                processResults: function (data, params) {
                    params.page = params.page || 1;
                    return {
                        results: (data.data || []).map(function(supplier) {
                            return {
                                id: supplier.id,
                                text: supplier.name + (supplier.phone ? ' (' + supplier.phone + ')' : '')
                            };
                        }),
                        pagination: {
                            more: (data.data || []).length === 50
                        }
                    };
                },
                cache: true
            },
            minimumInputLength: 0
        }).on('select2:select', function (e) {
            // 先清空聯絡人資料，再更新
            clearContactInfo();
            loadSupplierInfo(e.params.data.id);
        }).on('select2:clear', function (e) {
            // 先清空聯絡人資料
            clearContactInfo();
            loadSupplierInfo('');
        });
    }
