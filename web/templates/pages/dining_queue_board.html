{{define "pages/dining_queue_board"}}
<style>
  .queue-party-options { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .queue-party-btn { flex: 0 0 auto; padding: 0.35rem 0.7rem; border-radius: 0.5rem; }
</style>
<script src="/static/js/thermal-printer.js"></script>
<script>
  document.body.setAttribute('data-disable-form-button-bar', 'true');
</script>
<div class="container py-4" style="margin-top: 8px;">
  <div class="row g-4">
    <div class="col-12 col-lg-8">
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between mb-3">
        <div>
          <h4 class="mb-1" data-i18n="pages.diningQueueBoard.title">候位資訊</h4>
          <div class="text-muted" id="queueBoardUpdated" data-i18n="pages.diningQueueBoard.updating">更新中...</div>
        </div>
      </div>

      <div class="row g-3" id="queueBoardAreas"></div>

      <div class="text-center text-muted mt-3" data-i18n="pages.diningQueueBoard.autoRefresh">
        每 30 秒自動更新
      </div>
    </div>
    <div class="col-12 col-lg-4">
      <div class="card shadow-sm border-0 h-100" style="background: #f7f8fb;">
        <div class="card-body p-3">
          <h5 class="mb-2" data-i18n="pages.diningQueueBoard.getTicketTitle">候位取號</h5>
          <p class="text-muted small mb-3" data-i18n="pages.diningQueueBoard.getTicketHint">填寫人數即可取得票號。</p>
          <form id="queueForm" class="mb-2">
            <input type="hidden" id="queueStoreId" value="{{.StoreID}}">
            <input type="hidden" id="queueAreaId" value="">
            <input type="hidden" id="queuePartySize" value="">
            <div class="mb-3" id="queuePhoneWrap" style="display: none;">
              <label class="form-label" data-i18n="pages.diningQueue.phone">電話</label>
              <input type="tel" class="form-control" id="queuePhone">
            </div>
            <div class="mb-3">
              <label class="form-label" data-i18n="pages.diningQueue.partySize">人數</label>
              <div id="queueAreaOptions" class="queue-party-options"></div>
              <div class="form-text" data-i18n="pages.diningQueueBoard.selectPartySize">請選擇人數</div>
            </div>
            <button type="submit" class="btn btn-primary w-100" data-i18n="pages.diningQueue.getTicket">取得票號</button>
          </form>

          <div id="queueResult" class="border rounded p-3 bg-white" style="display:none;">
            <div>
              <div class="fw-bold mb-1" data-i18n="pages.diningQueue.yourTicket">您的候位票號</div>
              <div class="display-6" id="queueTicketNumber">-</div>
            </div>
          </div>

          <div class="text-danger mt-2" id="queueError" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

{{if .UseKioskNav}}
<!-- 返回系統彈窗 -->
<div class="modal fade" id="returnSystemModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" data-i18n="pages.diningQueueBoard.returnToSystem">返回系統</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label" data-i18n="common.password">密碼</label>
          <input type="password" class="form-control" id="returnPassword" data-i18n-placeholder="pages.diningQueueBoard.enterPassword" placeholder="請輸入密碼">
        </div>
        <div class="text-danger small" id="returnPasswordError" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel">取消</button>
        <button type="button" class="btn btn-primary" id="returnConfirmBtn" data-i18n="pages.diningQueueBoard.confirmReturn">確認返回</button>
      </div>
    </div>
  </div>
</div>
{{end}}

<script>
  (function() {
    const subdomain = "{{.Subdomain}}";
    const storeIdFromPage = "{{.StoreID}}";
    const requirePhone = {{if .QueueRequirePhone}}true{{else}}false{{end}};
    const areasEl = document.getElementById('queueBoardAreas');
    const updatedEl = document.getElementById('queueBoardUpdated');
    const form = document.getElementById('queueForm');
    const resultBox = document.getElementById('queueResult');
    const errorBox = document.getElementById('queueError');
    const ticketEl = document.getElementById('queueTicketNumber');
    const qrEl = document.getElementById('queueOrderQr');
    const storeInput = document.getElementById('queueStoreId');
    const areaInput = document.getElementById('queueAreaId');
    const partyInput = document.getElementById('queuePartySize');
    const phoneWrap = document.getElementById('queuePhoneWrap');
    const areaOptionsEl = document.getElementById('queueAreaOptions');
    let currentStoreId = storeIdFromPage || '';
    let currentAreaName = '';
    let areaRules = [];
    const kioskMode = {{if .UseKioskNav}}true{{else}}false{{end}};
    const returnBtn = document.getElementById('returnToSystemBtn');
    const returnModalEl = document.getElementById('returnSystemModal');
    const returnPwdEl = document.getElementById('returnPassword');
    const returnErrorEl = document.getElementById('returnPasswordError');
    const returnConfirmBtn = document.getElementById('returnConfirmBtn');
    let returnModal;
    const verifyFlagKey = 'diningQueueBoardVerified';

    // 打印機相關（自動模式，無 UI）
    let printerConnected = false;
    const PRINTER_CONFIG_KEY = 'dining_queue_printer_config';

    // 從 localStorage 讀取打印機設定（由餐飲設定頁面配置）
    function getPrinterConfig() {
      try {
        const saved = localStorage.getItem(PRINTER_CONFIG_KEY);
        if (saved) return JSON.parse(saved);
      } catch (e) {}
      return { width: 58, autoCut: true };
    }

    // 打印票據（靜默模式）
    async function printTicket(data) {
      if (!printerConnected || typeof ThermalPrinterManager === 'undefined') return;
      try {
        await ThermalPrinterManager.printQueueTicket(data);
      } catch (err) {
        console.error('打印失敗:', err);
        printerConnected = false;
      }
    }

    // 嘗試自動重連已授權的打印機（在餐飲設定頁面授權過的）
    (async function tryAutoReconnect() {
      if (typeof ThermalPrinter === 'undefined' || !ThermalPrinter.isSupported()) return;
      try {
        const devices = await ThermalPrinter.getDevices();
        if (devices.length > 0) {
          const config = getPrinterConfig();
          await ThermalPrinterManager.getPrinter(config);
          printerConnected = true;
          console.log('[ThermalPrinter] 已自動連接:', devices[0].productName);
        }
      } catch (e) {
        // 忽略自動重連錯誤
      }
    })();

    function isVerified() {
      try {
        return sessionStorage.getItem(verifyFlagKey) === 'true';
      } catch (_e) {
        return false;
      }
    }

    function setVerified() {
      try {
        sessionStorage.setItem(verifyFlagKey, 'true');
      } catch (_e) {
        // ignore
      }
    }

    function openReturnModal() {
      if (!returnModal) returnModal = new bootstrap.Modal(returnModalEl);
      if (returnPwdEl) returnPwdEl.value = '';
      if (returnErrorEl) {
        returnErrorEl.textContent = '';
        returnErrorEl.style.display = 'none';
      }
      returnModal.show();
    }
    function setError(msg) {
      if (!errorBox) return;
      errorBox.textContent = msg || '';
      errorBox.style.display = msg ? '' : 'none';
    }

    if (phoneWrap) {
      phoneWrap.style.display = requirePhone ? '' : 'none';
      const phoneInput = document.getElementById('queuePhone');
      if (phoneInput) {
        phoneInput.required = requirePhone;
      }
    }

    if (returnBtn) {
      returnBtn.addEventListener('click', () => {
        openReturnModal();
      });
    }

    async function verifyPassword(pwd) {
      const headers = { 'Content-Type': 'application/json' };
      try {
        const token = localStorage.getItem('auth_token');
        if (token) headers['Authorization'] = `Bearer ${token}`;
      } catch (_e) {
        // ignore
      }
      try {
        const tenantSubdomain = localStorage.getItem('tenant_subdomain');
        if (tenantSubdomain) headers['X-Tenant-Subdomain'] = tenantSubdomain;
      } catch (_e) {
        // ignore
      }
      const resp = await fetch('/api/v1/user/verify-password', {
        method: 'POST',
        headers,
        credentials: 'include',
        body: JSON.stringify({ password: pwd })
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        if (resp.status === 401) throw new Error('請先登入後台');
        throw new Error(data.error || '密碼錯誤');
      }
      if (data.success === false) {
        if (data.has_password === false) throw new Error('您尚未設置密碼，請先設置密碼');
        throw new Error(data.error || '密碼錯誤');
      }
      return data;
    }

    if (returnPwdEl) {
      returnPwdEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (returnConfirmBtn) returnConfirmBtn.click();
        }
      });
    }

    if (returnConfirmBtn) {
      returnConfirmBtn.addEventListener('click', async () => {
        if (!returnPwdEl) return;
        const pwd = returnPwdEl.value || '';
        if (!pwd.trim()) {
          if (returnErrorEl) {
            returnErrorEl.textContent = '請輸入密碼';
            returnErrorEl.style.display = '';
          }
          returnPwdEl.focus();
          returnPwdEl.select();
          return;
        }
        returnConfirmBtn.disabled = true;
        try {
          await verifyPassword(pwd);
          setVerified();
          if (typeof Router !== 'undefined' && Router.go) { Router.go('/dashboard'); } else { window.location.href = '/dashboard'; }
        } catch (err) {
          if (returnErrorEl) {
            returnErrorEl.textContent = err?.message || '驗證失敗';
            returnErrorEl.style.display = '';
          }
        } finally {
          returnConfirmBtn.disabled = false;
        }
      });
    }

    if (kioskMode) {
      // 攔截上一頁/關閉：需先通過密碼驗證
      try {
        history.pushState({ kiosk: true }, '', window.location.href);
      } catch (_e) {
        // ignore
      }

      window.addEventListener('popstate', () => {
        if (isVerified()) return;
        openReturnModal();
        try {
          history.pushState({ kiosk: true }, '', window.location.href);
        } catch (_e) {
          // ignore
        }
      });

      window.addEventListener('beforeunload', (e) => {
        if (isVerified()) return;
        e.preventDefault();
        e.returnValue = '';
      });
    }

    function selectAreaAndParty(areaId, partySize, areaName) {
      if (areaInput) areaInput.value = areaId || '';
      if (partyInput) partyInput.value = String(partySize || '');
      currentAreaName = areaName || '';
      if (!areaOptionsEl) return;
      areaOptionsEl.querySelectorAll('[data-party-size]').forEach(btn => {
        const isActive = btn.getAttribute('data-party-size') === String(partySize);
        btn.classList.toggle('btn-primary', isActive);
        btn.classList.toggle('btn-outline-primary', !isActive);
      });
    }

    function pickAreaByPartySize(size) {
      const candidates = areaRules.filter(a => size >= a.minSeats && size <= a.maxSeats);
      if (candidates.length === 0) return null;
      candidates.sort((a, b) => {
        if (a.maxSeats !== b.maxSeats) return a.maxSeats - b.maxSeats;
        if (a.minSeats !== b.minSeats) return a.minSeats - b.minSeats;
        return a.sortOrder - b.sortOrder;
      });
      return candidates[0];
    }

    async function loadAreaOptions() {
      if (!areaOptionsEl) return;
      const storeId = storeInput ? storeInput.value : currentStoreId;
      const qs = storeId ? `?store_id=${encodeURIComponent(storeId)}` : '';
      areaOptionsEl.innerHTML = '<div class="text-muted">載入中...</div>';
      try {
        let data = {};
        if (window.App && typeof window.App.apiRequest === 'function') {
          data = await App.apiRequest(`/dining-areas?page=1&limit=500${qs ? '&' + qs.slice(1) : ''}`);
        } else {
          const resp = await fetch(`/api/v1/public/${encodeURIComponent(subdomain)}/dining/areas${qs}`);
          data = await resp.json().catch(() => ({}));
        }
        const items = Array.isArray(data.data) ? data.data : [];
        if (items.length === 0) {
          areaOptionsEl.innerHTML = '<div class="text-muted">暫無桌區</div>';
          return;
        }
        areaRules = items.map(area => {
          const minSeats = Number(area.min_seats || 1);
          const maxSeats = Number(area.max_seats || minSeats);
          return {
            id: area.id,
            code: area.code,
            name: area.name || area.code || '',
            minSeats,
            maxSeats,
            sortOrder: Number(area.sort_order || 0)
          };
        });

        const sizeSet = new Set();
        areaRules.forEach(area => {
          for (let i = area.minSeats; i <= area.maxSeats; i++) {
            sizeSet.add(i);
          }
        });
        const sizes = Array.from(sizeSet).sort((a, b) => a - b);
        areaOptionsEl.innerHTML = sizes.map(size => {
          return `<button type="button" class="btn btn-outline-primary btn-sm queue-party-btn" data-party-size="${size}">${size} 人</button>`;
        }).join('');

        areaOptionsEl.querySelectorAll('[data-party-size]').forEach(btn => {
          btn.addEventListener('click', () => {
            const size = Number(btn.getAttribute('data-party-size'));
            const area = pickAreaByPartySize(size);
            if (!area) {
              setError('目前沒有符合人數的桌區');
              return;
            }
            setError('');
            selectAreaAndParty(area.id, size, area.code || area.name || '');
          });
        });
      } catch (err) {
        areaOptionsEl.innerHTML = '<div class="text-danger">載入桌區失敗</div>';
      }
    }

    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        setError('');
        if (resultBox) resultBox.style.display = 'none';

        if (!areaInput?.value || !partyInput?.value) {
          setError('請選擇人數');
          return;
        }
        if (requirePhone && !document.getElementById('queuePhone')?.value) {
          setError('請輸入電話');
          return;
        }

        const payload = {
          phone: document.getElementById('queuePhone')?.value || '',
          party_size: Number(document.getElementById('queuePartySize')?.value || 1),
          store_id: document.getElementById('queueStoreId')?.value || storeIdFromPage || '',
          area_id: document.getElementById('queueAreaId')?.value || ''
        };

        try {
          const resp = await fetch(`/api/v1/public/${encodeURIComponent(subdomain)}/dining/queues`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) throw new Error(data.error || '建立候位失敗');

          const ticket = data.ticket_number || '';
          if (ticketEl) ticketEl.textContent = formatTicketDisplay(ticket) || '-';

          const params = new URLSearchParams();
          if (data.id) params.set('dining_queue_id', data.id);
          if (ticket) params.set('dining_ticket_number', ticket);
          if (payload.store_id) params.set('store_id', payload.store_id);
          if (resultBox) resultBox.style.display = '';

          // 重置表單狀態
          if (partyInput) partyInput.value = '';
          if (areaInput) areaInput.value = '';
          const phoneInput = document.getElementById('queuePhone');
          if (phoneInput) phoneInput.value = '';
          
          if (areaOptionsEl) {
            areaOptionsEl.querySelectorAll('.queue-party-btn').forEach(btn => {
              btn.classList.remove('btn-primary');
              btn.classList.add('btn-outline-primary');
            });
          }

          // 自動打印（靜默模式，如果已連接打印機）
          if (printerConnected) {
            await printTicket({
              ticketNumber: formatTicketDisplay(ticket),
              partySize: payload.party_size,
              areaName: currentAreaName || '',
              phone: payload.phone,
              storeName: '{{.StoreName}}'
            });
          }
        } catch (err) {
          setError(err?.message || '建立候位失敗');
        }
      });
    }

    function formatTicketDisplay(ticket) {
      if (!ticket) return '';
      const parts = String(ticket).split('-');
      if (parts.length >= 2) {
        return parts.slice(-2).join('-');
      }
      return ticket;
    }

    function renderAreas(items) {
      if (!areasEl) return;
      if (!items || items.length === 0) {
        areasEl.innerHTML = '<div class="col-12"><div class="alert alert-light border">暫無桌區資料</div></div>';
        return;
      }
      areasEl.innerHTML = items.map(a => {
        const current = formatTicketDisplay(a.current_call) || '-';
        const last = formatTicketDisplay(a.last_ticket) || '-';
        return `
          <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm h-100">
              <div class="card-body">
                <div class="fw-bold mb-2">${a.name}</div>
                <div class="d-flex align-items-center justify-content-between">
                  <div>
                    <div class="text-muted small">當前叫號</div>
                    <div class="fs-4 fw-bold">${current}</div>
                  </div>
                  <div class="text-end">
                    <div class="text-muted small">最後取號</div>
                    <div class="fs-5">${last}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadStatus() {
      const storeId = storeInput ? storeInput.value : storeIdFromPage || '';
      const qs = storeId ? `?store_id=${encodeURIComponent(storeId)}` : '';
      try {
        const resp = await fetch(`/api/v1/public/${encodeURIComponent(subdomain)}/dining/queue/status${qs}`);
        const data = await resp.json().catch(() => ({}));
        renderAreas(data.areas || []);
        if (updatedEl) updatedEl.textContent = data.updated_at ? `更新時間 ${new Date(data.updated_at).toLocaleTimeString()}` : '更新完成';
        if (storeInput && !storeInput.value && data.store_id) {
          storeInput.value = data.store_id;
          currentStoreId = data.store_id;
          loadAreaOptions();
        }
      } catch (err) {
        if (updatedEl) updatedEl.textContent = '更新失敗';
      }
    }

    loadStatus();
    loadAreaOptions();
    setInterval(loadStatus, 30000);
  })();
</script>
{{end}}
